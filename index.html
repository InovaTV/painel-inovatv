<!DOCTYPE html>
<html>
<head>
  <title>Painel InovaTV</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    button { margin: 2px; }
    table { border-collapse: collapse; width: 100%; }
  </style>
</head>
<body>

<h2>Painel InovaTV</h2>

<button onclick="mostrarClientes()">Clientes</button>
<button onclick="mostrarContatos()">Contatos</button>

<br><br>

<input id="busca" placeholder="Telefone">
<button onclick="buscar()">Buscar</button>

<br><br>

<table border="1">
  <thead id="thead"></thead>
  <tbody id="tabela"></tbody>
</table>

<script>
const supabase = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela = 'clientes';

// CLIENTES
async function mostrarClientes(){
  tela = 'clientes';

  document.getElementById('thead').innerHTML = `
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
      <th>Vencimento</th>
      <th>Ações</th>
    </tr>
  `;

  const { data, error } = await supabase.from('clientes').select('*');

  if(error){ alert('Erro'); return; }

  renderClientes(data);
}

function renderClientes(data){
  let html = '';

  data.forEach(c=>{
    html += `
      <tr>
        <td>${c.nome||'-'}</td>
        <td>${c.telefone}</td>
        <td>${c.status}</td>
        <td>${c.vencimento||'-'}</td>
        <td>
          <button onclick="pagar('${c.id}')">Pago</button>
          <button onclick="humano('${c.id}', ${c.atendimento_humano})">
            ${c.atendimento_humano ? 'IA ON' : 'Humano'}
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML = html;
}

// CONTATOS
async function mostrarContatos(){
  tela = 'contatos';

  document.getElementById('thead').innerHTML = `
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Ações</th>
    </tr>
  `;

  const { data } = await supabase.from('contatos').select('*');

  let html = '';

  data.forEach(c=>{
    html += `
      <tr>
        <td>${c.nome||'Sem nome'}</td>
        <td>${c.telefone}</td>
        <td>
          <button onclick="virarCliente('${c.telefone}')">Virar Cliente</button>
        </td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML = html;
}

// VIRAR CLIENTE
async function virarCliente(telefone){
  await supabase.rpc('virar_cliente', { p_telefone: telefone });
  alert('Cliente criado');
  mostrarClientes();
}

// PAGAMENTO
async function pagar(id){
  await supabase.from('clientes')
    .update({ status:'ativo' })
    .eq('id', id);

  mostrarClientes();
}

// HUMANO
async function humano(id, atual){
  await supabase.from('clientes')
    .update({ atendimento_humano: !atual })
    .eq('id', id);

  mostrarClientes();
}

// BUSCA
async function buscar(){
  let termo = document.getElementById('busca').value;

  const { data } = await supabase
    .from(tela)
    .select('*')
    .ilike('telefone', `%${termo}%`);

  if(tela === 'clientes') renderClientes(data);
  else mostrarContatos();
}

mostrarClientes();
</script>

</body>
</html>
