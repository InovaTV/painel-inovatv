<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Painel InovaTV</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }

    button {
      margin: 4px;
      padding: 6px 12px;
      border: none;
      cursor: pointer;
      color: white;
      border-radius: 4px;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.95);
      opacity: 0.8;
    }

    .btn-azul { background: #2196F3; }
    .btn-verde { background: #4CAF50; }
    .btn-vermelho { background: #f44336; }
    .btn-amarelo { background: #ff9800; }
    .btn-cinza { background: #777; }

    .ativo {
      outline: 3px solid #000;
      font-weight: bold;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      padding: 8px;
    }

    #progress {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>Painel InovaTV</h2>

<button id="btnClientes" class="btn-azul" onclick="mostrarClientes()">Clientes</button>
<button id="btnContatos" class="btn-azul" onclick="mostrarContatos()">Contatos</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button class="btn-cinza" onclick="buscar()">Buscar</button>

<hr>

<h3>Importação</h3>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

<div id="progress"></div>

<hr>

<h3>Ações</h3>

<button class="btn-amarelo" onclick="toggleTodos(true)">Selecionar todos</button>
<button class="btn-amarelo" onclick="toggleTodos(false)">Desmarcar</button>
<button class="btn-amarelo" onclick="selecionarAtivos()">Ativos</button>
<button class="btn-amarelo" onclick="selecionarVencidos()">Vencidos</button>

<button class="btn-verde" onclick="renovarSelecionados()">Renovar</button>
<button class="btn-vermelho" onclick="deletarSelecionados()">Excluir</button>

<br><br>

<table border="1">
  <thead id="thead"></thead>
  <tbody id="tabela"></tbody>
</table>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela = 'clientes';

// ================= BOTÃO ATIVO
function ativarBotao(){
  document.getElementById("btnClientes").classList.remove("ativo");
  document.getElementById("btnContatos").classList.remove("ativo");

  if (tela === 'clientes'){
    document.getElementById("btnClientes").classList.add("ativo");
  } else {
    document.getElementById("btnContatos").classList.add("ativo");
  }
}

// ================= IMPORTAÇÃO
async function importarArquivo(){

  const file = document.getElementById("inputArquivo").files[0];
  if (!file) return alert("Selecione arquivo");

  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  for (let i=0;i<json.length;i++){

    document.getElementById("progress").innerText =
      `Importando ${i+1}/${json.length}`;

    let c = json[i];

    let telefone = (c.telefone || c.Telefone || "").toString().replace(/\D/g,"");

    if (!telefone) continue;

    await fetch("/api/importar-clientes", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ clientes:[{ nome:c.nome||c.Nome, telefone }] })
    });
  }

  document.getElementById("progress").innerText = "Finalizado 🚀";
  mostrarClientes();
}

// ================= CLIENTES
async function mostrarClientes(){

  tela = 'clientes';
  ativarBotao();

  document.getElementById('thead').innerHTML = `
    <tr>
      <th><input type="checkbox" onclick="toggleTodos(this.checked)"></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
      <th>Ações</th>
    </tr>
  `;

  const { data } = await client.from('clientes').select('*');

  let html = '';

  data.forEach(c=>{
    html += `
      <tr>
        <td><input type="checkbox" class="checkCliente" value="${c.id}" data-status="${c.status}"></td>
        <td>${c.nome}</td>
        <td>${c.telefone}</td>
        <td>${c.status}</td>
        <td>
          <button class="btn-verde" onclick="renovarCliente('${c.id}')">Renovar</button>
          <button class="btn-vermelho" onclick="deletarCliente('${c.id}')">Excluir</button>
        </td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML = html;
}

// ================= CONTATOS
async function mostrarContatos(){

  tela = 'contatos';
  ativarBotao();

  document.getElementById('thead').innerHTML = `
    <tr>
      <th><input type="checkbox" onclick="toggleTodos(this.checked)"></th>
      <th>Nome</th>
      <th>Telefone</th>
    </tr>
  `;

  const { data } = await client.from('contatos').select('*');

  let html = '';

  data.forEach(c=>{
    html += `
      <tr>
        <td><input type="checkbox" class="checkContato" value="${c.telefone}"></td>
        <td>${c.nome}</td>
        <td>${c.telefone}</td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML = html;
}

// ================= MASSA
function toggleTodos(checked){
  document.querySelectorAll("input[type='checkbox']")
    .forEach(c => c.checked = checked);
}

function selecionarAtivos(){
  document.querySelectorAll(".checkCliente")
    .forEach(c => c.checked = c.dataset.status === "ativo");
}

function selecionarVencidos(){
  document.querySelectorAll(".checkCliente")
    .forEach(c => c.checked = c.dataset.status === "inativo");
}

// ================= RENOVAR
async function renovarCliente(id){

  const nova = new Date();
  nova.setDate(nova.getDate()+30);

  await client.from('clientes')
    .update({ status:'ativo', vencimento:nova.toISOString().split('T')[0] })
    .eq('id', id);

  mostrarClientes();
}

async function renovarSelecionados(){

  const checks = document.querySelectorAll(".checkCliente:checked");

  for (const c of checks){
    await renovarCliente(c.value);
  }

  alert("Renovados 🚀");
}

// ================= DELETE
async function deletarSelecionados(){

  if (tela === 'clientes'){
    const checks = document.querySelectorAll(".checkCliente:checked");
    for (const c of checks){
      await client.from('clientes').delete().eq('id', c.value);
    }
    mostrarClientes();
  }

  alert("Excluídos 🚀");
}

async function deletarCliente(id){
  await client.from('clientes').delete().eq('id', id);
  mostrarClientes();
}

// ================= BUSCA
async function buscar(){

  let termo = document.getElementById('busca').value;

  const { data } = await client
    .from(tela)
    .select('*')
    .or(`telefone.ilike.%${termo}%,nome.ilike.%${termo}%`);

  let html = '';

  data.forEach(c=>{
    html += `<tr><td>${c.nome}</td><td>${c.telefone}</td><td>${c.status||''}</td></tr>`;
  });

  document.getElementById('tabela').innerHTML = html;
}

// INIT
mostrarClientes();

</script>

</body>
</html>
