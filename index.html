<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }

button { margin:4px; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; }

.btn-azul { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }
.btn-neutro { background:#ddd; }

.ativo { outline:3px solid #000; }

#progressBar { width:100%; background:#ccc; height:20px; }
#progress { width:0%; height:100%; background:green; color:#fff; text-align:center; }

table { width:100%; border-collapse: collapse; }
th,td { padding:8px; }

.card { margin-top:20px; padding:10px; background:#f5f5f5; }
</style>
</head>

<body>

<h2>Painel InovaTV</h2>

<button id="btnClientes" class="btn-azul" onclick="mostrarClientes()">Clientes</button>
<button id="btnContatos" class="btn-azul" onclick="mostrarContatos()">Contatos</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

<div id="progressBar">
  <div id="progress">0%</div>
</div>

<div id="logImportacao"></div>

<hr>

<h3>Ações</h3>

<div id="contador">Selecionados: 0</div>

<button onclick="toggleTodos(true)">Selecionar todos</button>
<button onclick="toggleTodos(false)">Desmarcar</button>
<button onclick="selecionarAtivos()">Ativos</button>
<button onclick="selecionarVencidos()">Vencidos</button>

<button class="btn-verde" onclick="renovarSelecionados()">Renovar</button>
<button class="btn-vermelho" onclick="deletarSelecionados()">Excluir</button>

<br><br>

<table border="1">
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<div class="card">
<h3>Financeiro</h3>

💰 Total: <span id="total">0</span><br>
📅 Mês atual: <span id="mes">0</span><br>
🔮 Previsão: <span id="prev">0</span><br>
⚠️ Vencidos hoje: <span id="hoje">0</span><br>
⚠️ Vencem amanhã: <span id="amanha">0</span>

</div>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela = 'clientes';

// ================= CONTADOR
function atualizarContador(){
  document.getElementById("contador").innerText =
    "Selecionados: " + document.querySelectorAll(".check:checked").length;
}

// ================= CLIENTES
async function mostrarClientes(){

  tela='clientes';

  const { data } = await client.from('clientes').select('*');

  atualizarFinanceiro(data);

  thead.innerHTML = `
    <tr>
      <th><input type="checkbox" onclick="toggleTodos(this.checked)"></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
      <th>Vencimento</th>
      <th>Ações</th>
    </tr>
  `;

  let html='';

  data.forEach(c=>{

    html+=`
    <tr>
      <td><input type="checkbox" class="check" data-id="${c.id}" data-status="${c.status}" onchange="atualizarContador()"></td>
      <td>${c.nome}</td>
      <td>${c.telefone}</td>
      <td>${c.status}</td>
      <td>${c.vencimento||'-'}</td>
      <td>
        <button onclick="renovarCliente('${c.id}')">Renovar</button>
        <button onclick="deletarCliente('${c.id}')">Excluir</button>
        <button>Humano</button>
      </td>
    </tr>
    `;
  });

  tabela.innerHTML = html;
}

// ================= CONTATOS
async function mostrarContatos(){

  tela='contatos';

  const { data } = await client.from('contatos').select('*');

  thead.innerHTML = `
    <tr>
      <th><input type="checkbox" onclick="toggleTodos(this.checked)"></th>
      <th>Nome</th>
      <th>Telefone</th>
    </tr>
  `;

  let html='';

  data.forEach(c=>{
    html+=`
    <tr>
      <td><input type="checkbox" class="check" onchange="atualizarContador()"></td>
      <td>${c.nome}</td>
      <td>${c.telefone}</td>
    </tr>
    `;
  });

  tabela.innerHTML = html;
}

// ================= IMPORTAÇÃO 100%
async function importarArquivo(){

  const file = inputArquivo.files[0];
  if(!file) return alert("Selecione arquivo");

  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  let sucesso=0, erro=0;

  for(let i=0;i<json.length;i++){

    let c = json[i];

    let telefone = (c.telefone||c.Telefone||"")
      .toString()
      .replace(/\D/g,"");

    if(!telefone){
      erro++;
      continue;
    }

    try{

      await fetch("/api/importar-clientes",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
          clientes:[{
            nome:c.nome||c.Nome,
            telefone,
            status:c.status||'ativo',
            valor:c.valor||35
          }]
        })
      });

      sucesso++;

    }catch{
      erro++;
    }

    let p = Math.floor(((i+1)/json.length)*100);
    progress.style.width = p+"%";
    progress.innerText = p+"%";
  }

  logImportacao.innerHTML =
    `Importados: ${sucesso} | Erros: ${erro}`;

  mostrarClientes();
}

// ================= FILTROS
function selecionarAtivos(){
  document.querySelectorAll(".check").forEach(c=>{
    c.checked = c.dataset.status === "ativo";
  });
  atualizarContador();
}

function selecionarVencidos(){

  let hoje = new Date();

  document.querySelectorAll(".check").forEach(c=>{

    let row = c.closest("tr").children[4].innerText;

    if(!row || row==='-') return;

    let venc = new Date(row);

    c.checked = venc < hoje;
  });

  atualizarContador();
}

// ================= MASSA
function toggleTodos(v){
  document.querySelectorAll(".check").forEach(c=>c.checked=v);
  atualizarContador();
}

// ================= RENOVAR
async function renovarCliente(id){

  let d = new Date();
  d.setDate(d.getDate()+30);

  await client.from('clientes')
    .update({ vencimento:d.toISOString().split('T')[0], status:'ativo' })
    .eq('id', id);

  mostrarClientes();
}

async function renovarSelecionados(){

  let checks = document.querySelectorAll(".check:checked");

  for(let c of checks){
    await renovarCliente(c.dataset.id);
  }

  alert("Renovados");
}

// ================= DELETE
async function deletarCliente(id){
  await client.from('clientes').delete().eq('id', id);
  mostrarClientes();
}

async function deletarSelecionados(){

  let checks = document.querySelectorAll(".check:checked");

  for(let c of checks){
    await client.from('clientes').delete().eq('id', c.dataset.id);
  }

  mostrarClientes();
}

// ================= FINANCEIRO REAL
function atualizarFinanceiro(data){

  let hoje = new Date();
  let amanha = new Date();
  amanha.setDate(hoje.getDate()+1);

  let total=0, mes=0, hojeV=0, amanhaV=0;

  let mesAtual = hoje.toISOString().substring(0,7);

  data.forEach(c=>{

    let valor = c.valor||0;

    if(c.status==='ativo') total+=valor;

    if(c.vencimento){

      if(c.vencimento.startsWith(mesAtual)) mes+=valor;

      let v = new Date(c.vencimento);

      if(v.toDateString()===hoje.toDateString()) hojeV++;
      if(v.toDateString()===amanha.toDateString()) amanhaV++;
    }

  });

  total.innerText = total;
  document.getElementById("mes").innerText = mes;
  document.getElementById("prev").innerText = total;
  document.getElementById("hoje").innerText = hojeV;
  document.getElementById("amanha").innerText = amanhaV;
}

// ================= BUSCA
async function buscar(){

  let termo = busca.value;

  const { data } = await client
    .from(tela)
    .select('*')
    .or(`telefone.ilike.%${termo}%,nome.ilike.%${termo}%`);

  let html='';

  data.forEach(c=>{
    html+=`<tr><td>${c.nome}</td><td>${c.telefone}</td></tr>`;
  });

  tabela.innerHTML = html;
}

// INIT
mostrarClientes();

</script>

</body>
</html>
