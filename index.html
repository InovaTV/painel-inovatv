<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }
button { margin:4px; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
.btn-topo { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }

#progressBar { width:100%; background:#ccc; height:20px; }
#progress { width:0%; height:100%; background:green; color:#fff; text-align:center; }

table { width:100%; border-collapse: collapse; font-size:13px; }
th,td { padding:6px; border:1px solid #ccc; }
</style>
</head>

<body>

<h2>Painel InovaTV</h2>
<h3 id="statusTela">Você está em: CLIENTES</h3>

<button class="btn-topo" onclick="trocarTela('clientes')">Clientes</button>
<button class="btn-topo" onclick="trocarTela('contatos')">Contatos</button>
<button class="btn-topo" onclick="abrirFinanceiro()">Financeiro</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

<div id="progressBar"><div id="progress">0%</div></div>

<hr>

<div>
💰 Faturamento: R$ <span id="faturamento">0</span> |
✅ Ativos: <span id="ativos">0</span> |
❌ Inativos: <span id="inativos">0</span>
</div>

<hr>

<div id="contador">Selecionados: 0</div>

<button onclick="selecionarTodos()">Selecionar todos</button>
<button onclick="desmarcarTodos()">Desmarcar</button>
<button onclick="filtrarAtivos()">Ativos</button>
<button onclick="filtrarVencidos()">Vencidos</button>
<button class="btn-vermelho" onclick="deletarSelecionados()">Excluir</button>

<table>
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela='clientes';
let dados=[];

// ENTER busca
busca.addEventListener("keypress", e=>{
  if(e.key==="Enter") buscar();
});

// ================= TROCAR TELA
function trocarTela(tipo){
  tela = tipo;
  statusTela.innerText = "Você está em: " + tipo.toUpperCase();
  carregar();
}

// ================= CARREGAR
async function carregar(){

  const { data } = await client.from(tela).select('*');
  dados = data;

  if(tela==='clientes'){
    thead.innerHTML=`
    <tr>
    <th></th><th>Nome</th><th>Telefone</th><th>Vencimento</th><th>Hora</th><th>MAC</th><th>Status</th>
    </tr>`;
  } else {
    thead.innerHTML=`
    <tr>
    <th></th><th>Nome</th><th>Telefone</th>
    </tr>`;
  }

  render(dados);
  atualizarDashboard();
}

// ================= RENDER
function render(lista){

  let html='';

  lista.forEach(c=>{
    html+=`
    <tr>
      <td><input type="checkbox" class="check" data-id="${c.id}" data-status="${c.status||''}" onchange="contador()"></td>
      <td>${c.nome||''}</td>
      <td>${c.telefone||''}</td>
      ${tela==='clientes' ? `
        <td>${c.vencimento||''}</td>
        <td>${c.hora_vencimento||''}</td>
        <td>${c.mac||''}</td>
        <td>${c.status||''}</td>
      ` : ``}
    </tr>`;
  });

  tabela.innerHTML=html;
  contador();
}

// ================= CONTADOR
function contador(){
  contador.innerText = "Selecionados: " + document.querySelectorAll(".check:checked").length;
}

// ================= BUSCA
function buscar(){

  let termo = busca.value.toLowerCase();

  let filtrado = dados.filter(c =>
    (c.nome||'').toLowerCase().includes(termo) ||
    (c.telefone||'').includes(termo)
  );

  render(filtrado);
}

// ================= SELEÇÃO
function selecionarTodos(){
  document.querySelectorAll(".check").forEach(c=>c.checked=true);
  contador();
}

function desmarcarTodos(){
  document.querySelectorAll(".check").forEach(c=>c.checked=false);
  contador();
}

// ================= FILTROS
function filtrarAtivos(){
  render(dados.filter(c=>c.status==="ativo"));
}

function filtrarVencidos(){
  render(dados.filter(c=>c.status==="inativo"));
}

// ================= DELETE
async function deletarSelecionados(){

  let selecionados = document.querySelectorAll(".check:checked");

  if(selecionados.length===0) return alert("Selecione algo");

  if(!confirm("Excluir selecionados?")) return;

  let i=0;

  for(let c of selecionados){
    await client.from(tela).delete().eq('id', c.dataset.id);
    i++;
    progresso(i, selecionados.length);
  }

  alert("Excluído");
  carregar();
}

// ================= PROGRESSO
function progresso(a,t){
  let p=Math.floor((a/t)*100);
  progress.style.width=p+"%";
  progress.innerText=p+"%";
}

// ================= IMPORTAR (UPGRADE FINAL)
async function importarArquivo(){

  const file = inputArquivo.files[0];
  if(!file) return alert("Selecione arquivo");

  if(!confirm("Importar e atualizar clientes automaticamente?")) return;

  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  for(let i=0;i<json.length;i++){

    let c=json[i];

    let telefone = (c.telefone || c.telefone_ || "")
      .toString().replace(/\D/g,"");

    if(!telefone) continue;

    let vencimento = c.vencimen || null;
    let hora = c.hora_venc || null;

    let status="ativo";
    if(vencimento){
      if(new Date(vencimento) < new Date()) status="inativo";
    }

    const { data: ex } = await client
      .from('clientes')
      .select('id')
      .eq('telefone', telefone)
      .single();

    let payload = {
      nome: c.nome || "",
      telefone,
      usuario: c.usuario || "",
      senha: c.senha || "",
      vencimento,
      hora_vencimento: hora,
      status,
      valor: c.valor || 0,
      dispositivo: c.dispositiv || "",
      aplicativo: c.aplicativo || "",
      mac: c.mac || "",
      servidor: c.servidor || "",
      plano: c.plano || ""
    };

    if(ex){
      await client.from('clientes').update(payload).eq('telefone', telefone);
    } else {
      await client.from('clientes').insert(payload);
    }

    progresso(i+1,json.length);
  }

  alert("Importado 🚀");
  carregar();
}

// ================= DASH
function atualizarDashboard(){
  let total=0, ativos=0, inativos=0;

  dados.forEach(c=>{
    total += Number(c.valor||0);
    if(c.status==="ativo") ativos++;
    else inativos++;
  });

  faturamento.innerText = total;
  ativos.innerText = ativos;
  inativos.innerText = inativos;
}

// INIT
carregar();

</script>

</body>
</html>
