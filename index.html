<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }
button { margin:4px; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
.btn-topo { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }

#progressBar { width:100%; background:#ccc; height:20px; }
#progress { width:0%; height:100%; background:green; color:#fff; text-align:center; }

#logErro {
  background:#000;
  color:#0f0;
  padding:10px;
  margin-top:10px;
  font-size:12px;
  max-height:200px;
  overflow:auto;
}

table { width:100%; border-collapse: collapse; font-size:13px; }
th,td { padding:6px; border:1px solid #ccc; }
</style>
</head>

<body>

<h2>Painel InovaTV</h2>
<h3 id="statusTela">Você está em: CLIENTES</h3>

<button class="btn-topo" onclick="trocarTela('clientes')">Clientes</button>
<button class="btn-topo" onclick="trocarTela('contatos')">Contatos</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

<div id="progressBar"><div id="progress">0%</div></div>
<div id="logErro"></div>

<hr>

<div id="contadorSelecionados">Selecionados: 0</div>

<button onclick="selecionarTodos()">Selecionar todos</button>
<button onclick="desmarcarTodos()">Desmarcar</button>
<button onclick="filtrarAtivos()">Ativos</button>
<button onclick="filtrarVencidos()">Vencidos</button>
<button class="btn-vermelho" onclick="deletarSelecionados()">Excluir</button>

<table>
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela='clientes';
let dados=[];

function normalizar(texto){
  return (texto || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function calcularStatus(c){
  if(!c.vencimento) return "ativo";

  let agora = new Date();
  let venc = new Date(
    c.hora_vencimento
      ? `${c.vencimento}T${c.hora_vencimento}`
      : c.vencimento
  );

  return venc < agora ? "inativo" : "ativo";
}

function atualizarProgresso(a,t){
  let p=Math.floor((a/t)*100);
  progress.style.width=p+"%";
  progress.innerText=p+"%";
}

function trocarTela(tipo){
  tela=tipo;
  statusTela.innerText="Você está em: "+tipo.toUpperCase();
  carregar();
}

async function carregar(){
  const { data } = await client.from(tela).select('*');
  dados=data || [];

  if(tela==='clientes'){
    thead.innerHTML=`<tr>
      <th></th><th>Nome</th><th>Telefone</th><th>Usuário</th><th>Servidor</th>
      <th>Plano</th><th>Valor</th><th>Vencimento</th><th>Hora</th>
      <th>MAC</th><th>Status</th><th>Ações</th>
    </tr>`;
  } else {
    thead.innerHTML=`<tr>
      <th></th><th>Nome</th><th>Telefone</th><th>Ações</th>
    </tr>`;
  }

  render(dados);
}

function render(lista){
  let html='';

  lista.forEach(c=>{
    html+=`
    <tr>
      <td><input type="checkbox" class="check" data-id="${c.id}" onchange="atualizarSelecionados()"></td>
      <td>${c.nome||''}</td>
      <td>${c.telefone||''}</td>

      ${tela==='clientes' ? `
        <td>${c.usuario||''}</td>
        <td>${c.servidor||''}</td>
        <td>${c.plano||''}</td>
        <td>${c.valor||''}</td>
        <td>${c.vencimento||''}</td>
        <td>${c.hora_vencimento||''}</td>
        <td>${c.mac||''}</td>
        <td>${calcularStatus(c)}</td>
        <td><button onclick="editarCliente('${c.id}')">Editar</button></td>
      ` : `
        <td><button onclick="editarContato('${c.id}')">Editar</button></td>
      `}
    </tr>`;
  });

  tabela.innerHTML=html;
  atualizarSelecionados();
}

// 🔥 EDITAR COMPLETO CLIENTE
async function editarCliente(id){
  const { data } = await client.from('clientes').select('*').eq('id', id).single();

  let atualizado = {
    nome: prompt("Nome:", data.nome),
    telefone: prompt("Telefone:", data.telefone),
    usuario: prompt("Usuário:", data.usuario),
    senha: prompt("Senha:", data.senha),
    servidor: prompt("Servidor:", data.servidor),
    plano: prompt("Plano:", data.plano),
    valor: prompt("Valor:", data.valor),
    vencimento: prompt("Vencimento (YYYY-MM-DD):", data.vencimento),
    hora_vencimento: prompt("Hora (HH:MM):", data.hora_vencimento),
    mac: prompt("MAC:", data.mac),
    aplicativo: prompt("Aplicativo:", data.aplicativo),
    dispositivo: prompt("Dispositivo:", data.dispositivo),
    telas: prompt("Telas:", data.telas),
    forma_pagamento: prompt("Forma de pagamento:", data.forma_pagamento),
    observacao: prompt("Observação:", data.observacao)
  };

  await client.from('clientes').update(atualizado).eq('id', id);
  carregar();
}

// 🔥 EDITAR CONTATO COMPLETO
async function editarContato(id){
  const { data } = await client.from('contatos').select('*').eq('id', id).single();

  let atualizado = {
    nome: prompt("Nome:", data.nome),
    telefone: prompt("Telefone:", data.telefone),
    origem: prompt("Origem:", data.origem),
    pushname: prompt("Pushname:", data.pushname),
    etapa: prompt("Etapa:", data.etapa)
  };

  await client.from('contatos').update(atualizado).eq('id', id);
  carregar();
}

function buscar(){
  const termo = normalizar(document.getElementById("busca").value);
  if(!termo){ render(dados); return; }

  render(dados.filter(c =>
    normalizar(c.nome).includes(termo) ||
    (c.telefone||"").includes(termo)
  ));
}

window.onload = function(){
  document.getElementById("busca").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      e.preventDefault();
      buscar();
    }
  });
};

function filtrarAtivos(){ render(dados.filter(c=>calcularStatus(c)==="ativo")); }
function filtrarVencidos(){ render(dados.filter(c=>calcularStatus(c)==="inativo")); }

function atualizarSelecionados(){
  contadorSelecionados.innerText = "Selecionados: " + document.querySelectorAll(".check:checked").length;
}

function selecionarTodos(){ document.querySelectorAll(".check").forEach(c=>c.checked=true); atualizarSelecionados(); }
function desmarcarTodos(){ document.querySelectorAll(".check").forEach(c=>c.checked=false); atualizarSelecionados(); }

async function deletarSelecionados(){
  let selecionados = document.querySelectorAll(".check:checked");
  if(selecionados.length===0) return alert("Selecione algo");
  if(!confirm("Excluir selecionados?")) return;

  let i=0;
  for(let c of selecionados){
    await client.from(tela).delete().eq('id', c.dataset.id);
    i++;
    atualizarProgresso(i, selecionados.length);
  }

  alert("Excluído");
  carregar();
}

carregar();

</script>
</body>
</html>
