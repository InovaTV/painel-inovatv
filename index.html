<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{font-family:Arial;background:#0a0e27;color:#fff;margin:0}
.container{max-width:1200px;margin:auto;padding:20px}
.menu{display:flex;gap:10px;margin-bottom:20px}
.menu button{background:#1e244d;border:none;color:#fff;padding:10px;border-radius:8px;cursor:pointer}
.menu .active{background:#b024ff}
.stats{display:flex;gap:20px;margin-bottom:10px;font-weight:bold}
input{padding:8px;border-radius:6px;border:none;margin-bottom:10px;width:100%}
table{width:100%;border-collapse:collapse;background:#111}
th{background:#222;padding:10px}
td{padding:10px;border-bottom:1px solid #333}
tr.humano{background:#3a1111}
.btn{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;font-weight:bold}
.bot{background:#00d9ff;color:#000}
.humano-btn{background:#ff4d4d;color:#fff}
</style>
</head>

<body>

<div class="container">

<h2>📺 Painel InovaTV</h2>

<div class="menu">
<button id="btnClientes" class="active" onclick="trocar('clientes')">Clientes</button>
<button id="btnProdutos" onclick="trocar('produtos')">Produtos</button>
</div>

<div class="stats">
<div>Total: <span id="total">0</span></div>
<div>BOT: <span id="bot">0</span></div>
<div>HUMANO: <span id="humano">0</span></div>
</div>

<!-- CLIENTES -->
<div id="telaClientes">
<input id="busca" placeholder="Buscar cliente" oninput="carregar()">
<table>
<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Usuário</th>
<th>Plano</th>
<th>Valor</th>
<th>Vencimento</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>
</div>

<!-- PRODUTOS -->
<div id="telaProdutos" style="display:none">

<button onclick="abrirModal()">➕ Criar Produto</button>

<table>
<thead>
<tr>
<th>Img</th>
<th>Nome</th>
<th>Descrição</th>
<th>Valor</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="listaProdutos"></tbody>
</table>

</div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;justify-content:center;align-items:center">

<div style="background:#111;padding:20px;border-radius:10px;width:350px">

<h3 id="tituloModal">Produto</h3>

<input id="nomeProduto" placeholder="Nome">
<input id="valorProduto" placeholder="Valor">
<input id="descricaoProduto" placeholder="Descrição">
<input type="file" id="imagemProduto">

<img id="preview" style="width:100px;display:none;margin-top:10px">

<br><br>

<button onclick="salvarProduto()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>
</div>

<script>

const SUPABASE_URL="https://tiupgtbzikwmseecxbvo.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c"

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let editandoId=null
let imagemAtual=null

function tel(t){return(t||"").replace(/\D/g,"").slice(-11)}

function trocar(t){
document.getElementById("telaClientes").style.display=t==="clientes"?"block":"none"
document.getElementById("telaProdutos").style.display=t==="produtos"?"block":"none"
if(t==="produtos")carregarProdutos()
}

async function carregar(){

const busca=document.getElementById("busca").value
const lista=document.getElementById("lista")

let url=`${SUPABASE_URL}/functions/v1/rocket-clientes`
if(busca)url+=`?busca=${encodeURIComponent(busca)}`

const res=await fetch(url)
const json=await res.json()

let clientes=json.itens||[]

const {data}=await supabaseClient.from("atendimentos").select("*")

let mapa={}
(data||[]).forEach(a=>mapa[tel(a.telefone)]=a.humano)

let total=0,bot=0,hum=0

lista.innerHTML=""

clientes.forEach(c=>{
const t=tel(c.telefone)
const humano=mapa[t]===true

total++
humano?hum++:bot++

lista.innerHTML+=`
<tr>
<td>${c.nome}</td>
<td>${c.telefone}</td>
<td>${c.usuario||"-"}</td>
<td>${c.plano?.nome||"-"}</td>
<td>${c.valor}</td>
<td>${new Date(c.vencimento).toLocaleDateString()}</td>
<td style="display:flex;gap:5px">
<button class="btn bot" onclick="setModo('${t}',false)">BOT</button>
<button class="btn humano-btn" onclick="setModo('${t}',true)">HUMANO</button>
</td>
</tr>`
})

document.getElementById("total").innerText=total
document.getElementById("bot").innerText=bot
document.getElementById("humano").innerText=hum
}

async function setModo(telefone,humano){
await supabaseClient.from("atendimentos").upsert([{telefone,humano}])
carregar()
}

// ===== PRODUTOS =====

function abrirModal(p=null){

modal.style.display="flex"

if(p){
editandoId=p.id
imagemAtual=p.imagem||null
nomeProduto.value=p.nome
valorProduto.value=p.valor
descricaoProduto.value=p.descricao||""

if(p.imagem){
preview.src=p.imagem
preview.style.display="block"
}

}else{
editandoId=null
imagemAtual=null
nomeProduto.value=""
valorProduto.value=""
descricaoProduto.value=""
preview.style.display="none"
}
}

function fecharModal(){modal.style.display="none"}

imagemProduto.onchange=e=>{
const file=e.target.files[0]
if(file){
preview.src=URL.createObjectURL(file)
preview.style.display="block"
}
}

async function carregarProdutos(){

const res=await fetch(`${SUPABASE_URL}/rest/v1/produtos?select=*&order=criado_em.desc`,{
headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
})

const data=await res.json()

listaProdutos.innerHTML=""

data.forEach(p=>{
listaProdutos.innerHTML+=`
<tr>
<td>${p.imagem?`<img src="${p.imagem}" width="50">`:"-"}</td>
<td>${p.nome}</td>
<td>${p.descricao||"-"}</td>
<td>R$ ${p.valor}</td>
<td><button onclick="toggle('${p.id}',${p.ativo})">${p.ativo?"Ativo":"Inativo"}</button></td>
<td>
<button onclick='abrirModal(${JSON.stringify(p)})'>Editar</button>
<button onclick="excluirProduto('${p.id}')">Excluir</button>
</td>
</tr>`
})
}

async function salvarProduto(){

let nome=nomeProduto.value
let valor=valorProduto.value
let descricao=descricaoProduto.value
let file=imagemProduto.files[0]

let urlImg=imagemAtual

if(file){
let nomeArq=Date.now()+"_"+file.name

await fetch(`${SUPABASE_URL}/storage/v1/object/produtos/${nomeArq}`,{
method:"POST",
headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`},
body:file
})

urlImg=`${SUPABASE_URL}/storage/v1/object/public/produtos/${nomeArq}`
}

if(editandoId){

await fetch(`${SUPABASE_URL}/rest/v1/produtos?id=eq.${editandoId}`,{
method:"PATCH",
headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"},
body:JSON.stringify({nome,valor:Number(valor),descricao,imagem:urlImg})
})

}else{

await fetch(`${SUPABASE_URL}/rest/v1/produtos`,{
method:"POST",
headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"},
body:JSON.stringify({nome,valor:Number(valor),descricao,imagem:urlImg,ativo:true})
})
}

fecharModal()
carregarProdutos()
}

async function excluirProduto(id){
await fetch(`${SUPABASE_URL}/rest/v1/produtos?id=eq.${id}`,{
method:"DELETE",
headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
})
carregarProdutos()
}

async function toggle(id,atual){
await fetch(`${SUPABASE_URL}/rest/v1/produtos?id=eq.${id}`,{
method:"PATCH",
headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"},
body:JSON.stringify({ativo:!atual})
})
carregarProdutos()
}

carregar()

</script>

</body>
</html>
