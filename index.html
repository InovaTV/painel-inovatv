<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }

button {
  margin:4px;
  padding:6px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}

.btn-azul { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }
.btn-laranja { background:#ff9800; color:#fff; }
.btn-cinza { background:#ddd; }

#progressBar { width:100%; background:#ccc; height:20px; margin-top:10px; }
#progress { width:0%; height:100%; background:green; color:#fff; text-align:center; }

table { width:100%; border-collapse: collapse; }
th,td { padding:8px; border:1px solid #ccc; }
</style>
</head>

<body>

<h2>Painel InovaTV</h2>

<button class="btn-azul" onclick="mostrarClientes()">Clientes</button>
<button class="btn-azul" onclick="mostrarContatos()">Contatos</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button class="btn-cinza" onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

<div id="progressBar">
  <div id="progress">0%</div>
</div>

<hr>

<h3>Ações</h3>

<div id="contador">Selecionados: 0</div>

<button class="btn-cinza" onclick="selecionarTodos()">Selecionar todos</button>
<button class="btn-cinza" onclick="desmarcarTodos()">Desmarcar</button>

<button class="btn-laranja" onclick="selecionarAtivos()">Ativos</button>
<button class="btn-laranja" onclick="selecionarVencidos()">Vencidos</button>

<button class="btn-verde" onclick="renovarSelecionados()">Renovar</button>
<button class="btn-vermelho" onclick="deletarSelecionados()">Excluir</button>

<br><br>

<table>
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela = 'clientes';

// ================= CONTADOR
function atualizarContador(){
  contador.innerText =
    "Selecionados: " + document.querySelectorAll(".check:checked").length;
}

// ================= PROGRESSO
function atualizarProgresso(atual,total){
  let p = Math.floor((atual/total)*100);
  progress.style.width = p+"%";
  progress.innerText = p+"%";
}

function resetarProgresso(){
  progress.style.width = "0%";
  progress.innerText = "0%";
}

// ================= SELEÇÃO
function selecionarTodos(){
  document.querySelectorAll(".check").forEach(c=>c.checked=true);
  atualizarContador();
}

function desmarcarTodos(){
  document.querySelectorAll(".check").forEach(c=>c.checked=false);
  atualizarContador();
}

// ================= FILTROS
function selecionarAtivos(){
  if(tela !== 'clientes') return;

  document.querySelectorAll(".check").forEach(c=>{
    c.checked = c.dataset.status === "ativo";
  });

  atualizarContador();
}

function selecionarVencidos(){
  if(tela !== 'clientes') return;

  document.querySelectorAll(".check").forEach(c=>{
    c.checked = c.dataset.status === "inativo";
  });

  atualizarContador();
}

// ================= CLIENTES
async function mostrarClientes(){

  tela='clientes';
  resetarProgresso();

  const { data } = await client.from('clientes').select('*');

  thead.innerHTML = `
    <tr>
      <th><input type="checkbox" id="checkAll"></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
      <th>Ações</th>
    </tr>
  `;

  let html='';

  data.forEach(c=>{
    html+=`
    <tr>
      <td>
        <input type="checkbox"
          class="check"
          data-id="${c.id}"
          data-status="${c.status}"
          onchange="atualizarContador()">
      </td>
      <td>${c.nome}</td>
      <td>${c.telefone}</td>
      <td>${c.status}</td>
      <td>
        <button class="btn-verde" onclick="renovarCliente('${c.id}')">Renovar</button>
        <button class="btn-vermelho" onclick="deletarItem('${c.id}')">Excluir</button>
      </td>
    </tr>
    `;
  });

  tabela.innerHTML = html;

  document.getElementById("checkAll").onclick = function(){
    document.querySelectorAll(".check").forEach(c=>{
      c.checked = this.checked;
    });
    atualizarContador();
  };

  atualizarContador();
}

// ================= CONTATOS
async function mostrarContatos(){

  tela='contatos';
  resetarProgresso();

  const { data } = await client.from('contatos').select('*');

  thead.innerHTML = `
    <tr>
      <th><input type="checkbox" id="checkAll"></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Ações</th>
    </tr>
  `;

  let html='';

  data.forEach(c=>{
    html+=`
    <tr>
      <td>
        <input type="checkbox"
          class="check"
          data-id="${c.id}"
          onchange="atualizarContador()">
      </td>
      <td>${c.nome}</td>
      <td>${c.telefone}</td>
      <td>
        <button class="btn-vermelho" onclick="deletarItem('${c.id}')">Excluir</button>
      </td>
    </tr>
    `;
  });

  tabela.innerHTML = html;

  document.getElementById("checkAll").onclick = function(){
    document.querySelectorAll(".check").forEach(c=>{
      c.checked = this.checked;
    });
    atualizarContador();
  };

  atualizarContador();
}

// ================= IMPORTAR
async function importarArquivo(){

  const file = inputArquivo.files[0];
  if(!file) return alert("Selecione arquivo");

  if(!confirm("Deseja importar o arquivo?")) return;

  resetarProgresso();

  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  for(let i=0;i<json.length;i++){

    let c = json[i];

    let telefone = (c.telefone||c.Telefone||"")
      .toString().replace(/\D/g,"");

    if(!telefone) continue;

    await fetch("/api/importar-clientes",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        clientes:[{ nome:c.nome||c.Nome, telefone }]
      })
    });

    atualizarProgresso(i+1,json.length);
  }

  alert("Importado 🚀");
  mostrarClientes();
}

// ================= RENOVAR
async function renovarCliente(id){

  let d = new Date();
  d.setDate(d.getDate()+30);

  await client.from('clientes')
    .update({ vencimento:d.toISOString().split('T')[0], status:'ativo' })
    .eq('id', id);

  mostrarClientes();
}

async function renovarSelecionados(){

  let checks = document.querySelectorAll(".check:checked");

  if(checks.length === 0) return alert("Selecione pelo menos 1");

  for(let c of checks){
    await renovarCliente(c.dataset.id);
  }

  alert("Renovados 🚀");
}

// ================= DELETE
async function deletarItem(id){

  if(!confirm("Excluir item?")) return;

  await client.from(tela).delete().eq('id', id);

  if(tela==='clientes') mostrarClientes();
  else mostrarContatos();
}

async function deletarSelecionados(){

  let checks = document.querySelectorAll(".check:checked");

  if(checks.length === 0) return alert("Selecione pelo menos 1");

  if(!confirm("Excluir selecionados?")) return;

  for(let c of checks){
    await client.from(tela).delete().eq('id', c.dataset.id);
  }

  alert("Excluído 🚀");

  if(tela==='clientes') mostrarClientes();
  else mostrarContatos();
}

// ================= BUSCA
async function buscar(){

  let termo = busca.value;

  const { data } = await client
    .from(tela)
    .select('*')
    .or(`telefone.ilike.%${termo}%,nome.ilike.%${termo}%`);

  let html='';

  data.forEach(c=>{
    html+=`<tr><td>${c.nome}</td><td>${c.telefone}</td></tr>`;
  });

  tabela.innerHTML = html;
}

// INIT
mostrarClientes();

</script>

</body>
</html>
