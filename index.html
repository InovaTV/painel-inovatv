<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
/* (mantido igual) */
body{font-family: Arial;background:#0a0e27;color:#fff;margin:0;}
.container{max-width:1200px;margin:auto;padding:20px;}
.menu{display:flex;gap:10px;margin-bottom:20px;}
.menu button{background:#1e244d;border:none;color:#fff;padding:10px;border-radius:8px;cursor:pointer;}
.menu .active{background:#b024ff;}
.stats{display:flex;gap:20px;margin-bottom:10px;font-weight:bold;}
input{padding:8px;border-radius:6px;border:none;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;background:#111;}
th{background:#222;padding:10px;}
td{padding:10px;border-bottom:1px solid #333;}
tr.humano{background:#3a1111;}
.btn{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
.bot{ background:#00d9ff; color:#000; }
.humano-btn{ background:#ff4d4d; color:#fff; }
.delete{ background:#666; color:#fff; }
</style>
</head>

<body>

<div class="container">

<h2>📺 Painel InovaTV</h2>

<div class="menu">
    <button id="btnClientes" class="active" onclick="trocar('clientes')">Clientes</button>
    <button id="btnProdutos" onclick="trocar('produtos')">Produtos</button>
</div>

<div class="stats">
    <div>👥 Total: <span id="total">0</span></div>
    <div>🤖 BOT: <span id="bot">0</span></div>
    <div>👤 HUMANO: <span id="humano">0</span></div>
</div>

<div id="telaClientes">

<input id="busca" placeholder="Buscar cliente" oninput="carregar()">

<table>
<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Usuário</th>
<th>Plano</th>
<th>Valor</th>
<th>Vencimento</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

</div>

<div id="telaProdutos" style="display:none">

<h3>📦 Produtos</h3>

<input id="nomeProduto" placeholder="Nome">
<input id="valorProduto" placeholder="Valor">
<input id="descricaoProduto" placeholder="Descrição">
<input type="file" id="imagemProduto">

<button onclick="salvarProduto()">Salvar</button>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Valor</th>
<th>Status</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="listaProdutos"></tbody>
</table>

</div>

</div>

<script>

const SUPABASE_URL = "https://tiupgtbzikwmseecxbvo.supabase.co";
const SUPABASE_KEY = "SUA_KEY";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let editandoId = null;
let imagemAtual = null;

function tel(t){
    return (t || "").replace(/\D/g,"").slice(-11);
}

function trocar(t){
    document.getElementById("telaClientes").style.display =
        t==="clientes"?"block":"none";

    document.getElementById("telaProdutos").style.display =
        t==="produtos"?"block":"none";

    document.getElementById("btnClientes").classList.toggle("active", t==="clientes");
    document.getElementById("btnProdutos").classList.toggle("active", t==="produtos");

    if(t==="produtos") carregarProdutos();
}

// ================= CLIENTES =================
async function carregar(){

    const busca = document.getElementById("busca").value;
    const lista = document.getElementById("lista");

    lista.innerHTML = "<tr><td colspan='7'>Carregando...</td></tr>";

    let url = `${SUPABASE_URL}/functions/v1/rocket-clientes`;
    if(busca) url += `?busca=${encodeURIComponent(busca)}`;

    const res = await fetch(url);
    const json = await res.json();

    let clientes = json.itens || [];

    let mapa = {};

    const { data } = await supabaseClient
        .from("atendimentos")
        .select("*");

    (data || []).forEach(a=>{
        mapa[tel(a.telefone)] = a.humano;
    });

    let total = 0;
    let totalHumano = 0;
    let totalBot = 0;

    clientes = clientes.map(c=>{
        const t = tel(c.telefone);
        const humano = mapa[t] === true;

        total++;
        humano ? totalHumano++ : totalBot++;

        return { ...c, t, humano };
    });

    document.getElementById("total").innerText = total;
    document.getElementById("humano").innerText = totalHumano;
    document.getElementById("bot").innerText = totalBot;

    lista.innerHTML = "";

    clientes.forEach(c=>{
        lista.innerHTML += `
        <tr class="${c.humano ? 'humano':''}">
            <td>${c.nome}</td>
            <td>${c.telefone}</td>
            <td>${c.usuario || '-'}</td>
            <td>${c.plano?.nome || '-'}</td>
            <td>R$ ${c.valor}</td>
            <td>${new Date(c.vencimento).toLocaleDateString()}</td>
            <td style="display:flex; gap:6px;">
                <button class="btn bot" onclick="setModo('${c.t}', false)">🤖 BOT</button>
                <button class="btn humano-btn" onclick="setModo('${c.t}', true)">👤 HUMANO</button>
            </td>
        </tr>`;
    });
}

async function setModo(telefone, humano){
    await supabaseClient.from("atendimentos").upsert([{ telefone, humano }]);
    carregar();
}

// ================= PRODUTOS =================
async function carregarProdutos(){

    const lista = document.getElementById("listaProdutos");
    lista.innerHTML = "<tr><td colspan='4'>Carregando...</td></tr>";

    const res = await fetch(`${SUPABASE_URL}/rest/v1/produtos?select=*&order=criado_em.desc`, {
        headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`
        }
    });

    const data = await res.json();

    lista.innerHTML = "";

    data.forEach(p=>{
        lista.innerHTML += `
        <tr>
            <td>${p.nome}</td>
            <td>R$ ${p.valor}</td>
            <td>${p.ativo ? "Ativo":"Inativo"}</td>
            <td>
                <button onclick="editarProduto(${JSON.stringify(p)})">Editar</button>
                <button onclick="excluirProduto('${p.id}')">Excluir</button>
            </td>
        </tr>`;
    });
}

// ================= EDITAR =================
function editarProduto(p){

    editandoId = p.id;
    imagemAtual = p.imagem || null;

    document.getElementById("nomeProduto").value = p.nome || "";
    document.getElementById("valorProduto").value = p.valor || "";
    document.getElementById("descricaoProduto").value = p.descricao || "";

    alert("Modo edição ativado");
}

// ================= SALVAR =================
async function salvarProduto(){

    const nome = document.getElementById("nomeProduto").value;
    const valor = document.getElementById("valorProduto").value;
    const descricao = document.getElementById("descricaoProduto").value;
    const file = document.getElementById("imagemProduto").files[0];

    let urlImagem = imagemAtual;

    // upload nova imagem
    if(file){
        const nomeArquivo = Date.now() + "_" + file.name;

        await fetch(`${SUPABASE_URL}/storage/v1/object/produtos/${nomeArquivo}`, {
            method: "POST",
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`
            },
            body: file
        });

        urlImagem = `${SUPABASE_URL}/storage/v1/object/public/produtos/${nomeArquivo}`;
    }

    if(editandoId){

        // 🔥 UPDATE
        await fetch(`${SUPABASE_URL}/rest/v1/produtos?id=eq.${editandoId}`, {
            method: "PATCH",
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nome,
                valor: Number(valor),
                descricao,
                imagem: urlImagem
            })
        });

        editandoId = null;
        imagemAtual = null;

    } else {

        // 🔥 INSERT
        await fetch(`${SUPABASE_URL}/rest/v1/produtos`, {
            method: "POST",
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nome,
                valor: Number(valor),
                descricao,
                imagem: urlImagem,
                ativo: true
            })
        });
    }

    // limpa campos
    document.getElementById("nomeProduto").value = "";
    document.getElementById("valorProduto").value = "";
    document.getElementById("descricaoProduto").value = "";
    document.getElementById("imagemProduto").value = "";

    carregarProdutos();
}

// ================= EXCLUIR =================
async function excluirProduto(id){

    await fetch(`${SUPABASE_URL}/rest/v1/produtos?id=eq.${id}`, {
        method: "DELETE",
        headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`
        }
    });

    carregarProdutos();
}

carregar();

</script>

</body>
</html>
