<!DOCTYPE html>
<html>
<head>
  <title>Painel InovaTV</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    button { margin: 3px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 8px; }
  </style>
</head>
<body>

<h2>Painel InovaTV</h2>

<button onclick="mostrarClientes()">Clientes</button>
<button onclick="mostrarContatos()">Contatos</button>

<br><br>

<input id="busca" placeholder="Telefone">
<button onclick="buscar()">Buscar</button>

<hr>

<h3>Importação</h3>

<input type="file" id="inputCSV" accept=".csv" />
<button onclick="importarCSV()">IMPORTAR CSV</button>
<button onclick="novoCliente()">NOVO CLIENTE</button>

<br><br>

<table border="1">
  <thead id="thead"></thead>
  <tbody id="tabela"></tbody>
</table>

<script>

const { createClient } = supabase;

const client = createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela = 'clientes';

// ================= CLIENTES
async function mostrarClientes(){
  tela = 'clientes';

  document.getElementById('thead').innerHTML = `
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
      <th>Vencimento</th>
      <th>Ações</th>
    </tr>
  `;

  const { data } = await client.from('clientes').select('*');

  let html = '';

  data.forEach(c=>{
    html += `
      <tr>
        <td>${c.nome || '-'}</td>
        <td>${c.telefone}</td>
        <td>${c.status || '-'}</td>
        <td>${c.vencimento || '-'}</td>
        <td>
          <button onclick="pagar('${c.id}')">Pago</button>
          <button onclick="editarCliente('${c.id}','${c.nome}','${c.telefone}')">Editar</button>
          <button onclick="deletarCliente('${c.id}')">Excluir</button>
          <button onclick="humano('${c.id}', ${c.atendimento_humano})">
            ${c.atendimento_humano ? 'IA ON' : 'Humano'}
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML = html;
}

// ================= CONTATOS
async function mostrarContatos(){
  tela = 'contatos';

  document.getElementById('thead').innerHTML = `
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Ações</th>
    </tr>
  `;

  const { data } = await client.from('contatos').select('*');

  let html = '';

  data.forEach(c=>{
    html += `
      <tr>
        <td>${c.nome || 'Sem nome'}</td>
        <td>${c.telefone}</td>
        <td>
          <button onclick="virarCliente('${c.telefone}')">Virar Cliente</button>
          <button onclick="editarContato('${c.telefone}','${c.nome}')">Editar</button>
          <button onclick="deletarContato('${c.telefone}')">Excluir</button>
        </td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML = html;
}

// ================= IMPORTAR CSV (CORRIGIDO)
async function importarCSV(){

  const file = document.getElementById("inputCSV").files[0];

  if (!file){
    alert("Selecione um CSV");
    return;
  }

  let text = await file.text();
  text = text.replace(/\r/g, "");

  const separador = text.includes(";") ? ";" : ",";

  const linhas = text.split("\n").filter(l => l.trim() !== "");

  const cab = linhas[0].split(separador).map(c => c.trim().toLowerCase());

  const clientes = [];

  for (let i = 1; i < linhas.length; i++){

    const dados = linhas[i].split(separador);

    let obj = {};

    cab.forEach((c, index)=>{
      obj[c] = dados[index]?.trim();
    });

    if (!obj.telefone || obj.telefone.length < 8) continue;

    clientes.push(obj);
  }

  console.log("CLIENTES:", clientes);

  await fetch("/api/importar-clientes", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ clientes })
  });

  alert("Importado 🚀");
  location.reload();
}

// ================= NOVO CLIENTE
async function novoCliente(){
  const nome = prompt("Nome:");
  const telefone = prompt("Telefone:");
  if (!nome || !telefone) return;

  await fetch("/api/importar-clientes", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ clientes:[{ nome, telefone }] })
  });

  alert("Cliente criado 🚀");
  location.reload();
}

// ================= FUNÇÕES CRUD
async function pagar(id){
  await client.from('clientes').update({ status:'ativo' }).eq('id', id);
  mostrarClientes();
}

async function humano(id, atual){
  await client.from('clientes')
    .update({ atendimento_humano: !atual })
    .eq('id', id);
  mostrarClientes();
}

async function editarCliente(id, nomeAtual, telefoneAtual){
  const nome = prompt("Nome:", nomeAtual);
  const telefone = prompt("Telefone:", telefoneAtual);
  if (!nome || !telefone) return;

  await client.from('clientes').update({ nome, telefone }).eq('id', id);
  mostrarClientes();
}

async function deletarCliente(id){
  if (!confirm("Excluir cliente?")) return;
  await client.from('clientes').delete().eq('id', id);
  mostrarClientes();
}

async function editarContato(telefone, nomeAtual){
  const nome = prompt("Nome:", nomeAtual);
  if (!nome) return;
  await client.from('contatos').update({ nome }).eq('telefone', telefone);
  mostrarContatos();
}

async function deletarContato(telefone){
  if (!confirm("Excluir contato?")) return;
  await client.from('contatos').delete().eq('telefone', telefone);
  mostrarContatos();
}

async function virarCliente(telefone){
  await client.rpc('virar_cliente', { p_telefone: telefone });
  mostrarClientes();
}

async function buscar(){
  let termo = document.getElementById('busca').value;
  const { data } = await client.from(tela).select('*').ilike('telefone', `%${termo}%`);
  let html = '';
  data.forEach(c=>{
    html += `<tr><td>${c.nome}</td><td>${c.telefone}</td><td>${c.status||'-'}</td><td>${c.vencimento||'-'}</td><td>-</td></tr>`;
  });
  document.getElementById('tabela').innerHTML = html;
}

// INIT
mostrarClientes();

</script>
</body>
</html>
