<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }

button {
  margin:4px;
  padding:6px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}

.btn-azul { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }
.btn-cinza { background:#ddd; }

#progressBar { width:100%; background:#ccc; height:20px; margin-top:10px; }
#progress { width:0%; height:100%; background:green; color:#fff; text-align:center; }

table { width:100%; border-collapse: collapse; }
th,td { padding:8px; }
</style>
</head>

<body>

<h2>Painel InovaTV</h2>

<button class="btn-azul" onclick="mostrarClientes()">Clientes</button>
<button class="btn-azul" onclick="mostrarContatos()">Contatos</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button class="btn-cinza" onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

<div id="progressBar">
  <div id="progress">0%</div>
</div>

<div id="logImportacao"></div>

<hr>

<h3>Ações</h3>

<div id="contador">Selecionados: 0</div>

<button onclick="toggleTodos(true)">Selecionar todos</button>
<button onclick="toggleTodos(false)">Desmarcar</button>
<button onclick="selecionarAtivos()">Ativos</button>
<button onclick="selecionarVencidos()">Vencidos</button>

<button class="btn-verde" onclick="renovarSelecionados()">Renovar</button>
<button class="btn-vermelho" onclick="deletarSelecionados()">Excluir</button>

<br><br>

<table border="1">
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela = 'clientes';

// ================= PROGRESSO
function atualizarProgresso(atual,total){
  let p = Math.floor((atual/total)*100);
  progress.style.width = p+"%";
  progress.innerText = p+"%";
}

function resetarProgresso(){
  progress.style.width = "0%";
  progress.innerText = "0%";
}

// ================= IMPORTAÇÃO COM CONFIRMAÇÃO
async function importarArquivo(){

  const file = inputArquivo.files[0];
  if(!file) return alert("Selecione arquivo");

  if(!confirm(`Deseja importar este arquivo?\n\nIsso pode adicionar ou atualizar clientes.`))
    return;

  resetarProgresso();
  logImportacao.innerHTML = "Iniciando...";

  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  let sucesso = 0;
  let erro = 0;

  for(let i=0;i<json.length;i++){

    let c = json[i];

    let telefone = (c.telefone||c.Telefone||"")
      .toString().replace(/\D/g,"");

    if(!telefone){
      erro++;
      continue;
    }

    try{

      let res = await fetch("/api/importar-clientes",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
          clientes:[{
            nome:c.nome||c.Nome||"Sem nome",
            telefone
          }]
        })
      });

      if(res.ok) sucesso++;
      else erro++;

    }catch(e){
      erro++;
    }

    atualizarProgresso(i+1,json.length);
  }

  logImportacao.innerHTML =
    `✅ Importados: ${sucesso} | ❌ Erros: ${erro}`;

  alert("Importação finalizada 🚀");

  mostrarClientes();
}

// ================= DELETE INDIVIDUAL
async function deletarItem(id){

  let tipo = tela === 'clientes' ? 'cliente' : 'contato';

  if(!confirm(`Tem certeza que deseja excluir este ${tipo}?`))
    return;

  resetarProgresso();

  await client.from(tela).delete().eq('id', id);

  atualizarProgresso(1,1);

  if(tela==='clientes') mostrarClientes();
  else mostrarContatos();
}

// ================= DELETE MASSA COM CONFIRMAÇÃO
async function deletarSelecionados(){

  let checks = document.querySelectorAll(".check:checked");
  let total = checks.length;

  if(total===0) return alert("Selecione pelo menos 1");

  let tipo = tela === 'clientes' ? 'clientes' : 'contatos';

  if(!confirm(`⚠️ ATENÇÃO\n\nVocê está excluindo ${total} ${tipo}.\n\nDeseja continuar?`))
    return;

  resetarProgresso();

  let i=0;

  for(let c of checks){

    await client.from(tela)
      .delete()
      .eq('id', c.dataset.id);

    i++;
    atualizarProgresso(i,total);
  }

  alert("Exclusão concluída 🚀");

  if(tela==='clientes') mostrarClientes();
  else mostrarContatos();
}

// ================= CLIENTES
async function mostrarClientes(){

  tela='clientes';

  const { data } = await client.from('clientes').select('*');

  thead.innerHTML = `
    <tr>
      <th><input type="checkbox" onclick="toggleTodos(this.checked)"></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
      <th>Ações</th>
    </tr>
  `;

  let html='';

  data.forEach(c=>{
    html+=`
    <tr>
      <td><input type="checkbox" class="check" data-id="${c.id}"></td>
      <td>${c.nome}</td>
      <td>${c.telefone}</td>
      <td>${c.status}</td>
      <td>
        <button class="btn-vermelho" onclick="deletarItem('${c.id}')">Excluir</button>
      </td>
    </tr>
    `;
  });

  tabela.innerHTML = html;
}

// ================= CONTATOS
async function mostrarContatos(){

  tela='contatos';

  const { data } = await client.from('contatos').select('*');

  thead.innerHTML = `
    <tr>
      <th><input type="checkbox" onclick="toggleTodos(this.checked)"></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Ações</th>
    </tr>
  `;

  let html='';

  data.forEach(c=>{
    html+=`
    <tr>
      <td><input type="checkbox" class="check" data-id="${c.id}"></td>
      <td>${c.nome}</td>
      <td>${c.telefone}</td>
      <td>
        <button class="btn-vermelho" onclick="deletarItem('${c.id}')">Excluir</button>
      </td>
    </tr>
    `;
  });

  tabela.innerHTML = html;
}

// ================= MASSA
function toggleTodos(v){
  document.querySelectorAll(".check").forEach(c=>c.checked=v);
}

// ================= BUSCA
async function buscar(){

  let termo = busca.value;

  const { data } = await client
    .from(tela)
    .select('*')
    .or(`telefone.ilike.%${termo}%,nome.ilike.%${termo}%`);

  let html='';

  data.forEach(c=>{
    html+=`<tr><td>${c.nome}</td><td>${c.telefone}</td></tr>`;
  });

  tabela.innerHTML = html;
}

// INIT
mostrarClientes();

</script>

</body>
</html>
