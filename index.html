<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding:20px; }
.dark { background:#121212; color:#fff; }

button { margin:4px; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; }

.btn-azul { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }
.btn-neutro { background:#ddd; }

.dark .btn-neutro { background:#333; color:#fff; }

.ativo { outline:3px solid #000; }

table { width:100%; border-collapse: collapse; }
th,td { padding:8px; }

.card { background:#fff; padding:10px; margin-top:20px; }
.dark .card { background:#1e1e1e; }

#contador {
  font-weight: bold;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h2>Painel InovaTV</h2>

<button id="btnClientes" class="btn-azul" onclick="mostrarClientes()">Clientes</button>
<button id="btnContatos" class="btn-azul" onclick="mostrarContatos()">Contatos</button>
<button class="btn-neutro" onclick="toggleDark()">🌙 Tema</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button class="btn-neutro" onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

<hr>

<h3>Ações</h3>

<div id="contador">Selecionados: 0</div>

<button class="btn-neutro" onclick="toggleTodos(true)">Selecionar todos</button>
<button class="btn-neutro" onclick="toggleTodos(false)">Desmarcar</button>
<button class="btn-neutro" onclick="selecionarAtivos()">Ativos</button>
<button class="btn-neutro" onclick="selecionarVencidos()">Vencidos</button>

<button class="btn-verde" onclick="renovarSelecionados()">Renovar</button>
<button class="btn-vermelho" onclick="deletarSelecionados()">Excluir</button>

<br><br>

<table border="1">
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<div class="card">
<h3>Dashboard</h3>

💰 Total: R$ <span id="totalValor">0</span><br>
📅 Faturamento mês: R$ <span id="mesValor">0</span><br>
🔮 Previsão: R$ <span id="previsao">0</span><br>
⚠️ Vencem amanhã: <span id="venceAmanha">0</span><br>
👥 Ativos: <span id="totalAtivos">0</span><br>
❌ Inativos: <span id="totalInativos">0</span>

<br><br>

<canvas id="graficoClientes" height="100"></canvas>
<canvas id="graficoFaturamento" height="100"></canvas>

</div>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela = 'clientes';
let grafico1, grafico2;

// ================= CONTADOR
function atualizarContador(){

  let total = document.querySelectorAll("input[type='checkbox']:checked").length;

  document.getElementById("contador").innerText =
    "Selecionados: " + total;
}

// ================= DARK
function toggleDark(){
  document.body.classList.toggle("dark");
}

// ================= BOTÃO ATIVO
function ativarBotao(){
  document.getElementById("btnClientes").classList.remove("ativo");
  document.getElementById("btnContatos").classList.remove("ativo");

  if(tela==='clientes'){
    document.getElementById("btnClientes").classList.add("ativo");
  } else {
    document.getElementById("btnContatos").classList.add("ativo");
  }
}

// ================= DASHBOARD
function atualizarDashboard(data){

  let hoje = new Date();
  let amanha = new Date();
  amanha.setDate(hoje.getDate()+1);

  let ativos = data.filter(c=>c.status==='ativo');
  let total = ativos.reduce((s,c)=>s+(c.valor||0),0);

  let mesAtual = hoje.toISOString().substring(0,7);

  let mesValor = data.filter(c=>c.vencimento?.startsWith(mesAtual))
                     .reduce((s,c)=>s+(c.valor||0),0);

  let venceAmanha = data.filter(c=>{
    if(!c.vencimento) return false;
    return new Date(c.vencimento).toDateString() === amanha.toDateString();
  }).length;

  document.getElementById("totalValor").innerText = total;
  document.getElementById("mesValor").innerText = mesValor;
  document.getElementById("previsao").innerText = total;
  document.getElementById("venceAmanha").innerText = venceAmanha;
  document.getElementById("totalAtivos").innerText = ativos.length;
  document.getElementById("totalInativos").innerText =
    data.filter(c=>c.status==='inativo').length;

  // gráfico clientes
  let meses = {};
  data.forEach(c=>{
    if(!c.criado_em) return;
    let m = c.criado_em.substring(0,7);
    meses[m] = (meses[m]||0)+1;
  });

  if(grafico1) grafico1.destroy();
  grafico1 = new Chart(document.getElementById("graficoClientes"),{
    type:'line',
    data:{ labels:Object.keys(meses), datasets:[{ label:'Clientes', data:Object.values(meses) }] }
  });

  // gráfico faturamento
  let faturamento = {};
  data.forEach(c=>{
    if(!c.vencimento) return;
    let m = c.vencimento.substring(0,7);
    faturamento[m] = (faturamento[m]||0)+(c.valor||0);
  });

  if(grafico2) grafico2.destroy();
  grafico2 = new Chart(document.getElementById("graficoFaturamento"),{
    type:'bar',
    data:{ labels:Object.keys(faturamento), datasets:[{ label:'Faturamento', data:Object.values(faturamento) }] }
  });
}

// ================= CLIENTES
async function mostrarClientes(){

  tela='clientes';
  ativarBotao();

  const { data } = await client.from('clientes').select('*');
  atualizarDashboard(data);

  document.getElementById('thead').innerHTML=`
    <tr>
      <th><input type="checkbox" onclick="toggleTodos(this.checked)"></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
    </tr>
  `;

  let html='';

  data.forEach(c=>{
    html+=`
      <tr>
        <td><input type="checkbox" class="checkCliente" onchange="atualizarContador()"></td>
        <td>${c.nome}</td>
        <td>${c.telefone}</td>
        <td>${c.status}</td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML=html;
}

// ================= CONTATOS COM CHECKBOX
async function mostrarContatos(){

  tela='contatos';
  ativarBotao();

  const { data } = await client.from('contatos').select('*');

  document.getElementById('thead').innerHTML=`
    <tr>
      <th><input type="checkbox" onclick="toggleTodos(this.checked)"></th>
      <th>Nome</th>
      <th>Telefone</th>
    </tr>
  `;

  let html='';

  data.forEach(c=>{
    html+=`
      <tr>
        <td><input type="checkbox" class="checkContato" onchange="atualizarContador()"></td>
        <td>${c.nome}</td>
        <td>${c.telefone}</td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML=html;
}

// ================= MASSA
function toggleTodos(checked){
  document.querySelectorAll("input[type='checkbox']")
    .forEach(c=>c.checked=checked);

  atualizarContador();
}

function selecionarAtivos(){
  document.querySelectorAll(".checkCliente")
    .forEach(c=>c.checked=c.dataset?.status==="ativo");

  atualizarContador();
}

function selecionarVencidos(){
  document.querySelectorAll(".checkCliente")
    .forEach(c=>c.checked=c.dataset?.status==="inativo");

  atualizarContador();
}

// INIT
mostrarClientes();

</script>

</body>
</html>
