  function tratarDataExcel(valor){

  if(!valor) return null;

  // 🔢 número (excel)
  if(typeof valor === "number"){
    const data = new Date((valor - 25569) * 86400 * 1000);
    return data.toISOString().split("T")[0];
  }

  // 📅 formato BR
  if(typeof valor === "string" && valor.includes("/")){
    const p = valor.split("/");
    if(p.length === 3){
      return `${p[2]}-${p[1]}-${p[0]}`;
    }
  }

  // 📅 já correto
  if(typeof valor === "string" && valor.includes("-")){
    return valor;
  }

  return null;
}

// ===== STATUS =====
function calcularStatus(c){

  if(!c.vencimento || !c.hora_vencimento){
    return "-";
  }

  let hoje = new Date();
  hoje.setHours(0,0,0,0);

  let data = c.vencimento.split("-");
  let venc = new Date(data[0], data[1]-1, data[2]);

  return venc < hoje ? "inativo" : "ativo";
}

// ===== CONTADOR =====
function atualizarContadorStatus(lista){

  let ativos = 0;
  let vencidos = 0;

  lista.forEach(c=>{
    let status = calcularStatus(c);
    if(status === "ativo") ativos++;
    if(status === "inativo") vencidos++;
  });

}

function normalizar(t){
  return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

// ===== EDITAR =====
async function editar(id){

  const { data } = await client.from(tela).select('*').eq('id',id).single();

  let campos;

  // 🔥 DEFINE CAMPOS POR TELA (SEM QUEBRAR CONTATOS)
  if(tela === 'clientes'){
    campos = [
      'nome',
      'telefone',
      'usuario',
      'servidor',
      'plano',
      'valor',
      'vencimento',
      'hora_vencimento',
      'mac'
    ];
  } else {
    campos = ['nome','telefone','usuario'];
  }

  dadosEditados={};

  for(let campo of campos){

    let r = await abrirModal(campo, data[campo]);

    if(r.tipo === "cancelar") return;

    dadosEditados[campo] = r.valor;

    // 🔥 SALVAR PARCIAL (SEM QUEBRAR SUA LÓGICA)
    if(r.tipo === "salvar"){
      await salvar(id);
      return;
    }
  }

  // 🔥 SALVAR FINAL
  await salvar(id);
}

// ===== SALVAR (CORRETO SEM QUEBRAR NADA) =====
async function salvar(id){

  let dados = { ...dadosEditados };

  // 🔥 TRATAMENTO SOMENTE PARA CLIENTES
  if(tela === 'clientes'){

    // DATA (se vier dd/mm/yyyy → converte)
    if(dados.vencimento && typeof dados.vencimento === 'string'){
      if(dados.vencimento.includes('/')){
        let p = dados.vencimento.split('/');
        if(p.length === 3){
          dados.vencimento = `${p[2]}-${p[1]}-${p[0]}`;
        }
      }
    }

    // VALOR → número
    if(dados.valor){
      dados.valor = Number(dados.valor);
    }
  }

  console.log("SALVANDO:", dados);

  const { error } = await client
    .from(tela)
    .update(dados)
    .eq('id', id);

  if(error){
    console.log("ERRO AO SALVAR:", error);
    alert("Erro ao salvar");
    return;
  }

  // 🔥 IMPORTANTE: NÃO ALTEREI SUA LÓGICA
  carregar();
}

  };

}

 async function uploadImagem(file){

  const fileName = Date.now() + "_" + file.name;

  const { data, error } = await client
    .storage
    .from('produtos')
    .upload(fileName, file);

  if(error){
    log("❌ ERRO UPLOAD: " + error.message);
    console.log(error);
    return null;
  }

  log("✅ UPLOAD OK");

  const { data: publicUrl } = client
    .storage
    .from('produtos')
    .getPublicUrl(fileName);

  log("🌍 URL GERADA: " + publicUrl.publicUrl);

  return publicUrl.publicUrl;
}

async function importarPagamentos(dadosExcel){

  log("📥 INICIANDO IMPORTAÇÃO PAGAMENTOS");

  let erros = 0;

  for(let linha of dadosExcel){

    try{

      let clienteDB = null;

      // 🔥 1. USUARIO
      if(linha.usuario){
        const { data } = await client
          .from("clientes")
          .select("*")
          .ilike("usuario", `%${linha.usuario}%`);

        clienteDB = data?.[0];
      }

      // 🔥 2. TELEFONE
      if(!clienteDB && linha.telefone){
        let telefone = linha.telefone.replace(/\D/g,"");

        const { data } = await client
          .from("clientes")
          .select("*")
          .ilike("telefone", `%${telefone}%`);

        clienteDB = data?.[0];
      }

      // 🔥 3. NOME
      if(!clienteDB && linha.cliente){
        const { data } = await client
          .from("clientes")
          .select("*")
          .ilike("nome", `%${linha.cliente}%`);

        clienteDB = data?.[0];
      }

      if(!clienteDB){
        log("❌ NÃO ENCONTRADO: " + JSON.stringify(linha));
        erros++;
        continue;
      }

      await client.from("pagamentos").insert({

        telefone: clienteDB.telefone,
        usuario: clienteDB.usuario,
        valor: Number(linha.valor) || 0,
        forma_pagamento: linha.forma_de_pagamento || null,
        data_pagamento: linha.data_pagamento || null,
        vencimento: linha.vencimento || null,
        servidor: linha.servidor || null,
        observacao: linha.observacao || null

      });

    }catch(e){
      log("❌ ERRO: " + e.message);
      erros++;
    }
  }

  log("✅ IMPORTAÇÃO FINALIZADA");
  alert("Pagamentos importados 🚀 Erros: " + erros);
}

  async function carregarPagamentos(){

  const { data } = await client
    .from('pagamentos')
    .select('*')
    .order('data_pagamento', { ascending: false });

  const lista = document.getElementById('listaPagamentos');

  if(!data || data.length === 0){
    lista.innerHTML = "<tr><td colspan='5'>Nenhum pagamento</td></tr>";
    return;
  }

  lista.innerHTML = data.map(p => `
    <tr>
      <td>${p.usuario || ''}</td>
      <td>${p.telefone || ''}</td>
      <td>${p.valor || ''}</td>
      <td>${p.forma_pagamento || ''}</td>
      <td>${p.data_pagamento || ''}</td>
    </tr>
  `).join('');
}

async function editarPagamento(id){

    .from('pagamentos')

  let data_pagamento = prompt("Data pagamento:", data.data_pagamento || "");

    })
    .eq('id', id);

  if(error){
    console.log(error);
    alert("Erro ao editar pagamento");
    return;
  }

  alert("Pagamento atualizado ✅");
  carregar();
}
