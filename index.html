<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
    font-family: Arial;
    background:#0a0e27;
    color:#fff;
    margin:0;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.topo{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.menu{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.menu button{
    background:#1e244d;
    border:none;
    color:#fff;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.menu .active{
    background:#b024ff;
}

input{
    padding:8px;
    border-radius:6px;
    border:none;
}

/* LISTA */
.card{
    background:#141937;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.btn{
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.bot{ background:#00d9ff; color:#000; }
.humano{ background:#ff4d4d; }

/* PRODUTOS */
.produto{
    background:#1e244d;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="topo">
    <h2>📺 Painel InovaTV</h2>
</div>

<div class="menu">
    <button id="btnContatos" class="active" onclick="trocar('contatos')">Contatos</button>
    <button id="btnProdutos" onclick="trocar('produtos')">Produtos</button>
</div>

<!-- CONTATOS -->
<div id="telaContatos">

<input id="busca" placeholder="Buscar cliente" oninput="pagina=1; carregarContatos()">

<div id="lista"></div>

</div>

<!-- PRODUTOS -->
<div id="telaProdutos" style="display:none">

<input id="nomeProduto" placeholder="Nome">
<input id="valorProduto" placeholder="Valor">
<button onclick="addProduto()">Adicionar</button>

<div id="produtos"></div>

</div>

</div>

<script>

// CONFIG
const SUPABASE_URL = "https://tiupgtbzikwmseecxbvo.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let pagina = 1;

// TROCAR TELA
function trocar(tela){
    document.getElementById("telaContatos").style.display = tela === "contatos" ? "block":"none";
    document.getElementById("telaProdutos").style.display = tela === "produtos" ? "block":"none";

    document.getElementById("btnContatos").classList.toggle("active", tela==="contatos");
    document.getElementById("btnProdutos").classList.toggle("active", tela==="produtos");

    if(tela==="contatos") carregarContatos();
    if(tela==="produtos") carregarProdutos();
}

// ================= CONTATOS =================
async function carregarContatos(){

    const busca = document.getElementById("busca").value.trim();
    const lista = document.getElementById("lista");

    lista.innerHTML = "Carregando...";

    try {

        let url = `${SUPABASE_URL}/functions/v1/rocket-clientes?page=${pagina}`;
        if (busca) url += `&busca=${encodeURIComponent(busca)}`;

        const res = await fetch(url);

        if (!res.ok){
            const erro = await res.text();
            lista.innerHTML = "Erro Rocket:<br>"+erro;
            console.error(erro);
            return;
        }

        const json = await res.json();

        if (!json || !json.itens){
            lista.innerHTML = "Erro na resposta da API";
            console.log(json);
            return;
        }

        const clientes = json.itens;

        if (clientes.length === 0){
            lista.innerHTML = "Nenhum cliente encontrado";
            return;
        }

        // ===== HUMANO =====
        let mapa = {};

        try{
            const { data } = await supabaseClient
                .from("atendimentos")
                .select("*");

            (data || []).forEach(a=>{
                const tel = (a.telefone || "").replace(/\D/g,"");
                mapa[tel] = a.humano;
            });

        }catch(e){
            console.warn("Erro atendimentos:", e);
        }

        lista.innerHTML = "";

        clientes.forEach(c => {

            const telefone = (c.telefone || "").replace(/\D/g,"");
            const humano = mapa[telefone] || false;

            const vencido = new Date(c.vencimento) < new Date();

            lista.innerHTML += `
            <div class="card">
                <div>
                    <b>${c.nome}</b><br>
                    📞 ${c.telefone}<br>
                    📦 ${c.plano?.nome || "-"}<br>
                    💰 R$ ${c.valor || 0}<br>
                    📅 <span style="color:${vencido ? 'red':'#00ff88'}">
                        ${new Date(c.vencimento).toLocaleDateString()}
                    </span>
                </div>

                <button class="btn ${humano ? 'humano':'bot'}"
                    onclick="toggle('${telefone}', ${!humano})">
                    ${humano ? '👤 HUMANO':'🤖 BOT'}
                </button>
            </div>`;
        });

        renderPaginacao(json.paginacao);

    } catch(err){
        console.error(err);
        lista.innerHTML = "Erro ao conectar com Rocket";
    }
}

// PAGINAÇÃO
function renderPaginacao(p){

    if(!p) return;

    const div = document.createElement("div");

    div.innerHTML = `
        <button onclick="prev()" ${!p.has_previous ? "disabled":""}>⬅</button>
        Página ${p.page} de ${p.total_pages}
        <button onclick="next()" ${!p.has_next ? "disabled":""}>➡</button>
    `;

    document.getElementById("lista").appendChild(div);
}

function next(){ pagina++; carregarContatos(); }
function prev(){ if(pagina>1){ pagina--; carregarContatos(); } }

// TOGGLE
async function toggle(telefone, status){

    await fetch(`${SUPABASE_URL}/functions/v1/humano-toggle`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ telefone, status })
    });

    carregarContatos();
}

// ================= PRODUTOS =================
async function carregarProdutos(){

    const { data } = await supabaseClient
        .from("produtos")
        .select("*")
        .order("criado_em", { ascending:false });

    const div = document.getElementById("produtos");
    div.innerHTML = "";

    (data || []).forEach(p => {

        div.innerHTML += `
        <div class="produto">
            <input value="${p.nome}" id="nome-${p.id}">
            <input value="${p.valor}" id="valor-${p.id}">

            <button onclick="salvar('${p.id}')">💾</button>
            <button onclick="toggleAtivo('${p.id}', ${!p.ativo})">
                ${p.ativo ? '🟢':'⚫'}
            </button>
            <button onclick="remover('${p.id}')">🗑</button>
        </div>`;
    });
}

async function addProduto(){

    const nome = document.getElementById("nomeProduto").value;
    const valor = document.getElementById("valorProduto").value;

    if(!nome || !valor) return alert("Preencha");

    await supabaseClient.from("produtos").insert([{ nome, valor }]);

    carregarProdutos();
}

async function salvar(id){

    const nome = document.getElementById("nome-"+id).value;
    const valor = document.getElementById("valor-"+id).value;

    await supabaseClient
        .from("produtos")
        .update({ nome, valor })
        .eq("id", id);

    carregarProdutos();
}

async function toggleAtivo(id, status){

    await supabaseClient
        .from("produtos")
        .update({ ativo: status })
        .eq("id", id);

    carregarProdutos();
}

async function remover(id){

    if(!confirm("Excluir produto?")) return;

    await supabaseClient
        .from("produtos")
        .delete()
        .eq("id", id);

    carregarProdutos();
}

// INIT
carregarContatos();

</script>

</body>
</html>
