<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }

button {
  margin:4px;
  padding:6px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

.btn-azul { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }
.btn-neutro { background:#ddd; }

.ativo { outline:3px solid #000; }

#progressBar {
  width: 100%;
  background: #ccc;
  height: 20px;
  margin-top: 10px;
}

#progress {
  width: 0%;
  height: 100%;
  background: green;
  text-align: center;
  color: white;
}

table { width:100%; border-collapse: collapse; }
th,td { padding:8px; }
</style>
</head>

<body>

<h2>Painel InovaTV</h2>

<button id="btnClientes" class="btn-azul" onclick="mostrarClientes()">Clientes</button>
<button id="btnContatos" class="btn-azul" onclick="mostrarContatos()">Contatos</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button class="btn-neutro" onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

<div id="progressBar">
  <div id="progress">0%</div>
</div>

<hr>

<h3>Ações</h3>

<div id="contador">Selecionados: 0</div>

<button class="btn-neutro" onclick="toggleTodos(true)">Selecionar todos</button>
<button class="btn-neutro" onclick="toggleTodos(false)">Desmarcar</button>
<button class="btn-neutro" onclick="selecionarAtivos()">Ativos</button>
<button class="btn-neutro" onclick="selecionarVencidos()">Vencidos</button>

<br><br>

<table border="1">
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela = 'clientes';

// ================= CONTADOR
function atualizarContador(){

  let total = document.querySelectorAll(".checkItem:checked").length;

  document.getElementById("contador").innerText =
    "Selecionados: " + total;
}

// ================= BOTÃO ATIVO
function ativarBotao(){
  btnClientes.classList.remove("ativo");
  btnContatos.classList.remove("ativo");

  if(tela==='clientes'){
    btnClientes.classList.add("ativo");
  } else {
    btnContatos.classList.add("ativo");
  }
}

// ================= CLIENTES
async function mostrarClientes(){

  tela='clientes';
  ativarBotao();

  const { data } = await client.from('clientes').select('*');

  document.getElementById('thead').innerHTML=`
    <tr>
      <th><input type="checkbox" onclick="toggleTodos(this.checked)"></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
    </tr>
  `;

  let html='';

  data.forEach(c=>{
    html+=`
      <tr>
        <td>
          <input type="checkbox"
                 class="checkItem"
                 data-status="${c.status}"
                 onchange="atualizarContador()">
        </td>
        <td>${c.nome}</td>
        <td>${c.telefone}</td>
        <td>${c.status}</td>
      </tr>
    `;
  });

  tabela.innerHTML = html;
}

// ================= CONTATOS
async function mostrarContatos(){

  tela='contatos';
  ativarBotao();

  const { data } = await client.from('contatos').select('*');

  document.getElementById('thead').innerHTML=`
    <tr>
      <th><input type="checkbox" onclick="toggleTodos(this.checked)"></th>
      <th>Nome</th>
      <th>Telefone</th>
    </tr>
  `;

  let html='';

  data.forEach(c=>{
    html+=`
      <tr>
        <td>
          <input type="checkbox"
                 class="checkItem"
                 onchange="atualizarContador()">
        </td>
        <td>${c.nome}</td>
        <td>${c.telefone}</td>
      </tr>
    `;
  });

  tabela.innerHTML = html;
}

// ================= FILTROS
function selecionarAtivos(){

  document.querySelectorAll(".checkItem").forEach(c=>{
    c.checked = c.dataset.status === "ativo";
  });

  atualizarContador();
}

function selecionarVencidos(){

  document.querySelectorAll(".checkItem").forEach(c=>{
    c.checked = c.dataset.status === "inativo";
  });

  atualizarContador();
}

// ================= SELECIONAR TODOS
function toggleTodos(checked){

  document.querySelectorAll(".checkItem")
    .forEach(c=>c.checked=checked);

  atualizarContador();
}

// ================= IMPORTAÇÃO COM PROGRESSO REAL
async function importarArquivo(){

  const file = document.getElementById("inputArquivo").files[0];

  if(!file) return alert("Selecione um arquivo");

  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  const total = json.length;

  for(let i=0;i<total;i++){

    let c = json[i];

    let telefone = (c.telefone||c.Telefone||"")
      .toString()
      .replace(/\D/g,"");

    if(!telefone) continue;

    await fetch("/api/importar-clientes",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        clientes:[{ nome:c.nome||c.Nome, telefone }]
      })
    });

    let porcentagem = Math.floor(((i+1)/total)*100);

    document.getElementById("progress").style.width =
      porcentagem + "%";

    document.getElementById("progress").innerText =
      porcentagem + "%";
  }

  alert("Importação finalizada 🚀");

  mostrarClientes();
}

// ================= BUSCA
async function buscar(){

  let termo = document.getElementById('busca').value;

  const { data } = await client
    .from(tela)
    .select('*')
    .or(`telefone.ilike.%${termo}%,nome.ilike.%${termo}%`);

  let html='';

  data.forEach(c=>{
    html+=`
      <tr>
        <td>${c.nome}</td>
        <td>${c.telefone}</td>
      </tr>
    `;
  });

  tabela.innerHTML = html;
}

// INIT
mostrarClientes();

</script>

</body>
</html>
