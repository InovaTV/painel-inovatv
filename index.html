<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }
button { margin:4px; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
.btn-topo { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }

#progressBar { width:100%; background:#ccc; height:20px; }
#progress { width:0%; height:100%; background:green; color:#fff; text-align:center; }

#logErro {
  background:#111;
  color:#0f0;
  padding:10px;
  margin-top:10px;
  font-size:12px;
  max-height:200px;
  overflow:auto;
}

table { width:100%; border-collapse: collapse; font-size:13px; }
th,td { padding:6px; border:1px solid #ccc; }
</style>
</head>

<body>

<h2>Painel InovaTV</h2>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

<div id="progressBar"><div id="progress">0%</div></div>

<div id="logErro"></div>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'COLE_SUA_ANON_KEY_COMPLETA_AQUI'
);

function atualizarProgresso(a,t){
  let p=Math.floor((a/t)*100);
  progress.style.width=p+"%";
  progress.innerText=p+"%";
}

// 🔥 IMPORTAÇÃO COM LOG VISUAL
async function importarArquivo(){

  logErro.innerHTML = "";

  const file = inputArquivo.files[0];
  if(!file) return alert("Selecione arquivo");

  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  let erros = 0;

  for(let i=0;i<json.length;i++){

    let c = json[i];

    let telefone = (c.telefone || "").toString().replace(/\D/g,"");
    if(!telefone) continue;

    if(!telefone.startsWith("55")){
      telefone = "55"+telefone;
    }

    let usuario = c.usuario || "sem_usuario";

    try {

      const { data: lista } = await client
        .from('clientes')
        .select('id')
        .eq('telefone', telefone)
        .eq('usuario', usuario);

      let payload = {
        nome: c.nome,
        telefone,
        usuario,
        senha: c.senha,
        plano: c.plano,
        valor: Number(c.valor || 0),
        vencimento: c.vencimento,
        hora_vencimento: c.hora_vencimento,
        servidor: c.servidor,
        aplicativo: c.aplicativo,
        dispositivo: c.dispositivo,
        telas: Number(c.telas || 1),
        forma_pagamento: c.forma_de_pagamento,
        mac: c.mac
      };

      let error = null;

      if(lista && lista.length > 0){
        const res = await client.from('clientes').update(payload).eq('id', lista[0].id);
        error = res.error;
      } else {
        const res = await client.from('clientes').insert(payload);
        error = res.error;
      }

      if(error){
        erros++;

        let msg = `
❌ ERRO NA LINHA ${i+1}
Nome: ${c.nome}
Telefone: ${telefone}
Erro: ${error.message}
-----------------------
`;

        console.log(msg);
        logErro.innerHTML += "<pre>"+msg+"</pre>";
      }

    } catch(e){
      erros++;

      let msg = `
❌ ERRO CRÍTICO LINHA ${i+1}
Nome: ${c.nome}
Erro: ${e.message}
-----------------------
`;

      console.log(msg);
      logErro.innerHTML += "<pre>"+msg+"</pre>";
    }

    atualizarProgresso(i+1,json.length);
  }

  alert(`Importação concluída 🚀\nErros: ${erros}`);
}

</script>

</body>
</html>
