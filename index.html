<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }

/* BOTÕES */
button {
  margin:4px;
  padding:6px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}

.btn-azul { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }
.btn-laranja { background:#ff9800; color:#fff; }
.btn-cinza { background:#ddd; }

.ativoTela {
  background:#000 !important;
  color:#fff !important;
}

/* PROGRESSO */
#progressBar { width:100%; background:#ccc; height:20px; }
#progress { width:0%; height:100%; background:green; color:#fff; text-align:center; }

/* TABELA */
table { width:100%; border-collapse: collapse; }
th,td { padding:8px; border:1px solid #ccc; }

/* DASH */
#dashboard {
  background:#f5f5f5;
  padding:10px;
  margin-top:15px;
}
</style>
</head>

<body>

<h2>Painel InovaTV</h2>

<!-- STATUS ATUAL -->
<h3 id="statusTela">Você está em: CLIENTES</h3>

<button id="btnClientes" class="btn-azul ativoTela" onclick="mostrarClientes()">Clientes</button>
<button id="btnContatos" class="btn-azul" onclick="mostrarContatos()">Contatos</button>

<button class="btn-laranja" onclick="abrirFinanceiro()">Abrir Financeiro</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button class="btn-cinza" onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

<div id="progressBar">
  <div id="progress">0%</div>
</div>

<hr>

<!-- DASHBOARD -->
<div id="dashboard">
  💰 Faturamento: R$ <span id="faturamento">0</span> |
  ✅ Ativos: <span id="ativos">0</span> |
  ❌ Inativos: <span id="inativos">0</span>
</div>

<hr>

<h3>Ações</h3>

<div id="contador">Selecionados: 0</div>

<button class="btn-cinza" onclick="selecionarTodos()">Selecionar todos</button>
<button class="btn-cinza" onclick="desmarcarTodos()">Desmarcar</button>

<button class="btn-laranja" onclick="selecionarAtivos()">Ativos</button>
<button class="btn-laranja" onclick="selecionarVencidos()">Vencidos</button>

<button class="btn-verde" onclick="renovarSelecionados()">Renovar</button>
<button class="btn-vermelho" onclick="deletarSelecionados()">Excluir</button>

<br><br>

<table>
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela = 'clientes';

// ================= TROCAR TELA VISUAL
function atualizarTelaUI(){

  statusTela.innerText = "Você está em: " + tela.toUpperCase();

  btnClientes.classList.remove("ativoTela");
  btnContatos.classList.remove("ativoTela");

  if(tela==='clientes') btnClientes.classList.add("ativoTela");
  else btnContatos.classList.add("ativoTela");
}

// ================= CONTADOR
function atualizarContador(){
  contador.innerText =
    "Selecionados: " + document.querySelectorAll(".check:checked").length;
}

// ================= PROGRESSO
function atualizarProgresso(atual,total){
  let p = Math.floor((atual/total)*100);
  progress.style.width = p+"%";
  progress.innerText = p+"%";
}

function resetarProgresso(){
  progress.style.width = "0%";
  progress.innerText = "0%";
}

// ================= DASHBOARD
async function carregarDashboard(){

  const { data } = await client.from('clientes').select('*');

  let total=0, ativos=0, inativos=0;

  data.forEach(c=>{
    total += Number(c.valor || 0);
    if(c.status==="ativo") ativos++;
    else inativos++;
  });

  faturamento.innerText = total;
  ativosEl = document.getElementById("ativos");
  inativosEl = document.getElementById("inativos");

  ativosEl.innerText = ativos;
  inativosEl.innerText = inativos;
}

// ================= CLIENTES
async function mostrarClientes(){

  tela='clientes';
  atualizarTelaUI();
  resetarProgresso();

  const { data } = await client.from('clientes').select('*');

  thead.innerHTML = `
    <tr>
      <th></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
      <th>Vencimento</th>
      <th>Ações</th>
    </tr>
  `;

  let html='';

  data.forEach(c=>{
    html+=`
    <tr>
      <td><input type="checkbox" class="check" data-id="${c.id}" data-status="${c.status}" onchange="atualizarContador()"></td>
      <td>${c.nome}</td>
      <td>${c.telefone}</td>
      <td>${c.status}</td>
      <td>${c.vencimento||''}</td>
      <td>
        <button class="btn-vermelho" onclick="deletarItem('${c.id}')">Excluir</button>
      </td>
    </tr>
    `;
  });

  tabela.innerHTML = html;

  atualizarContador();
  carregarDashboard();
}

// ================= CONTATOS
async function mostrarContatos(){

  tela='contatos';
  atualizarTelaUI();
  resetarProgresso();

  const { data } = await client.from('contatos').select('*');

  thead.innerHTML = `
    <tr>
      <th></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Ações</th>
    </tr>
  `;

  let html='';

  data.forEach(c=>{
    html+=`
    <tr>
      <td><input type="checkbox" class="check" data-id="${c.id}" onchange="atualizarContador()"></td>
      <td>${c.nome}</td>
      <td>${c.telefone}</td>
      <td>
        <button class="btn-vermelho" onclick="deletarItem('${c.id}')">Excluir</button>
      </td>
    </tr>
    `;
  });

  tabela.innerHTML = html;

  atualizarContador();
}

// ================= IMPORTAÇÃO COMPLETA
async function importarArquivo(){

  const file = inputArquivo.files[0];
  if(!file) return alert("Selecione arquivo");

  if(!confirm("Importar dados completos do Excel?")) return;

  resetarProgresso();

  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  for(let i=0;i<json.length;i++){

    let c = json[i];

    await fetch("/api/importar-clientes",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        clientes:[{
          nome:c.nome,
          telefone:(c.telefone||"").toString().replace(/\D/g,""),
          usuario:c.usuario,
          senha:c.senha,
          vencimento:c.vencimento,
          status:c.status,
          valor:c.valor,
          dispositivo:c.dispositivo,
          aplicativo:c.aplicativo
        }]
      })
    });

    atualizarProgresso(i+1,json.length);
  }

  alert("Importação completa 🚀");
  mostrarClientes();
}

// ================= AÇÕES
function selecionarTodos(){
  document.querySelectorAll(".check").forEach(c=>c.checked=true);
  atualizarContador();
}

function desmarcarTodos(){
  document.querySelectorAll(".check").forEach(c=>c.checked=false);
  atualizarContador();
}

function selecionarAtivos(){
  document.querySelectorAll(".check").forEach(c=>{
    c.checked = c.dataset.status==="ativo";
  });
  atualizarContador();
}

function selecionarVencidos(){
  document.querySelectorAll(".check").forEach(c=>{
    c.checked = c.dataset.status==="inativo";
  });
  atualizarContador();
}

// ================= DELETE
async function deletarItem(id){
  if(!confirm("Excluir item?")) return;

  await client.from(tela).delete().eq('id', id);

  if(tela==='clientes') mostrarClientes();
  else mostrarContatos();
}

async function deletarSelecionados(){

  let checks = document.querySelectorAll(".check:checked");

  if(checks.length===0) return alert("Selecione pelo menos 1");

  if(!confirm("Excluir selecionados?")) return;

  for(let c of checks){
    await client.from(tela).delete().eq('id', c.dataset.id);
  }

  alert("Excluído 🚀");

  if(tela==='clientes') mostrarClientes();
  else mostrarContatos();
}

// ================= FINANCEIRO NOVA ABA
function abrirFinanceiro(){
  window.open(window.location.href + "?financeiro=true","_blank");
}

// INIT
mostrarClientes();

</script>

</body>
</html>
