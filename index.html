<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }

button {
  margin:4px;
  padding:6px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}

.btn-topo { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }

#progressBar { width:100%; background:#ccc; height:20px; }
#progress { width:0%; height:100%; background:green; color:#fff; text-align:center; }

#logErro {
  background:#000;
  color:#0f0;
  padding:10px;
  margin-top:10px;
  font-size:12px;
  max-height:200px;
  overflow:auto;
}

table { width:100%; border-collapse: collapse; font-size:13px; }
th,td { padding:6px; border:1px solid #ccc; }

#modalEdit {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  align-items:center;
  justify-content:center;
}

#modalBox {
  background:#111;
  padding:20px;
  border-radius:10px;
  color:#fff;
  width:350px;
}

#modalBox input {
  width:100%;
  padding:8px;
  margin-top:10px;
}

/* NOVO */
#contadorStatus {
  margin:10px 0;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>Painel InovaTV</h2>
<h3 id="statusTela">Você está em: CLIENTES</h3>

<button class="btn-topo" onclick="trocarTela('clientes')">Clientes</button>
<button class="btn-topo" onclick="trocarTela('contatos')">Contatos</button>

  <button onclick="ativarSelecionados()" style="background:green;color:white;margin-left:10px;">
  👤 Ativar Humano
</button>

<button onclick="desativarSelecionados()" style="background:red;color:white;">
  🤖 Ativar Bot
</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome" onkeypress="if(event.key==='Enter') buscar()">
<button onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo">
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

  <button id="btnImportarSelecionados" class="btn-verde" onclick="importarSelecionados()" style="display:none;">
  IMPORTAR SELECIONADOS
</button>

<div id="progressBar"><div id="progress">0%</div></div>
<div id="logErro"></div>

<hr>

<div id="contadorSelecionados">Selecionados: 0</div>

<!-- NOVO -->
<div id="contadorStatus">Ativos: 0 | Vencidos: 0</div>

<button onclick="selecionarTodos()">Selecionar todos</button>
<button onclick="desmarcarTodos()">Desmarcar</button>
<button onclick="filtrarAtivos()">Ativos</button>
<button onclick="filtrarVencidos()">Vencidos</button>
<button class="btn-vermelho" onclick="deletarSelecionados()">Excluir</button>

<table>
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<div id="modalEdit">
  <div id="modalBox">
    <div id="modalLabel"></div>
    <input id="modalInput">
    <br><br>
    <button onclick="modalCancelar()">Cancelar</button>
    <button onclick="modalSalvar()">Salvar edição</button>
    <button onclick="modalOk()">OK</button>
  </div>
</div>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela='clientes';
let dados=[];
let modalResolve;
let dadosEditados={};

// ===== CONTATO SEGURO =====
async function salvarContatoSeguro(dados){
  const { error } = await client.from('contatos').insert(dados);
  if(error){
    if(error.message.includes("duplicate key")){
      console.log("Contato duplicado ignorado");
    } else {
      console.error("Erro contato:", error.message);
    }
  }
}

// ===== MODAL =====
function abrirModal(label, valor){
  return new Promise(resolve=>{
    modalResolve=resolve;
    modalLabel.innerText=label;
    modalInput.value=valor||"";
    modalEdit.style.display="flex";
  });
}

function modalOk(){ modalEdit.style.display="none"; modalResolve({tipo:"ok",valor:modalInput.value}); }
function modalCancelar(){ modalEdit.style.display="none"; modalResolve({tipo:"cancelar"}); }
function modalSalvar(){ modalEdit.style.display="none"; modalResolve({tipo:"salvar",valor:modalInput.value}); }

// ===== STATUS =====
function calcularStatus(c){

  if(!c.vencimento || !c.hora_vencimento){
    return "erro";
  }

  let hoje = new Date();
  hoje.setHours(0,0,0,0);

  let data = c.vencimento.split("-");
  let venc = new Date(data[0], data[1]-1, data[2]);

  return venc < hoje ? "inativo" : "ativo";
}

// ===== CONTADOR =====
function atualizarContadorStatus(lista){

  let ativos = 0;
  let vencidos = 0;

  lista.forEach(c=>{
    let status = calcularStatus(c);
    if(status === "ativo") ativos++;
    if(status === "inativo") vencidos++;
  });

  contadorStatus.innerText = `Ativos: ${ativos} | Vencidos: ${vencidos}`;
}

// ===== TROCAR TELA =====
function trocarTela(t){
  tela=t;
  statusTela.innerText="Você está em: "+t.toUpperCase();
  carregar();
}

// ===== CARREGAR =====
async function carregar(){
  const { data } = await client.from(tela).select('*');

  // 🔥 ORDENAÇÃO ALFABÉTICA
  dados = (data || []).sort((a,b)=>{
    return (a.nome || "").localeCompare(b.nome || "");
  });

  if(tela==='clientes'){
    thead.innerHTML=`<tr>
      <th></th><th>Nome</th><th>Telefone</th><th>Usuário</th>
      <th>Servidor</th><th>Plano</th><th>Valor</th>
      <th>Vencimento</th><th>Hora</th><th>MAC</th>
      <th>Status</th><th>Ações</th>
    </tr>`;
  } else {
    thead.innerHTML=`<tr>
  <th></th><th>Nome</th><th>Telefone</th><th>Usuário</th><th>Status</th><th>Ações</th>
</tr>`;
  }

  render(dados);
}

// ===== RENDER =====
function render(lista){
  tabela.innerHTML=lista.map(c=>`
  <tr style="${c.atendimento_humano ? 'background:#e6ffe6;' : ''}">
    <td><input type="checkbox" class="check" data-id="${c.id}" onchange="contarSelecionados()"></td>
    <td>${c.nome||''}</td>
    <td>${c.telefone||''}</td>
    <td>${c.usuario||''}</td>

${tela === 'clientes' ? `
  <td>${c.servidor||''}</td>
  <td>${c.plano||''}</td>
  <td>${c.valor||''}</td>
  <td>${c.vencimento||''}</td>
  <td>${c.hora_vencimento||''}</td>
  <td>${c.mac||''}</td>
  <td>${calcularStatus(c)}</td>
` : `
  <td>${c.atendimento_humano 
    ? '<span style="color:green;font-weight:bold;">🟢 HUMANO</span>' 
    : '<span style="color:red;font-weight:bold;">🤖 BOT</span>'}
  </td>
`}

<td>
  <button onclick="editar('${c.id}')">Editar</button>

  <button class="btn-verde" onclick="ativarHumano('${c.telefone}')">
    👤
  </button>

  <button class="btn-vermelho" onclick="desativarHumano('${c.telefone}')">
    🤖
  </button>
</td>
  </tr>
  `).join('');

  contarSelecionados();
  atualizarContadorStatus(lista);
}

// ===== CRON AUTOMÁTICO =====
setInterval(()=>{
  console.log("Sincronizando...");
  carregar();
}, 60000);

// ===== RESTO DO CÓDIGO (INTACTO) =====
function contarSelecionados(){
  contadorSelecionados.innerText="Selecionados: "+document.querySelectorAll('.check:checked').length;
}
function selecionarTodos(){ document.querySelectorAll('.check').forEach(c=>c.checked=true); contarSelecionados(); }
function desmarcarTodos(){ document.querySelectorAll('.check').forEach(c=>c.checked=false); contarSelecionados(); }
function filtrarAtivos(){ render(dados.filter(c=>calcularStatus(c)==="ativo")); }
function filtrarVencidos(){ render(dados.filter(c=>calcularStatus(c)==="inativo")); }

async function deletarSelecionados(){
  let ids=[...document.querySelectorAll('.check:checked')].map(c=>c.dataset.id);
  if(ids.length===0)return alert("Nada selecionado");
  if(!confirm("Deseja excluir?"))return;

  for(let i=0;i<ids.length;i++){
    await client.from(tela).delete().eq('id',ids[i]);
    let p=Math.floor(((i+1)/ids.length)*100);
    progress.style.width=p+"%";
    progress.innerText=p+"%";
  }

  alert("Excluído");
  carregar();
}

function normalizar(t){
  return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function buscar(){
  let termo=normalizar(busca.value);
  render(dados.filter(c =>
    normalizar(c.nome).includes(termo) ||
    (c.telefone||"").includes(termo)
  ));
}

// ===== EDITAR =====
async function editar(id){

  const { data } = await client.from(tela).select('*').eq('id',id).single();

  let campos;

  // 🔥 DEFINE CAMPOS POR TELA (SEM QUEBRAR CONTATOS)
  if(tela === 'clientes'){
    campos = [
      'nome',
      'telefone',
      'usuario',
      'servidor',
      'plano',
      'valor',
      'vencimento',
      'hora_vencimento',
      'mac'
    ];
  } else {
    campos = ['nome','telefone','usuario'];
  }

  dadosEditados={};

  for(let campo of campos){

    let r = await abrirModal(campo, data[campo]);

    if(r.tipo === "cancelar") return;

    dadosEditados[campo] = r.valor;

    // 🔥 SALVAR PARCIAL (SEM QUEBRAR SUA LÓGICA)
    if(r.tipo === "salvar"){
      await salvar(id);
      return;
    }
  }

  // 🔥 SALVAR FINAL
  await salvar(id);
}

// ===== SALVAR (CORRETO SEM QUEBRAR NADA) =====
async function salvar(id){

  let dados = { ...dadosEditados };

  // 🔥 TRATAMENTO SOMENTE PARA CLIENTES
  if(tela === 'clientes'){

    // DATA (se vier dd/mm/yyyy → converte)
    if(dados.vencimento && typeof dados.vencimento === 'string'){
      if(dados.vencimento.includes('/')){
        let p = dados.vencimento.split('/');
        if(p.length === 3){
          dados.vencimento = `${p[2]}-${p[1]}-${p[0]}`;
        }
      }
    }

    // VALOR → número
    if(dados.valor){
      dados.valor = Number(dados.valor);
    }
  }

  console.log("SALVANDO:", dados);

  const { error } = await client
    .from(tela)
    .update(dados)
    .eq('id', id);

  if(error){
    console.log("ERRO AO SALVAR:", error);
    alert("Erro ao salvar");
    return;
  }

  // 🔥 IMPORTANTE: NÃO ALTEREI SUA LÓGICA
  carregar();
}
  
// ===== IMPORTAÇÃO =====
async function importarArquivo(){

  const file = inputArquivo.files[0];
  if(!file) return alert("Selecione arquivo");

  const reader = new FileReader();

  reader.onload = async (e)=>{

    const wb = XLSX.read(e.target.result,{type:'binary'});
    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

    if(json.length === 0){
      alert("Arquivo vazio");
      return;
    }

    // 🔥 MOSTRA NA SUA TABELA (SEM SALVAR)
  dados = json.map((c,i)=>({
  ...c,
  id: i // 👈 AQUI É O SEGREDO
}));

    render(dados);

    window.dadosImportados = json;

    alert("Agora selecione os clientes e clique em IMPORTAR SELECIONADOS");

    document.getElementById("btnImportarSelecionados").style.display = "inline-block";

    // 🔥 CRIA BOTÃO SE NÃO EXISTIR
    
  };

  reader.readAsBinaryString(file);
}

carregar();

  async function importarSelecionados(){

  const checks = document.querySelectorAll('.check:checked');

  if(checks.length === 0){
    alert("Selecione pelo menos um cliente");
    return;
  }

  let erros = 0;

  for(let i=0;i<checks.length;i++){

    const index = checks[i].dataset.id;
let linha = window.dadosImportados[index];

    try{

      let telefone=(linha.telefone||"").replace(/\D/g,"");
      if(!telefone.startsWith("55")) telefone="55"+telefone;

      let usuario=linha.usuario || ("user"+i);

      await client.from('clientes').insert({
        nome:linha.nome,
        telefone,
        usuario,
        servidor:linha.servidor,
        plano:linha.plano,
        valor:linha.valor,
        vencimento:linha.vencimento,
        hora_vencimento:linha.hora_vencimento||linha.hora,
        mac:linha.mac
      });

      await salvarContatoSeguro({
        telefone,
        usuario,
        nome:linha.nome,
        cliente:true
      });

    }catch(e){
      erros++;
    }

    let p=Math.floor(((i+1)/checks.length)*100);
    progress.style.width=p+"%";
    progress.innerText=p+"%";
  }

  alert("Importação concluída 🚀 Erros: "+erros);

    document.getElementById("btnImportarSelecionados").style.display = "none";

  carregar();
}
async function ativarHumano(telefone){
  await fetch("https://tiupgtbzikwmseecxbvo.supabase.co/functions/v1/humano-toggle",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      telefone: telefone,
      status: true
    })
  });

  alert("Humano ativado 👍");
  carregar();
}

async function desativarHumano(telefone){
  await fetch("https://tiupgtbzikwmseecxbvo.supabase.co/functions/v1/humano-toggle",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      telefone: telefone,
      status: false
    })
  });

  alert("Bot reativado 🤖");
  carregar();
}

async function ativarSelecionados(){

  const checks = document.querySelectorAll(".check:checked");

  if(checks.length === 0){
    alert("Selecione pelo menos um contato");
    return;
  }

  for(const check of checks){
    const telefone = check.closest("tr").children[2].innerText;

    await fetch("https://tiupgtbzikwmseecxbvo.supabase.co/functions/v1/humano-toggle",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        telefone,
        status: true
      })
    });
  }

  alert("Humano ativado 👍");
  carregar();
}

async function desativarSelecionados(){

  const checks = document.querySelectorAll(".check:checked");

  if(checks.length === 0){
    alert("Selecione pelo menos um contato");
    return;
  }

  for(const check of checks){
    const telefone = check.closest("tr").children[2].innerText;

    await fetch("https://tiupgtbzikwmseecxbvo.supabase.co/functions/v1/humano-toggle",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        telefone,
        status: false
      })
    });
  }

  alert("Bot ativado 🤖");
  carregar();
}
  
</script>

</body>
</html>
