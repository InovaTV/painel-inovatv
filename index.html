<!DOCTYPE html>
<html>
<head>
  <title>Painel InovaTV</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h2>Painel Admin - InovaTV</h2>

<input id="busca" placeholder="Telefone (ex: 55179...)">
<button onclick="buscar()">Buscar</button>

<br><br>

<button onclick="carregar()">🔄 Atualizar</button>

<table border="1" cellpadding="10">
  <thead>
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
      <th>Vencimento</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

<script>
const supabase = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

// =====================
// CARREGAR CLIENTES
// =====================
async function carregar() {
  const { data, error } = await supabase
    .from('clientes')
    .select('*')
    .order('criado_em', { ascending: false });

  if (error) {
    console.error('Erro ao carregar:', error);
    alert('Erro ao carregar dados');
    return;
  }

  render(data);
}

// =====================
// RENDERIZAR TABELA
// =====================
function render(clientes) {
  let html = '';

  if (!clientes || clientes.length === 0) {
    html = '<tr><td colspan="5">Nenhum cliente encontrado</td></tr>';
  } else {
    clientes.forEach(c => {
      html += `
        <tr>
          <td>${c.nome || '-'}</td>
          <td>${c.telefone}</td>
          <td>${c.status || '-'}</td>
          <td>${c.vencimento || '-'}</td>
          <td>
            <button onclick="pagar('${c.id}')">Pago</button>
            <button onclick="humano('${c.id}', ${c.atendimento_humano})">
              ${c.atendimento_humano ? 'IA ON' : 'Humano'}
            </button>
          </td>
        </tr>
      `;
    });
  }

  document.getElementById('tabela').innerHTML = html;
}

// =====================
// CONFIRMAR PAGAMENTO
// =====================
async function pagar(id){
  const { error } = await supabase
    .from('clientes')
    .update({ status: 'ativo' })
    .eq('id', id);

  if (error) {
    console.error(error);
    alert('Erro ao atualizar pagamento');
    return;
  }

  alert('Pagamento confirmado');
  carregar();
}

// =====================
// ATIVAR/DESATIVAR HUMANO
// =====================
async function humano(id, atual){
  const { error } = await supabase
    .from('clientes')
    .update({ atendimento_humano: !atual })
    .eq('id', id);

  if (error) {
    console.error(error);
    alert('Erro ao atualizar modo humano');
    return;
  }

  alert('Modo atualizado');
  carregar();
}

// =====================
// BUSCAR
// =====================
async function buscar(){
  let termo = document.getElementById('busca').value;

  const { data, error } = await supabase
    .from('clientes')
    .select('*')
    .ilike('telefone', `%${termo}%`);

  if (error) {
    console.error(error);
    alert('Erro na busca');
    return;
  }

  render(data);
}

// =====================
// AUTO LOAD
// =====================
carregar();

</script>

</body>
</html>
