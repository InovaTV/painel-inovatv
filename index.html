<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
    font-family: Arial;
    background:#0a0e27;
    color:#fff;
    margin:0;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.menu{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.menu button{
    background:#1e244d;
    border:none;
    color:#fff;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.menu .active{
    background:#b024ff;
}

input{
    padding:8px;
    border-radius:6px;
    border:none;
    margin-bottom:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#111;
}

th{
    background:#222;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #333;
}

/* destaque humano */
tr.humano{
    background:#3a1111;
}

.btn{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.bot{ background:#00d9ff; color:#000; }
.humano-btn{ background:#ff4d4d; color:#fff; }

</style>
</head>

<body>

<div class="container">

<h2>📺 Painel InovaTV</h2>

<div class="menu">
    <button class="active" onclick="trocar('clientes')">Clientes</button>
    <button onclick="trocar('produtos')">Produtos</button>
</div>

<div id="telaClientes">

<input id="busca" placeholder="Buscar cliente" oninput="carregar()">

<table>
<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Plano</th>
<th>Valor</th>
<th>Vencimento</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

</div>

<div id="telaProdutos" style="display:none">
<h3>Produtos (em breve)</h3>
</div>

</div>

<script>

const SUPABASE_URL = "https://tiupgtbzikwmseecxbvo.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// NORMALIZA TELEFONE
function tel(t){
    return (t || "").replace(/\D/g,"").slice(-11);
}

// TROCAR TELA
function trocar(t){
    document.getElementById("telaClientes").style.display = t==="clientes"?"block":"none";
    document.getElementById("telaProdutos").style.display = t==="produtos"?"block":"none";
}

// ================= CARREGAR =================
async function carregar(){

    const busca = document.getElementById("busca").value;
    const lista = document.getElementById("lista");

    lista.innerHTML = "<tr><td colspan='6'>Carregando...</td></tr>";

    try{

        let url = `${SUPABASE_URL}/functions/v1/rocket-clientes?page=1`;
        if(busca) url += `&busca=${encodeURIComponent(busca)}`;

        const res = await fetch(url);
        const json = await res.json();

        let clientes = json.itens || [];

        // ===== PEGAR HUMANO =====
        let mapa = {};

        const { data } = await supabaseClient
            .from("atendimentos")
            .select("*");

        (data || []).forEach(a=>{
            mapa[tel(a.telefone)] = a.humano;
        });

        // ===== APLICAR HUMANO =====
        clientes = clientes.map(c=>{
            const t = tel(c.telefone);
            return {
                ...c,
                t,
                humano: mapa[t] === true
            }
        });

        // ===== ORDENAR =====
        clientes.sort((a,b)=> b.humano - a.humano);

        lista.innerHTML = "";

        clientes.forEach(c=>{

            const vencido = new Date(c.vencimento) < new Date();

            lista.innerHTML += `
            <tr class="${c.humano ? 'humano':''}">
                <td>${c.nome}</td>
                <td>${c.telefone}</td>
                <td>${c.plano?.nome || '-'}</td>
                <td>R$ ${c.valor}</td>
                <td style="color:${vencido?'red':'#00ff88'}">
                    ${new Date(c.vencimento).toLocaleDateString()}
                </td>
                <td>
                    <button class="btn ${c.humano?'humano-btn':'bot'}"
                        onclick="toggle('${c.t}', ${!c.humano})">
                        ${c.humano ? '👤 HUMANO':'🤖 BOT'}
                    </button>
                </td>
            </tr>`;
        });

    }catch(e){
        lista.innerHTML = "<tr><td colspan='6'>Erro</td></tr>";
    }
}

// ================= TOGGLE =================
async function toggle(telefone, status){

    await supabaseClient
        .from("atendimentos")
        .upsert([{
            telefone,
            humano: status
        }]);

    carregar();
}

// INIT
carregar();

</script>

</body>
</html>
