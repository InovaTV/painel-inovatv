<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }
button { margin:4px; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
.btn-topo { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }

#progressBar { width:100%; background:#ccc; height:20px; }
#progress { width:0%; height:100%; background:green; color:#fff; text-align:center; }

#logErro {
  background:#000;
  color:#0f0;
  padding:10px;
  margin-top:10px;
  font-size:12px;
  max-height:200px;
  overflow:auto;
}

table { width:100%; border-collapse: collapse; font-size:13px; }
th,td { padding:6px; border:1px solid #ccc; }

#modalEdit {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<h2>Painel InovaTV</h2>
<h3 id="statusTela">Você está em: CLIENTES</h3>

<button onclick="trocarTela('clientes')">Clientes</button>
<button onclick="trocarTela('contatos')">Contatos</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome" onkeypress="if(event.key==='Enter') buscar()">
<button onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button onclick="importarArquivo()">IMPORTAR EXCEL</button>

<div id="progressBar"><div id="progress">0%</div></div>
<div id="logErro"></div>

<hr>

<div id="contadorSelecionados">Selecionados: 0</div>

<button onclick="selecionarTodos()">Selecionar todos</button>
<button onclick="desmarcarTodos()">Desmarcar</button>
<button onclick="filtrarAtivos()">Ativos</button>
<button onclick="filtrarVencidos()">Vencidos</button>
<button onclick="deletarSelecionados()">Excluir</button>

<table>
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela='clientes';
let dados=[];

function trocarTela(tipo){
  tela=tipo;
  statusTela.innerText="Você está em: "+tipo.toUpperCase();
  carregar();
}

function normalizar(t){
  return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function calcularStatus(c){
  if(!c.vencimento) return "ativo";
  let agora=new Date();
  let venc=new Date(c.hora_vencimento?`${c.vencimento}T${c.hora_vencimento}`:c.vencimento);
  return venc<agora?"inativo":"ativo";
}

function atualizarProgresso(a,t){
  let p=Math.floor((a/t)*100);
  progress.style.width=p+"%";
  progress.innerText=p+"%";
}

async function carregar(){
  const { data } = await client.from(tela).select('*');
  dados=data||[];

  if(tela==='clientes'){
    thead.innerHTML=`<tr><th></th><th>Nome</th><th>Telefone</th><th>Status</th><th>Ações</th></tr>`;
  }else{
    thead.innerHTML=`<tr><th></th><th>Nome</th><th>Telefone</th><th>Ações</th></tr>`;
  }

  render(dados);
}

function render(lista){
  tabela.innerHTML=lista.map(c=>`
    <tr>
      <td><input type="checkbox" class="check" data-id="${c.id}"></td>
      <td>${c.nome||''}</td>
      <td>${c.telefone||''}</td>
      ${tela==='clientes'?`<td>${calcularStatus(c)}</td>`:''}
      <td></td>
    </tr>
  `).join('');
}

function buscar(){
  let termo=normalizar(busca.value);
  render(dados.filter(c=>normalizar(c.nome).includes(termo)||(c.telefone||"").includes(termo)));
}

function selecionarTodos(){
  document.querySelectorAll('.check').forEach(c=>c.checked=true);
}

function desmarcarTodos(){
  document.querySelectorAll('.check').forEach(c=>c.checked=false);
}

function filtrarAtivos(){
  render(dados.filter(c=>calcularStatus(c)==="ativo"));
}

function filtrarVencidos(){
  render(dados.filter(c=>calcularStatus(c)==="inativo"));
}

async function deletarSelecionados(){
  let ids=[...document.querySelectorAll('.check:checked')].map(c=>c.dataset.id);
  if(ids.length===0)return alert("Nada selecionado");

  if(!confirm("Excluir?"))return;

  for(let i=0;i<ids.length;i++){
    await client.from(tela).delete().eq('id',ids[i]);
    atualizarProgresso(i+1,ids.length);
  }

  alert("Excluído");
  carregar();
}

// 🔥 IMPORTAÇÃO COM SINCRONIZAÇÃO
async function importarArquivo(){

  const file=inputArquivo.files[0];
  if(!file)return alert("Selecione arquivo");

  logErro.innerHTML="";
  progress.style.width="0%";

  const reader=new FileReader();

  reader.onload=async(e)=>{

    const wb=XLSX.read(e.target.result,{type:'binary'});
    const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

    let erros=0;

    for(let i=0;i<json.length;i++){

      let linha=json[i];

      try{

        let telefone=(linha.telefone||"").toString().replace(/\D/g,"");
        if(!telefone.startsWith("55"))telefone="55"+telefone;

        let nome=linha.nome||"Cliente";

        let vencimento=linha.vencimento;
        let hora=linha.hora_vencimento||linha.hora;

        if(!vencimento||!hora){
          throw new Error("Faltando vencimento ou hora");
        }

        // CLIENTES
        await client.from('clientes').upsert({
          nome,
          telefone,
          vencimento,
          hora_vencimento:hora
        });

        // 🔥 CONTATOS (SOLUÇÃO DO PROBLEMA)
        await client.from('contatos').upsert({
          telefone,
          nome,
          cliente:true
        },{ onConflict:'telefone' });

      }catch(e){

        erros++;

        logErro.innerHTML+=`
ERRO LINHA ${i+1}
Nome: ${linha.nome||''}
Telefone: ${linha.telefone||''}
Erro: ${e.message}
-------------------<br>`;
      }

      atualizarProgresso(i+1,json.length);
    }

    alert("Importado 🚀 Erros: "+erros);
    carregar();
  };

  reader.readAsBinaryString(file);
}

carregar();

</script>

</body>
</html>
