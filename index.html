<!DOCTYPE html>
<html>
<head>
  <title>Painel InovaTV</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    button { margin: 3px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 8px; }
  </style>
</head>
<body>

<h2>Painel InovaTV</h2>

<button onclick="mostrarClientes()">Clientes</button>
<button onclick="mostrarContatos()">Contatos</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button onclick="buscar()">Buscar</button>

<hr>

<h3>Importação</h3>

<input type="file" id="inputCSV" accept=".csv" />
<button onclick="importarCSV()">IMPORTAR CSV</button>
<button onclick="novoCliente()">NOVO CLIENTE</button>

<hr>

<h3>Ações em massa</h3>

<button onclick="toggleTodos(true)">Selecionar todos</button>
<button onclick="toggleTodos(false)">Desmarcar todos</button>
<button onclick="selecionarAtivos()">Selecionar ativos</button>
<button onclick="selecionarVencidos()">Selecionar vencidos</button>
<button onclick="renovarSelecionados()">Renovar selecionados</button>
<button onclick="deletarSelecionados()">Excluir selecionados</button>

<br><br>

<table border="1">
  <thead id="thead"></thead>
  <tbody id="tabela"></tbody>
</table>

<script>

const { createClient } = supabase;

const client = createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'SUA_ANON_KEY_AQUI'
);

let tela = 'clientes';

// ================= CLIENTES
async function mostrarClientes(){
  tela = 'clientes';

  document.getElementById('thead').innerHTML = `
    <tr>
      <th><input type="checkbox" onclick="toggleTodos(this.checked)"></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
      <th>Vencimento</th>
      <th>Ações</th>
    </tr>
  `;

  const { data } = await client
    .from('clientes')
    .select('*')
    .order('criado_em', { ascending: false });

  let html = '';

  data.forEach(c=>{
    html += `
      <tr>
        <td><input type="checkbox" class="checkCliente" value="${c.id}" data-status="${c.status}"></td>
        <td>${c.nome}</td>
        <td>${c.telefone}</td>
        <td>${c.status}</td>
        <td>${c.vencimento || '-'}</td>
        <td>
          <button onclick="renovarCliente('${c.id}')">Renovar</button>
          <button onclick="pagar('${c.id}')">Pago</button>
          <button onclick="editarCliente('${c.id}','${c.nome}','${c.telefone}')">Editar</button>
          <button onclick="deletarCliente('${c.id}')">Excluir</button>
        </td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML = html;
}

// ================= CONTATOS
async function mostrarContatos(){
  tela = 'contatos';

  document.getElementById('thead').innerHTML = `
    <tr>
      <th><input type="checkbox" onclick="toggleTodos(this.checked)"></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Ações</th>
    </tr>
  `;

  const { data } = await client.from('contatos').select('*');

  let html = '';

  data.forEach(c=>{
    html += `
      <tr>
        <td><input type="checkbox" class="checkContato" value="${c.telefone}"></td>
        <td>${c.nome}</td>
        <td>${c.telefone}</td>
        <td>
          <button onclick="virarCliente('${c.telefone}')">Virar Cliente</button>
          <button onclick="editarContato('${c.telefone}','${c.nome}')">Editar</button>
          <button onclick="deletarContato('${c.telefone}')">Excluir</button>
        </td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML = html;
}

// ================= TOGGLE TODOS
function toggleTodos(checked){
  document.querySelectorAll("input[type='checkbox']")
    .forEach(c => c.checked = checked);
}

// ================= SELECIONAR ATIVOS
function selecionarAtivos(){
  document.querySelectorAll(".checkCliente")
    .forEach(c => c.checked = c.dataset.status === "ativo");
}

// ================= SELECIONAR VENCIDOS
function selecionarVencidos(){
  document.querySelectorAll(".checkCliente")
    .forEach(c => c.checked = c.dataset.status === "inativo");
}

// ================= RENOVAR 1
async function renovarCliente(id){

  const novaData = new Date();
  novaData.setDate(novaData.getDate() + 30);

  await client.from('clientes')
    .update({
      status: 'ativo',
      vencimento: novaData.toISOString().split('T')[0]
    })
    .eq('id', id);

  mostrarClientes();
}

// ================= RENOVAR MULTI
async function renovarSelecionados(){

  const checks = document.querySelectorAll(".checkCliente:checked");

  if (!checks.length) return alert("Selecione clientes");

  for (const c of checks){
    await renovarCliente(c.value);
  }

  alert("Renovados 🚀");
}

// ================= DELETE MULTI
async function deletarSelecionados(){

  if (tela === 'clientes'){

    const checks = document.querySelectorAll(".checkCliente:checked");

    for (const c of checks){
      await client.from('clientes').delete().eq('id', c.value);
    }

    mostrarClientes();

  } else {

    const checks = document.querySelectorAll(".checkContato:checked");

    for (const c of checks){
      await client.from('contatos').delete().eq('telefone', c.value);
    }

    mostrarContatos();
  }

  alert("Excluídos 🚀");
}

// ================= OUTROS
async function pagar(id){
  await client.from('clientes').update({ status:'ativo' }).eq('id', id);
  mostrarClientes();
}

async function editarCliente(id, nomeAtual, telefoneAtual){
  const nome = prompt("Nome:", nomeAtual);
  const telefone = prompt("Telefone:", telefoneAtual);
  if (!nome || !telefone) return;

  await client.from('clientes').update({ nome, telefone }).eq('id', id);
  mostrarClientes();
}

async function deletarCliente(id){
  await client.from('clientes').delete().eq('id', id);
  mostrarClientes();
}

async function editarContato(telefone, nomeAtual){
  const nome = prompt("Nome:", nomeAtual);
  await client.from('contatos').update({ nome }).eq('telefone', telefone);
  mostrarContatos();
}

async function deletarContato(telefone){
  await client.from('contatos').delete().eq('telefone', telefone);
  mostrarContatos();
}

async function virarCliente(telefone){
  await client.rpc('virar_cliente', { p_telefone: telefone });
  mostrarClientes();
}

// INIT
mostrarClientes();

</script>

</body>
</html>
