<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
    font-family: Arial;
    background:#0a0e27;
    color:#fff;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{ margin:20px 0 10px }

.card{
    background:#141937;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.btn{
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.bot{ background:#00d9ff; color:#000; }
.humano{ background:#ff4d4d; }

.produto{
    background:#1e244d;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}

input{
    padding:6px;
    margin:5px;
}
</style>
</head>

<body>

<div class="container">

<h1>📞 Contatos</h1>
<div id="lista"></div>

<h1>📦 Produtos</h1>

<input id="nomeProduto" placeholder="Nome">
<input id="valorProduto" placeholder="Valor">
<button onclick="addProduto()">Adicionar</button>

<div id="produtos"></div>

</div>

<script>

// CONFIG
const SUPABASE_URL = "https://tiupgtbzikwmseecxbvo.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ================= CONTATOS =================
async function carregarContatos(){

    const { data: contatos } = await supabaseClient
        .from("contatos")
        .select("*");

    const { data: atendimentos } = await supabaseClient
        .from("atendimentos")
        .select("*");

    const mapa = {};
    atendimentos.forEach(a => mapa[a.telefone] = a.humano);

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    contatos.forEach(c => {

        const humano = mapa[c.telefone] || false;

        lista.innerHTML += `
        <div class="card">
            <div>
                <b>${c.nome || "Sem nome"}</b><br>
                ${c.telefone}
            </div>

            <button class="btn ${humano ? 'humano':'bot'}"
                onclick="toggle('${c.telefone}', ${!humano})">
                ${humano ? '👤 HUMANO':'🤖 BOT'}
            </button>
        </div>`;
    });
}

async function toggle(telefone, status){

    await fetch("SUA_EDGE_URL/humano-toggle", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ telefone, status })
    });

    carregarContatos();
}

// ================= PRODUTOS =================

async function carregarProdutos(){

    const { data } = await supabaseClient
        .from("produtos")
        .select("*")
        .order("criado_em", { ascending:false });

    const div = document.getElementById("produtos");
    div.innerHTML = "";

    data.forEach(p => {

        div.innerHTML += `
        <div class="produto">
            <input value="${p.nome}" id="nome-${p.id}">
            <input value="${p.valor}" id="valor-${p.id}">

            <button onclick="salvar('${p.id}')">💾</button>
            <button onclick="toggleAtivo('${p.id}', ${!p.ativo})">
                ${p.ativo ? '🟢':'⚫'}
            </button>
            <button onclick="remover('${p.id}')">🗑</button>
        </div>`;
    });
}

async function addProduto(){

    const nome = document.getElementById("nomeProduto").value;
    const valor = document.getElementById("valorProduto").value;

    if(!nome || !valor) return alert("Preencha");

    await supabaseClient.from("produtos").insert([{
        nome, valor
    }]);

    document.getElementById("nomeProduto").value = "";
    document.getElementById("valorProduto").value = "";

    carregarProdutos();
}

async function salvar(id){

    const nome = document.getElementById("nome-"+id).value;
    const valor = document.getElementById("valor-"+id).value;

    await supabaseClient
        .from("produtos")
        .update({ nome, valor })
        .eq("id", id);

    carregarProdutos();
}

async function toggleAtivo(id, status){

    await supabaseClient
        .from("produtos")
        .update({ ativo: status })
        .eq("id", id);

    carregarProdutos();
}

async function remover(id){

    if(!confirm("Excluir produto?")) return;

    await supabaseClient
        .from("produtos")
        .delete()
        .eq("id", id);

    carregarProdutos();
}

// INIT
carregarContatos();
carregarProdutos();

</script>

</body>
</html>
