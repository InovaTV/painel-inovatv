<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }

button { margin:3px; padding:6px 10px; cursor:pointer; }

.btn-verde { background:green; color:#fff; }
.btn-vermelho { background:red; color:#fff; }

.linha-humano { background:#e6ffe6; }
.linha-bot { background:#ffe6e6; }

table { width:100%; border-collapse: collapse; table-layout: fixed; }
th,td { border:1px solid #ccc; padding:6px; overflow:hidden; }

th {
  position:relative;
}

.resizer {
  position:absolute;
  right:0;
  top:0;
  width:5px;
  height:100%;
  cursor:col-resize;
}

.progress { width:100%; background:#ddd; height:20px; }
.progress-bar { height:100%; width:0%; background:green; color:#fff; text-align:center; }

#log {
  margin-top:10px;
  background:#000;
  color:#0f0;
  padding:10px;
  height:120px;
  overflow:auto;
  font-size:12px;
}
</style>
</head>

<body>

<h2>Painel InovaTV</h2>
<h3 id="statusTela">Você está em: CLIENTES</h3>

<button onclick="trocarTela('clientes')">Clientes</button>
<button onclick="trocarTela('contatos')">Contatos</button>

<button onclick="ativarSelecionados()" class="btn-verde">👤 Ativar Humano</button>
<button onclick="desativarSelecionados()" class="btn-vermelho">🤖 Ativar Bot</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo">
<button onclick="importarArquivo()" class="btn-verde">IMPORTAR EXCEL</button>

<div class="progress">
  <div id="progressBar" class="progress-bar">0%</div>
</div>

<div id="contadorSelecionados">Selecionados: 0</div>
<div id="contadorStatus">Ativos: 0 | Vencidos: 0</div>

<button onclick="selecionarTodos()">Selecionar todos</button>
<button onclick="desmarcarTodos()">Desmarcar</button>
<button onclick="filtrarAtivos()">Ativos</button>
<button onclick="filtrarVencidos()">Vencidos</button>
<button onclick="excluirSelecionados()" class="btn-vermelho">Excluir</button>

<table>
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<div id="log"></div>

<script>

const supabase = window.supabase.createClient(
  "https://tiupgtbzikwmseecxbvo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c"
);

let tela = "clientes";
let dados = [];

// ===== LOG =====
function log(msg){
  document.getElementById("log").innerHTML += msg+"<br>";
}

// ===== TROCAR TELA =====
function trocarTela(t){
  tela = t;
  statusTela.innerText = "Você está em: " + t.toUpperCase();
  carregar();
}

// ===== CARREGAR =====
async function carregar(){
  log("🔄 carregando "+tela);
  const { data } = await supabase.from(tela).select("*");
  dados = data || [];
  montarCabecalho();
  render(dados);
}

// ===== CABEÇALHO =====
function montarCabecalho(){
  if(tela==="clientes"){
    thead.innerHTML = `<tr>
    <th></th><th>Nome</th><th>Telefone</th><th>Usuário</th>
    <th>Vencimento</th><th>Status</th><th>Ações</th></tr>`;
  }else{
    thead.innerHTML = `<tr>
    <th></th><th>Nome</th><th>Telefone</th><th>Usuário</th>
    <th>Status</th><th>Ações</th></tr>`;
  }

  setTimeout(addResizers,100);
}

// ===== STATUS =====
function calcularStatus(c){
  if(!c.vencimento) return "ativo";
  let hoje = new Date();
  hoje.setHours(0,0,0,0);
  let d = c.vencimento.split("-");
  let v = new Date(d[0],d[1]-1,d[2]);
  return v < hoje ? "inativo":"ativo";
}

// ===== RENDER =====
function render(lista){
  tabela.innerHTML = lista.map(c=>{

    let status = calcularStatus(c);

    return `<tr class="${c.atendimento_humano?'linha-humano':'linha-bot'}">

<td><input type="checkbox" class="check" data-id="${c.id}" data-telefone="${c.telefone}" onchange="contarSelecionados()"></td>

<td>${c.nome||""}</td>
<td>${c.telefone||""}</td>
<td>${c.usuario||""}</td>

${tela==="clientes"?`<td>${c.vencimento||""}</td>`:""}

<td>${status}</td>

<td>
<button onclick="ativarHumano('${c.telefone}')">👤</button>
<button onclick="desativarHumano('${c.telefone}')">🤖</button>
</td>

</tr>`;

  }).join("");

  atualizarContadores(lista);
}

// ===== CONTADORES =====
function atualizarContadores(lista){
  let a=0,v=0;
  lista.forEach(c=>{
    let s = calcularStatus(c);
    if(s==="ativo") a++;
    if(s==="inativo") v++;
  });
  contadorStatus.innerText=`Ativos: ${a} | Vencidos: ${v}`;
  contarSelecionados();
}

function contarSelecionados(){
  contadorSelecionados.innerText="Selecionados: "+document.querySelectorAll(".check:checked").length;
}

// ===== SELEÇÃO =====
function selecionarTodos(){
  document.querySelectorAll(".check").forEach(c=>c.checked=true);
  contarSelecionados();
}

function desmarcarTodos(){
  document.querySelectorAll(".check").forEach(c=>c.checked=false);
  contarSelecionados();
}

// ===== TOGGLE =====
async function toggleHumano(tel,status){
  await fetch("https://tiupgtbzikwmseecxbvo.supabase.co/functions/v1/humano-toggle",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ telefone:tel, status })
  });
}

// ===== INDIVIDUAL =====
async function ativarHumano(t){ await toggleHumano(t,true); carregar(); }
async function desativarHumano(t){ await toggleHumano(t,false); carregar(); }

// ===== MULTIPLO =====
async function ativarSelecionados(){
  const c = document.querySelectorAll(".check:checked");
  if(!c.length) return alert("Selecione pelo menos um");
  for(const i of c) await toggleHumano(i.dataset.telefone,true);
  carregar();
}

async function desativarSelecionados(){
  const c = document.querySelectorAll(".check:checked");
  if(!c.length) return alert("Selecione pelo menos um");
  for(const i of c) await toggleHumano(i.dataset.telefone,false);
  carregar();
}

// ===== FILTROS =====
function filtrarAtivos(){ render(dados.filter(c=>calcularStatus(c)==="ativo")); }
function filtrarVencidos(){ render(dados.filter(c=>calcularStatus(c)==="inativo")); }

// ===== BUSCA =====
function buscar(){
  let t = busca.value.toLowerCase();
  render(dados.filter(c=> (c.nome||"").toLowerCase().includes(t) || (c.telefone||"").includes(t)));
}

// ===== EXCLUIR =====
async function excluirSelecionados(){
  const c = document.querySelectorAll(".check:checked");
  if(!c.length) return alert("Selecione pelo menos um");
  for(const i of c) await supabase.from(tela).delete().eq("id", i.dataset.id);
  carregar();
}

// ===== IMPORTAR EXCEL =====
async function importarArquivo(){

  const file = inputArquivo.files[0];
  if(!file) return alert("Escolha um arquivo");

  const reader = new FileReader();

  reader.onload = async (e)=>{
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data,{type:"array"});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    let erros=0;

    for(let i=0;i<json.length;i++){

      try{
        await supabase.from(tela).insert(json[i]);
      }catch{
        erros++;
      }

      let p = Math.floor((i/json.length)*100);
      progressBar.style.width=p+"%";
      progressBar.innerText=p+"%";
    }

    alert("Importação concluída. Erros: "+erros);
    carregar();
  };

  reader.readAsArrayBuffer(file);
}

// ===== RESIZE COLUNA =====
function addResizers(){
  document.querySelectorAll("th").forEach(th=>{
    const div = document.createElement("div");
    div.classList.add("resizer");
    th.appendChild(div);

    let startX, startWidth;

    div.addEventListener("mousedown",(e)=>{
      startX=e.pageX;
      startWidth=th.offsetWidth;

      document.onmousemove=(e)=>{
        th.style.width=(startWidth + e.pageX - startX)+"px";
      };

      document.onmouseup=()=>document.onmousemove=null;
    });
  });
}

// ===== REALTIME =====
supabase.channel("realtime")
.on("postgres_changes",{event:"*",schema:"public"},()=>{
  log("🔄 realtime update");
  carregar();
}).subscribe();

carregar();

</script>

</body>
</html>
