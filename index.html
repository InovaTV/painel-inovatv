<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Painel InovaTV</title>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    button { margin: 3px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 8px; }
  </style>
</head>
<body>

<h2>Painel InovaTV</h2>

<button onclick="mostrarClientes()">Clientes</button>
<button onclick="mostrarContatos()">Contatos</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button onclick="buscar()">Buscar</button>

<hr>

<h3>Importação</h3>

<input type="file" id="inputArquivo" accept=".xlsx,.csv" />
<button onclick="importarArquivo()">IMPORTAR EXCEL</button>
<button onclick="novoCliente()">NOVO CLIENTE</button>

<hr>

<h3>Ações</h3>

<button onclick="toggleTodos(true)">Selecionar todos</button>
<button onclick="toggleTodos(false)">Desmarcar todos</button>
<button onclick="selecionarAtivos()">Selecionar ativos</button>
<button onclick="selecionarVencidos()">Selecionar vencidos</button>
<button onclick="renovarSelecionados()">Renovar selecionados</button>
<button onclick="deletarSelecionados()">Excluir selecionados</button>

<br><br>

<table border="1">
  <thead id="thead"></thead>
  <tbody id="tabela"></tbody>
</table>

<script>

const { createClient } = supabase;

const client = createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela = 'clientes';

// ================= IMPORTAR XLSX
async function importarArquivo(){

  const file = document.getElementById("inputArquivo").files[0];

  if (!file){
    alert("Selecione um arquivo");
    return;
  }

  const data = await file.arrayBuffer();
  const workbook = XLSX.read(data);

  const sheet = workbook.Sheets[workbook.SheetNames[0]];

  const json = XLSX.utils.sheet_to_json(sheet);

  console.log("EXCEL:", json);

  const clientes = json.map(c => ({
    nome: c.nome || c.Nome,
    telefone: c.telefone || c.Telefone,
    usuario: c.usuario || c.Usuario,
    senha: c.senha || c.Senha,
    plano: c.plano || c.Plano,
    valor: c.valor || c.Valor,
    vencimento: c.vencimento || c.Vencimento,
    dispositivo: c.dispositivo || c.Dispositivo,
    telas: c.telas || c.Telas
  }));

  await fetch("/api/importar-clientes", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ clientes })
  });

  alert("Importado do Excel 🚀");
  mostrarClientes();
}

// ================= CLIENTES
async function mostrarClientes(){
  tela = 'clientes';

  document.getElementById('thead').innerHTML = `
    <tr>
      <th><input type="checkbox" onclick="toggleTodos(this.checked)"></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
      <th>Vencimento</th>
      <th>Ações</th>
    </tr>
  `;

  const { data } = await client
    .from('clientes')
    .select('*')
    .order('criado_em', { ascending: false });

  let html = '';

  data.forEach(c=>{
    html += `
      <tr>
        <td><input type="checkbox" class="checkCliente" value="${c.id}" data-status="${c.status}"></td>
        <td>${c.nome}</td>
        <td>${c.telefone}</td>
        <td>${c.status}</td>
        <td>${c.vencimento || '-'}</td>
        <td>
          <button onclick="renovarCliente('${c.id}')">Renovar</button>
          <button onclick="editarCliente('${c.id}','${c.nome}','${c.telefone}')">Editar</button>
          <button onclick="deletarCliente('${c.id}')">Excluir</button>
        </td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML = html;
}

// ================= FUNÇÕES MASSA
function toggleTodos(checked){
  document.querySelectorAll("input[type='checkbox']")
    .forEach(c => c.checked = checked);
}

function selecionarAtivos(){
  document.querySelectorAll(".checkCliente")
    .forEach(c => c.checked = c.dataset.status === "ativo");
}

function selecionarVencidos(){
  document.querySelectorAll(".checkCliente")
    .forEach(c => c.checked = c.dataset.status === "inativo");
}

async function renovarCliente(id){

  const nova = new Date();
  nova.setDate(nova.getDate() + 30);

  await client.from('clientes').update({
    status: 'ativo',
    vencimento: nova.toISOString().split('T')[0]
  }).eq('id', id);

  mostrarClientes();
}

async function renovarSelecionados(){

  const checks = document.querySelectorAll(".checkCliente:checked");

  for (const c of checks){
    await renovarCliente(c.value);
  }

  alert("Renovados 🚀");
}

async function deletarSelecionados(){

  const checks = document.querySelectorAll(".checkCliente:checked");

  for (const c of checks){
    await client.from('clientes').delete().eq('id', c.value);
  }

  alert("Excluídos 🚀");
  mostrarClientes();
}

// ================= BUSCA
async function buscar(){

  let termo = document.getElementById('busca').value;

  const { data } = await client
    .from('clientes')
    .select('*')
    .or(`telefone.ilike.%${termo}%,nome.ilike.%${termo}%`);

  let html = '';

  data.forEach(c=>{
    html += `<tr><td>${c.nome}</td><td>${c.telefone}</td><td>${c.status}</td><td>${c.vencimento}</td><td>-</td></tr>`;
  });

  document.getElementById('tabela').innerHTML = html;
}

// INIT
mostrarClientes();

</script>

</body>
</html>
