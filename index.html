<!DOCTYPE html>
<html>
<head>
  <title>Painel InovaTV</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    button { margin: 3px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 8px; }
  </style>
</head>
<body>

<h2>Painel InovaTV</h2>

<button onclick="mostrarClientes()">Clientes</button>
<button onclick="mostrarContatos()">Contatos</button>

<br><br>

<input id="busca" placeholder="Telefone">
<button onclick="buscar()">Buscar</button>

<hr>

<h3>Importação</h3>

<input type="file" id="inputCSV" accept=".csv" />
<button onclick="importarCSV()">IMPORTAR CSV</button>

<button onclick="novoCliente()">NOVO CLIENTE</button>

<br><br>

<table border="1">
  <thead id="thead"></thead>
  <tbody id="tabela"></tbody>
</table>

<script>

// ================= SUPABASE
const { createClient } = supabase;

const client = createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'SUA_ANON_KEY_AQUI'
);

// ================= CONTROLE
let tela = 'clientes';

// ================= CLIENTES
async function mostrarClientes(){
  tela = 'clientes';

  document.getElementById('thead').innerHTML = `
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
      <th>Vencimento</th>
      <th>Ações</th>
    </tr>
  `;

  const { data, error } = await client.from('clientes').select('*');

  if (error){
    alert('Erro ao carregar clientes');
    return;
  }

  let html = '';

  data.forEach(c=>{
    html += `
      <tr>
        <td>${c.nome || '-'}</td>
        <td>${c.telefone}</td>
        <td>${c.status || '-'}</td>
        <td>${c.vencimento || '-'}</td>
        <td>
          <button onclick="pagar('${c.id}')">Pago</button>
          <button onclick="humano('${c.id}', ${c.atendimento_humano})">
            ${c.atendimento_humano ? 'IA ON' : 'Humano'}
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML = html;
}

// ================= CONTATOS
async function mostrarContatos(){
  tela = 'contatos';

  document.getElementById('thead').innerHTML = `
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Ações</th>
    </tr>
  `;

  const { data, error } = await client.from('contatos').select('*');

  if (error){
    alert('Erro ao carregar contatos');
    return;
  }

  let html = '';

  data.forEach(c=>{
    html += `
      <tr>
        <td>${c.nome || 'Sem nome'}</td>
        <td>${c.telefone}</td>
        <td>
          <button onclick="virarCliente('${c.telefone}')">
            Virar Cliente
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML = html;
}

// ================= VIRAR CLIENTE
async function virarCliente(telefone){
  const { error } = await client.rpc('virar_cliente', {
    p_telefone: telefone
  });

  if (error){
    alert('Erro ao converter cliente');
    return;
  }

  alert('Cliente criado!');
  mostrarClientes();
}

// ================= PAGAMENTO
async function pagar(id){
  await client.from('clientes').update({ status:'ativo' }).eq('id', id);
  mostrarClientes();
}

// ================= HUMANO
async function humano(id, atual){
  await client.from('clientes')
    .update({ atendimento_humano: !atual })
    .eq('id', id);

  mostrarClientes();
}

// ================= BUSCA
async function buscar(){
  let termo = document.getElementById('busca').value;

  const { data } = await client
    .from(tela)
    .select('*')
    .ilike('telefone', `%${termo}%`);

  let html = '';

  data.forEach(c=>{
    html += `<tr><td>${c.nome}</td><td>${c.telefone}</td><td>${c.status||'-'}</td><td>${c.vencimento||'-'}</td><td>-</td></tr>`;
  });

  document.getElementById('tabela').innerHTML = html;
}

// ================= IMPORTAR CSV
async function importarCSV(){

  const file = document.getElementById("inputCSV").files[0];

  if (!file){
    alert("Selecione um CSV");
    return;
  }

  const text = await file.text();

  const linhas = text.split("\n");
  const cab = linhas[0].split(",");

  const clientes = [];

  for (let i=1;i<linhas.length;i++){

    const dados = linhas[i].split(",");

    if (!dados[0]) continue;

    let obj = {};

    cab.forEach((c,i)=>{
      obj[c.trim().toLowerCase()] = dados[i]?.trim();
    });

    clientes.push({
      nome: obj.nome,
      telefone: obj.telefone,
      usuario: obj.usuario,
      senha: obj.senha,
      plano: obj.plano,
      valor: obj.valor,
      vencimento: obj.vencimento,
      servidor: obj.servidor,
      aplicativo: obj.aplicativo,
      dispositivo: obj.dispositivo,
      telas: obj.telas,
      forma_pagamento: obj.forma_pagamento
    });

  }

  await fetch("/api/importar-clientes", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ clientes })
  });

  alert("Importado com sucesso 🚀");
  location.reload();
}

// ================= NOVO CLIENTE
async function novoCliente(){

  const nome = prompt("Nome:");
  const telefone = prompt("Telefone:");
  const usuario = prompt("Usuário:");
  const senha = prompt("Senha:");
  const plano = prompt("Plano:");
  const valor = prompt("Valor:");
  const vencimento = prompt("Vencimento:");

  const cliente = {
    nome, telefone, usuario, senha, plano, valor, vencimento
  };

  await fetch("/api/importar-clientes", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ clientes:[cliente] })
  });

  alert("Cliente criado 🚀");
  location.reload();
}

// INIT
mostrarClientes();

</script>

</body>
</html>
