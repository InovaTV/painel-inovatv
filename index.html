<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
    font-family: Arial;
    background:#0a0e27;
    color:#fff;
    margin:0;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.menu{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.menu button{
    background:#1e244d;
    border:none;
    color:#fff;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.menu .active{
    background:#b024ff;
}

.stats{
    display:flex;
    gap:20px;
    margin-bottom:10px;
    font-weight:bold;
}

input{
    padding:8px;
    border-radius:6px;
    border:none;
    margin-bottom:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#111;
}

th{
    background:#222;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #333;
}

tr.humano{
    background:#3a1111;
}

.btn{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.bot{ background:#00d9ff; color:#000; }
.humano-btn{ background:#ff4d4d; color:#fff; }
.delete{ background:#666; color:#fff; }
</style>
</head>

<body>

<div class="container">

<h2>📺 Painel InovaTV</h2>

<div class="menu">
    <button id="btnClientes" class="active" onclick="trocar('clientes')">Clientes</button>
    <button id="btnProdutos" onclick="trocar('produtos')">Produtos</button>
</div>

<div class="stats">
    <div>👥 Total: <span id="total">0</span></div>
    <div>🤖 BOT: <span id="bot">0</span></div>
    <div>👤 HUMANO: <span id="humano">0</span></div>
</div>

<div id="telaClientes">

<input id="busca" placeholder="Buscar cliente" oninput="carregar()">

<table>
<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Usuário</th>
<th>Plano</th>
<th>Valor</th>
<th>Vencimento</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

</div>

<div id="telaProdutos" style="display:none">

<h3>📦 Produtos</h3>

<input id="nomeProduto" placeholder="Nome">
<input id="valorProduto" placeholder="Valor">

<button onclick="salvarProduto()">Salvar</button>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Valor</th>
<th>Status</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="listaProdutos"></tbody>
</table>

</div>

</div>

<script>

const SUPABASE_URL = "https://tiupgtbzikwmseecxbvo.supabase.co";
const SUPABASE_KEY = "SEU_ANON_KEY";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function tel(t){
    return (t || "").replace(/\D/g,"").slice(-11);
}

function trocar(t){
    document.getElementById("telaClientes").style.display =
        t==="clientes"?"block":"none";

    document.getElementById("telaProdutos").style.display =
        t==="produtos"?"block":"none";

    document.getElementById("btnClientes").classList.toggle("active", t==="clientes");
    document.getElementById("btnProdutos").classList.toggle("active", t==="produtos");

    if(t==="produtos") carregarProdutos();
}

async function carregar(){

    const busca = document.getElementById("busca").value;
    const lista = document.getElementById("lista");

    lista.innerHTML = "<tr><td colspan='7'>Carregando...</td></tr>";

    try{

        let url = `${SUPABASE_URL}/functions/v1/rocket-clientes`;
        if(busca) url += `?busca=${encodeURIComponent(busca)}`;

        const res = await fetch(url);

        if(!res.ok){
            throw new Error("Erro API Rocket");
        }

        const json = await res.json();

        let clientes = json.itens || [];

        let mapa = {};

        const { data } = await supabaseClient
            .from("atendimentos")
            .select("*");

        (data || []).forEach(a=>{
            mapa[tel(a.telefone)] = a.humano;
        });

        let total = 0;
        let totalHumano = 0;
        let totalBot = 0;

        clientes = clientes.map(c=>{
            const t = tel(c.telefone);
            const humano = mapa[t] === true;

            total++;
            humano ? totalHumano++ : totalBot++;

            return { ...c, t, humano };
        });

        document.getElementById("total").innerText = total;
        document.getElementById("humano").innerText = totalHumano;
        document.getElementById("bot").innerText = totalBot;

        clientes.sort((a,b)=> {
            if (b.humano !== a.humano) return b.humano - a.humano;
            return a.nome.localeCompare(b.nome);
        });

        lista.innerHTML = "";

        clientes.forEach(c=>{

            const vencido = new Date(c.vencimento) < new Date();

            lista.innerHTML += `
            <tr class="${c.humano ? 'humano':''}">
                <td>${c.nome}</td>
                <td>${c.telefone}</td>
                <td>${c.usuario || '-'}</td>
                <td>${c.plano?.nome || '-'}</td>
                <td>R$ ${c.valor}</td>
                <td style="color:${vencido?'red':'#00ff88'}">
                    ${new Date(c.vencimento).toLocaleDateString()}
                </td>
                <td style="display:flex; gap:6px; align-items:center;">
    <button class="btn bot"
        style="${!c.humano ? 'opacity:1' : 'opacity:0.4'}"
        onclick="setModo('${c.t}', false)">
        🤖 BOT
    </button>

    <button class="btn humano-btn"
        style="${c.humano ? 'opacity:1' : 'opacity:0.4'}"
        onclick="setModo('${c.t}', true)">
        👤 HUMANO
    </button>
</td>
            </tr>`;
        });

    }catch(e){
        console.error(e);
        lista.innerHTML = "<tr><td colspan='7'>Erro ao carregar clientes</td></tr>";
    }
}

async function setModo(telefone, humano){

    await supabaseClient
        .from("atendimentos")
        .upsert([{
            telefone,
            humano,
            atualizado_em: new Date()
        }]);

    carregar();
}

async function carregarProdutos(){

    const lista = document.getElementById("listaProdutos");
    lista.innerHTML = "<tr><td colspan='4'>Carregando...</td></tr>";

    const { data, error } = await supabaseClient
        .from("produtos")
        .select("*")
        .order("criado_em", { ascending: false });

    if(error){
        lista.innerHTML = "<tr><td colspan='4'>Erro</td></tr>";
        return;
    }

    lista.innerHTML = "";

    (data || []).forEach(p=>{
        lista.innerHTML += `
        <tr>
            <td>${p.nome}</td>
            <td>R$ ${p.valor}</td>
            <td>${p.ativo ? "Ativo":"Inativo"}</td>
            <td>
                <button class="btn delete" onclick="excluirProduto('${p.id}')">
                    Excluir
                </button>
            </td>
        </tr>`;
    });
}

async function salvarProduto(){

    const nome = document.getElementById("nomeProduto").value;
    const valor = document.getElementById("valorProduto").value;

    if(!nome || !valor){
        alert("Preencha tudo");
        return;
    }

    await supabaseClient
        .from("produtos")
        .insert([{
            nome,
            valor: Number(valor),
            ativo: true
        }]);

    document.getElementById("nomeProduto").value = "";
    document.getElementById("valorProduto").value = "";

    carregarProdutos();
}

async function excluirProduto(id){

    await supabaseClient
        .from("produtos")
        .delete()
        .eq("id", id);

    carregarProdutos();
}

carregar();

</script>

</body>
</html>
