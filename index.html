<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#0a0e27;
color:#fff;
margin:0
}

.container{
max-width:1200px;
margin:auto;
padding:20px
}

.menu{
display:flex;
gap:10px;
margin-bottom:20px
}

.menu button{
background:#1e244d;
border:none;
color:#fff;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
transition:.2s;
}

.menu button:hover{
background:#2a3170;
}

.menu .active{
background:#b024ff;
}

.stats{
display:flex;
gap:20px;
margin-bottom:10px;
font-weight:bold
}

input{
padding:10px;
border-radius:8px;
border:none;
margin-bottom:10px;
width:100%
}

table{
width:100%;
border-collapse:collapse;
background:#111;
border-radius:10px;
overflow:hidden;
}

th{
background:#1e244d;
padding:12px;
text-align:left;
font-size:13px;
}

td{
padding:12px;
border-bottom:1px solid #222;
font-size:14px;
}

tr:hover{
background:#181f4a;
}

.btn{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.bot{background:#00d9ff;color:#000}
.humano-btn{background:#ff4d4d;color:#fff}

.acoes{
display:flex;
gap:5px;
}

img{
border-radius:6px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000a;
backdrop-filter:blur(5px);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:20px;
border-radius:12px;
width:350px;
}

.modal-content input{
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Painel InovaTV</h2>

<div class="menu">
<button onclick="trocar('clientes')" class="active">Clientes</button>
<button onclick="trocar('produtos')">Produtos</button>
</div>

<div class="stats">
<div>Total: <span id="total">0</span></div>
</div>

<!-- CLIENTES -->
<div id="telaClientes">
<input id="busca" placeholder="Buscar" oninput="carregarClientes()">

<table>
<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Usuário</th>
<th>Plano</th>
<th>Valor</th>
<th>Vencimento</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>
</div>

<!-- PRODUTOS -->
<div id="telaProdutos" style="display:none">

<button onclick="abrirModal()">+ Criar Produto</button>
<button onclick="excluirSelecionados()">Excluir Selecionados</button>

<table>
<thead>
<tr>
<th><input type="checkbox" onclick="toggleTodos(this)"></th>
<th>Img</th>
<th>Nome</th>
<th>Descrição</th>
<th>Valor</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="listaProdutos"></tbody>
</table>

</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<h3>Produto</h3>

<input id="nomeProduto" placeholder="Nome">
<input id="valorProduto" placeholder="Valor">
<input id="descricaoProduto" placeholder="Descrição">
<input type="file" id="imagemProduto">

<img id="preview" style="width:100px;display:none">

<br><br>

<button onclick="salvarProduto()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>
</div>

<script>

const SUPABASE_URL="https://tiupgtbzikwmseecxbvo.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c"

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let editandoId=null
let imagemAtual=null

function trocar(t){
document.getElementById("telaClientes").style.display=t==="clientes"?"block":"none"
document.getElementById("telaProdutos").style.display=t==="produtos"?"block":"none"
if(t==="produtos")carregarProdutos()
}

// CLIENTES
async function carregarClientes(){
const lista=document.getElementById("lista")
lista.innerHTML="<tr><td colspan='7'>Carregando...</td></tr>"

try{
const res=await fetch(`${SUPABASE_URL}/functions/v1/rocket-clientes`)
const json=await res.json()

lista.innerHTML=""

json.itens.forEach(c=>{
lista.innerHTML+=`
<tr>
<td>${c.nome}</td>
<td>${c.telefone}</td>
<td>${c.usuario||"-"}</td>
<td>${c.plano?.nome||"-"}</td>
<td>${c.valor}</td>
<td>${new Date(c.vencimento).toLocaleDateString()}</td>
<td class="acoes">
<button class="btn bot">BOT</button>
<button class="btn humano-btn">HUMANO</button>
</td>
</tr>`
})

document.getElementById("total").innerText=json.itens.length

}catch{
lista.innerHTML="<tr><td colspan='7'>Erro</td></tr>"
}
}

// PRODUTOS
async function carregarProdutos(){

const res=await fetch(`${SUPABASE_URL}/rest/v1/produtos?select=*&order=criado_em.desc`,{
headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
})

const data=await res.json()

listaProdutos.innerHTML=""

data.forEach(p=>{
listaProdutos.innerHTML+=`
<tr>
<td><input type="checkbox" class="checkProduto" value="${p.id}"></td>
<td>${p.imagem?`<img src="${p.imagem}" width="50">`:"-"}</td>
<td>${p.nome}</td>
<td>${p.descricao||"-"}</td>
<td>R$ ${p.valor}</td>
<td><button onclick="toggle('${p.id}',${p.ativo})">${p.ativo?"Ativo":"Inativo"}</button></td>
<td class="acoes">
<button onclick="abrirEditar('${p.id}')">Editar</button>
<button onclick="excluir('${p.id}')">Excluir</button>
</td>
</tr>`
})
}

// CHECKBOX
function toggleTodos(el){
document.querySelectorAll(".checkProduto")
.forEach(c=>c.checked=el.checked)
}

function excluirSelecionados(){
const ids=[...document.querySelectorAll(".checkProduto:checked")].map(c=>c.value)
ids.forEach(id=>excluir(id))
}

// MODAL
function abrirModal(p=null){
modal.style.display="flex"

if(p){
editandoId=p.id
imagemAtual=p.imagem
nomeProduto.value=p.nome
valorProduto.value=p.valor
descricaoProduto.value=p.descricao||""
if(p.imagem){
preview.src=p.imagem
preview.style.display="block"
}
}else{
editandoId=null
imagemAtual=null
nomeProduto.value=""
valorProduto.value=""
descricaoProduto.value=""
preview.style.display="none"
}
}

function fecharModal(){modal.style.display="none"}

imagemProduto.onchange=e=>{
const f=e.target.files[0]
if(f){
preview.src=URL.createObjectURL(f)
preview.style.display="block"
}
}

// EDITAR
async function abrirEditar(id){
const res=await fetch(`${SUPABASE_URL}/rest/v1/produtos?id=eq.${id}`,{
headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
})
const p=(await res.json())[0]
abrirModal(p)
}

// SALVAR
async function salvarProduto(){

let payload={
nome:nomeProduto.value,
valor:Number(valorProduto.value),
descricao:descricaoProduto.value||null,
ativo:true
}

// upload imagem
let file=imagemProduto.files[0]
if(file){
let nomeArq=Date.now()+"_"+file.name

await fetch(`${SUPABASE_URL}/storage/v1/object/produtos/${nomeArq}`,{
method:"POST",
headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`},
body:file
})

payload.imagem=`${SUPABASE_URL}/storage/v1/object/public/produtos/${nomeArq}`
}

// INSERT / UPDATE
let url=`${SUPABASE_URL}/rest/v1/produtos`
let method="POST"

if(editandoId){
url+=`?id=eq.${editandoId}`
method="PATCH"
}

await fetch(url,{
method,
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`,
"Content-Type":"application/json"
},
body:JSON.stringify(payload)
})

fecharModal()
carregarProdutos()
}

// EXCLUIR
async function excluir(id){
await fetch(`${SUPABASE_URL}/rest/v1/produtos?id=eq.${id}`,{
method:"DELETE",
headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
})
carregarProdutos()
}

// STATUS
async function toggle(id,atual){
await fetch(`${SUPABASE_URL}/rest/v1/produtos?id=eq.${id}`,{
method:"PATCH",
headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"},
body:JSON.stringify({ativo:!atual})
})
carregarProdutos()
}

carregarClientes()

</script>

</body>
</html>
