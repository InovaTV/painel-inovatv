<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }
button { margin:4px; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
.btn-topo { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }

#progressBar { width:100%; background:#ccc; height:20px; }
#progress { width:0%; height:100%; background:green; color:#fff; text-align:center; }

table { width:100%; border-collapse: collapse; font-size:13px; }
th,td { padding:6px; border:1px solid #ccc; }

.hidden { display:none; }
</style>
</head>

<body>

<h2>Painel InovaTV</h2>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

<div id="progressBar"><div id="progress">0%</div></div>

<hr>

<table>
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

function atualizarProgresso(a,t){
  let p=Math.floor((a/t)*100);
  progress.style.width=p+"%";
  progress.innerText=p+"%";
}

// ================= IMPORTAÇÃO CORRIGIDA 100%
async function importarArquivo(){

  const file = inputArquivo.files[0];
  if(!file) return alert("Selecione arquivo");

  if(!confirm("Importar clientes?")) return;

  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  for(let i=0;i<json.length;i++){

    let c = json[i];

    // 🔥 TELEFONE
    let telefone = (c.telefone || c.telefone_ || "")
      .toString()
      .replace(/\D/g,"")
      .replace(/^0+/, "");

    if(!telefone) continue;

    if(!telefone.startsWith("55")){
      telefone = "55"+telefone;
    }

    // 🔥 DATA
    let dataVenc = c.vencimen || c.vencimento || null;
    let dataFormatada = null;

    if(dataVenc){
      let d = new Date(dataVenc);
      if(!isNaN(d)){
        dataFormatada = d.toISOString().split("T")[0];
      }
    }

    // 🔥 HORA
    let horaVenc = c.hora_venc || c.hora_vencimento || null;
    let horaFormatada = null;

    if(horaVenc){
      if(typeof horaVenc === "number"){
        let total = Math.floor(horaVenc * 86400);
        let h = Math.floor(total / 3600);
        let m = Math.floor((total % 3600)/60);
        let s = total % 60;

        horaFormatada = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      } else {
        horaFormatada = horaVenc;
      }
    }

    // 🔥 STATUS
    let status = "ativo";

    if(dataFormatada){
      let agora = new Date();
      let venc = new Date(
        horaFormatada
        ? `${dataFormatada}T${horaFormatada}`
        : dataFormatada
      );

      if(venc < agora){
        status = "inativo";
      }
    }

    // 🔥 UPSERT COMPLETO
    await client.from('clientes').upsert({
      nome: c.nome || "Cliente",
      telefone,
      usuario: c.usuario || null,
      senha: c.senha || null,
      plano: c.plano || null,
      valor: c.valor ? Number(c.valor) : null,
      vencimento: dataFormatada,
      hora_vencimento: horaFormatada,
      status,
      servidor: c.servidor || null,
      aplicativo: c.aplicativo || null,
      dispositivo: c.dispositivo || null,
      telas: c.telas ? Number(c.telas) : 1,
      forma_pagamento: c.forma_pagamento || "PIX",
      observacao: c.observacao || "Importado automático"
    }, { onConflict: 'telefone' });

    atualizarProgresso(i+1, json.length);
  }

  alert("Importação concluída 🚀");
}

</script>

</body>
</html>
