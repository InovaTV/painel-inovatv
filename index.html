<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding: 20px; }

.dark { background:#121212; color:#fff; }

button {
  margin:4px;
  padding:6px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

.btn-azul { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }
.btn-neutro { background:#ddd; }

.dark .btn-neutro { background:#333; color:#fff; }

.ativo { outline:3px solid #000; }

table { width:100%; border-collapse: collapse; }
th,td { padding:8px; }

.card {
  background:#fff;
  padding:10px;
  margin-top:20px;
}

.dark .card { background:#1e1e1e; }
</style>
</head>

<body>

<h2>Painel InovaTV</h2>

<button id="btnClientes" class="btn-azul" onclick="mostrarClientes()">Clientes</button>
<button id="btnContatos" class="btn-azul" onclick="mostrarContatos()">Contatos</button>
<button class="btn-neutro" onclick="toggleDark()">🌙 Tema</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button class="btn-neutro" onclick="buscar()">Buscar</button>

<hr>

<h3>Importação</h3>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

<hr>

<h3>Ações</h3>

<button class="btn-neutro" onclick="toggleTodos(true)">Selecionar todos</button>
<button class="btn-neutro" onclick="toggleTodos(false)">Desmarcar</button>
<button class="btn-neutro" onclick="selecionarAtivos()">Ativos</button>
<button class="btn-neutro" onclick="selecionarVencidos()">Vencidos</button>

<button class="btn-verde" onclick="renovarSelecionados()">Renovar</button>
<button class="btn-vermelho" onclick="deletarSelecionados()">Excluir</button>

<br><br>

<table border="1">
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<!-- 🔥 DASHBOARD AGORA EMBAIXO -->
<div class="card">
  <h3>Dashboard</h3>

  💰 Faturamento Atual: R$ <span id="totalValor">0</span><br>
  📈 Previsão Próximo Mês: R$ <span id="previsao">0</span><br>
  👥 Ativos: <span id="totalAtivos">0</span><br>
  ❌ Inativos: <span id="totalInativos">0</span>

  <canvas id="grafico" height="100"></canvas>
</div>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela = 'clientes';
let grafico;

// ================= DARK
function toggleDark(){
  document.body.classList.toggle("dark");
}

// ================= BOTÃO ATIVO
function ativarBotao(){
  document.getElementById("btnClientes").classList.remove("ativo");
  document.getElementById("btnContatos").classList.remove("ativo");

  if(tela==='clientes'){
    document.getElementById("btnClientes").classList.add("ativo");
  } else {
    document.getElementById("btnContatos").classList.add("ativo");
  }
}

// ================= DASHBOARD
function atualizarDashboard(data){

  let ativos = data.filter(c=>c.status==='ativo');
  let inativos = data.filter(c=>c.status==='inativo');

  let total = ativos.reduce((s,c)=>s+(c.valor||0),0);

  let previsao = total; // mesma base (pode evoluir depois)

  document.getElementById("totalValor").innerText = total;
  document.getElementById("previsao").innerText = previsao;
  document.getElementById("totalAtivos").innerText = ativos.length;
  document.getElementById("totalInativos").innerText = inativos.length;

  // AGRUPAR POR MÊS
  let meses = {};

  data.forEach(c=>{
    if(!c.criado_em) return;

    let mes = c.criado_em.substring(0,7);

    meses[mes] = (meses[mes] || 0) + 1;
  });

  let labels = Object.keys(meses);
  let valores = Object.values(meses);

  if(grafico) grafico.destroy();

  grafico = new Chart(document.getElementById("grafico"),{
    type:'line',
    data:{
      labels: labels,
      datasets:[{
        label:'Crescimento de Clientes',
        data: valores
      }]
    }
  });
}

// ================= IMPORTAR
async function importarArquivo(){

  const file = document.getElementById("inputArquivo").files[0];
  if(!file) return alert("Selecione arquivo");

  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(sheet);

  for(let c of json){

    let telefone = (c.telefone||c.Telefone||"").toString().replace(/\D/g,"");

    if(!telefone) continue;

    await fetch("/api/importar-clientes",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ clientes:[{ nome:c.nome||c.Nome, telefone }] })
    });
  }

  alert("Importado 🚀");
  mostrarClientes();
}

// ================= CLIENTES
async function mostrarClientes(){

  tela='clientes';
  ativarBotao();

  const { data } = await client.from('clientes').select('*');

  atualizarDashboard(data);

  document.getElementById('thead').innerHTML=`
    <tr>
      <th><input type="checkbox" onclick="toggleTodos(this.checked)"></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
      <th>Ações</th>
    </tr>
  `;

  let html='';

  data.forEach(c=>{
    html+=`
      <tr>
        <td><input type="checkbox" class="checkCliente" value="${c.id}" data-status="${c.status}"></td>
        <td>${c.nome}</td>
        <td>${c.telefone}</td>
        <td>${c.status}</td>
        <td>
          <button class="btn-verde" onclick="renovarCliente('${c.id}')">Renovar</button>
          <button class="btn-vermelho" onclick="deletarCliente('${c.id}')">Excluir</button>
        </td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML=html;
}

// ================= MASSA
function toggleTodos(checked){
  document.querySelectorAll("input[type='checkbox']").forEach(c=>c.checked=checked);
}

function selecionarAtivos(){
  document.querySelectorAll(".checkCliente").forEach(c=>c.checked=c.dataset.status==="ativo");
}

function selecionarVencidos(){
  document.querySelectorAll(".checkCliente").forEach(c=>c.checked=c.dataset.status==="inativo");
}

// ================= RENOVAR
async function renovarCliente(id){

  const nova = new Date();
  nova.setDate(nova.getDate()+30);

  await client.from('clientes')
    .update({ status:'ativo', vencimento:nova.toISOString().split('T')[0] })
    .eq('id', id);

  mostrarClientes();
}

async function renovarSelecionados(){

  const checks=document.querySelectorAll(".checkCliente:checked");

  for(const c of checks){
    await renovarCliente(c.value);
  }

  alert("Renovados 🚀");
}

// ================= DELETE
async function deletarSelecionados(){

  const checks=document.querySelectorAll(".checkCliente:checked");

  for(const c of checks){
    await client.from('clientes').delete().eq('id',c.value);
  }

  alert("Excluídos 🚀");
  mostrarClientes();
}

async function deletarCliente(id){
  await client.from('clientes').delete().eq('id',id);
  mostrarClientes();
}

// ================= BUSCA
async function buscar(){

  let termo=document.getElementById('busca').value;

  const { data } = await client
    .from('clientes')
    .select('*')
    .or(`telefone.ilike.%${termo}%,nome.ilike.%${termo}%`);

  let html='';

  data.forEach(c=>{
    html+=`<tr><td>${c.nome}</td><td>${c.telefone}</td><td>${c.status}</td></tr>`;
  });

  document.getElementById('tabela').innerHTML=html;
}

// INIT
mostrarClientes();

</script>

</body>
</html>
