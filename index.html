<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }

button {
  margin:4px;
  padding:6px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}

.btn-topo { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }
.btn-cinza { background:#ddd; }

#progressBar { width:100%; background:#ccc; height:20px; }
#progress { width:0%; height:100%; background:green; color:#fff; text-align:center; }

table { width:100%; border-collapse: collapse; font-size:13px; }
th,td { padding:6px; border:1px solid #ccc; }

.hidden { display:none; }

#financeiro {
  background:#f5f5f5;
  padding:15px;
  margin-top:40px;
}
</style>
</head>

<body>

<h2>Painel InovaTV</h2>

<h3 id="statusTela">Você está em: CLIENTES</h3>

<button class="btn-topo" onclick="mostrarClientes()">Clientes</button>
<button class="btn-topo" onclick="mostrarContatos()">Contatos</button>
<button class="btn-topo" onclick="abrirFinanceiro()">Financeiro</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

<div id="progressBar">
  <div id="progress">0%</div>
</div>

<hr>

<div>
💰 Faturamento: R$ <span id="faturamento">0</span> |
✅ Ativos: <span id="ativos">0</span> |
❌ Inativos: <span id="inativos">0</span>
</div>

<hr>

<h3>Ações</h3>

<div id="contador">Selecionados: 0</div>

<button onclick="selecionarTodos()">Selecionar todos</button>
<button onclick="desmarcarTodos()">Desmarcar</button>

<button onclick="selecionarAtivos()">Ativos</button>
<button onclick="selecionarVencidos()">Vencidos</button>

<button class="btn-vermelho" onclick="deletarSelecionados()">Excluir</button>

<br><br>

<table>
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<div id="financeiro" class="hidden">
<h2>Financeiro</h2>
<button class="btn-topo" onclick="voltar()">⬅ Voltar</button>
<hr>
<div>💰 Total: R$ <span id="fTotal">0</span></div>
<br>
<table>
<thead>
<tr><th>Nome</th><th>Valor</th><th>Status</th></tr>
</thead>
<tbody id="tabelaFinanceiro"></tbody>
</table>
</div>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela = 'clientes';
let dadosAtuais = [];

busca.addEventListener("keypress", e => {
  if(e.key === "Enter") buscar();
});

function atualizarContador(){
  contador.innerText =
    "Selecionados: " + document.querySelectorAll(".check:checked").length;
}

function atualizarProgresso(atual,total){
  let p = Math.floor((atual/total)*100);
  progress.style.width = p+"%";
  progress.innerText = p+"%";
}

// ================= IMPORTAR (CORRIGIDO)
async function importarArquivo(){

  const file = inputArquivo.files[0];
  if(!file) return alert("Selecione arquivo");

  if(!confirm("Importar Excel completo?")) return;

  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  for(let i=0;i<json.length;i++){

    let c = json[i];

    let telefone = (c.telefone || c.Telefone || "")
      .toString().replace(/\D/g,"");

    if(!telefone) continue;

    await fetch("/api/importar-clientes",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        clientes:[{
          nome: c.nome || c.Nome || "",
          telefone,
          usuario: c.usuario || "",
          senha: c.senha || "",
          vencimento: c.vencimento || null,
          status: (c.status || "ativo").toLowerCase(),
          valor: c.valor || 0,
          dispositivo: c.dispositivo || "",
          aplicativo: c.aplicativo || "",
          mac: c.mac || "",
          servidor: c.servidor || "",
          plano: c.plano || ""
        }]
      })
    });

    atualizarProgresso(i+1,json.length);
  }

  alert("Importação finalizada 🚀");
  mostrarClientes();
}

// RESTO DO SEU CÓDIGO (inalterado)
async function mostrarClientes(){
  tela='clientes';
  statusTela.innerText = "Você está em: CLIENTES";

  const { data } = await client.from('clientes').select('*');

  dadosAtuais = data;

  thead.innerHTML = `
  <tr>
    <th></th>
    <th>Nome</th>
    <th>Telefone</th>
    <th>Vencimento</th>
    <th>Usuário</th>
    <th>MAC</th>
    <th>Servidor</th>
    <th>Plano</th>
    <th>Valor</th>
    <th>Dispositivo</th>
    <th>Aplicativo</th>
    <th>Ações</th>
  </tr>`;

  let html='';

  data.forEach(c=>{
    html+=`
    <tr>
      <td><input type="checkbox" class="check" data-id="${c.id}" data-status="${c.status||''}" onchange="atualizarContador()"></td>
      <td>${c.nome||''}</td>
      <td>${c.telefone||''}</td>
      <td>${c.vencimento||''}</td>
      <td>${c.usuario||''}</td>
      <td>${c.mac||''}</td>
      <td>${c.servidor||''}</td>
      <td>${c.plano||''}</td>
      <td>${c.valor||''}</td>
      <td>${c.dispositivo||''}</td>
      <td>${c.aplicativo||''}</td>
      <td>
        <button class="btn-vermelho" onclick="deletarItem('${c.id}')">Excluir</button>
      </td>
    </tr>`;
  });

  tabela.innerHTML = html;

  atualizarContador();
}

mostrarClientes();

</script>

</body>
</html>
