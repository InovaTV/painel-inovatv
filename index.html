<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#0a0e27;
color:#fff;
margin:0
}

.container{
max-width:1200px;
margin:auto;
padding:20px
}

.menu{
display:flex;
gap:10px;
margin-bottom:20px
}

.menu button{
background:#1e244d;
border:none;
color:#fff;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.menu .active{
background:#b024ff;
}

.stats{
margin-bottom:10px;
font-weight:bold
}

input{
padding:10px;
border-radius:8px;
border:none;
margin-bottom:10px;
width:100%
}

table{
width:100%;
border-collapse:collapse;
background:#111;
border-radius:10px;
overflow:hidden;
table-layout:fixed;
}

th{
background:#1e244d;
padding:10px;
font-size:13px;
}

td{
padding:10px;
border-bottom:1px solid #222;
font-size:13px;
vertical-align:middle;
}

td.valor{
width:90px;
white-space:nowrap;
text-align:center;
}

td.acoes{
width:160px;
}

td.descricao{
white-space:normal;
}

.acoes{
display:flex;
gap:5px;
flex-wrap:wrap;
}

.btn{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.bot{background:#00d9ff;color:#000}
.humano-btn{background:#ff4d4d;color:#fff}

img{
border-radius:6px;
width:50px;
}

</style>
</head>

<body>

<div class="container">

<h2>Painel InovaTV</h2>

<div class="menu">
<button onclick="trocar('clientes')" class="active">Clientes</button>
<button onclick="trocar('produtos')">Produtos</button>
</div>

<div class="stats">
Total: <span id="total">0</span>
</div>

<!-- CLIENTES -->
<div id="telaClientes">

<input id="busca" placeholder="Buscar cliente..." oninput="filtrarClientes()">

<table>
<thead>
<tr>
<th><input type="checkbox" onclick="toggleClientes(this)"></th>
<th>Nome</th>
<th>Telefone</th>
<th>Usuário</th>
<th>Plano</th>
<th class="valor">Valor</th>
<th>Vencimento</th>
<th class="acoes">Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</div>

<!-- PRODUTOS -->
<div id="telaProdutos" style="display:none">

<button onclick="abrirModal()">+ Criar Produto</button>

<table>
<thead>
<tr>
<th><input type="checkbox" onclick="toggleTodos(this)"></th>
<th>Img</th>
<th>Nome</th>
<th>Descrição</th>
<th class="valor">Valor</th>
<th>Status</th>
<th class="acoes">Ações</th>
</tr>
</thead>
<tbody id="listaProdutos"></tbody>
</table>

</div>

</div>

<script>

const SUPABASE_URL="https://tiupgtbzikwmseecxbvo.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c"

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let clientesGlobal=[]

// TROCAR TELA
function trocar(t){
telaClientes.style.display=t==="clientes"?"block":"none"
telaProdutos.style.display=t==="produtos"?"block":"none"
if(t==="produtos")carregarProdutos()
}

// CLIENTES
async function carregarClientes(){

const res=await fetch(`${SUPABASE_URL}/functions/v1/rocket-clientes`)
const json=await res.json()

clientesGlobal=json.itens||[]

renderClientes(clientesGlobal)
}

function renderClientes(listaDados){

lista.innerHTML=""

listaDados.forEach(c=>{
lista.innerHTML+=`
<tr>
<td><input type="checkbox" class="checkCliente"></td>
<td>${c.nome}</td>
<td>${c.telefone}</td>
<td>${c.usuario||"-"}</td>
<td>${c.plano?.nome||"-"}</td>
<td class="valor">${c.valor}</td>
<td>${new Date(c.vencimento).toLocaleDateString()}</td>
<td class="acoes">
<button class="btn bot">BOT</button>
<button class="btn humano-btn">HUMANO</button>
</td>
</tr>`
})

total.innerText=listaDados.length
}

// FILTRO CLIENTES
function filtrarClientes(){
let termo=busca.value.toLowerCase()

let filtrados=clientesGlobal.filter(c=>
(c.nome||"").toLowerCase().includes(termo) ||
(c.telefone||"").includes(termo) ||
(c.usuario||"").toLowerCase().includes(termo)
)

renderClientes(filtrados)
}

// CHECKBOX CLIENTES
function toggleClientes(el){
document.querySelectorAll(".checkCliente")
.forEach(c=>c.checked=el.checked)
}

// PRODUTOS
async function carregarProdutos(){

const res=await fetch(`${SUPABASE_URL}/rest/v1/produtos?select=*&order=criado_em.desc`,{
headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
})

const data=await res.json()

listaProdutos.innerHTML=""

data.forEach(p=>{
listaProdutos.innerHTML+=`
<tr>
<td><input type="checkbox"></td>
<td>${p.imagem?`<img src="${p.imagem}">`:"-"}</td>
<td>${p.nome}</td>
<td class="descricao">${p.descricao||"-"}</td>
<td class="valor">R$ ${p.valor}</td>
<td>${p.ativo?"Ativo":"Inativo"}</td>
<td class="acoes">
<button onclick="editarProduto('${p.id}')">Editar</button>
<button onclick="excluirProduto('${p.id}')">Excluir</button>
</td>
</tr>`
})
}

// EXCLUIR PRODUTO
async function excluirProduto(id){
await fetch(`${SUPABASE_URL}/rest/v1/produtos?id=eq.${id}`,{
method:"DELETE",
headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
})
carregarProdutos()
}

carregarClientes()

</script>

</body>
</html>
