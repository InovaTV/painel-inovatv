<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }

button {
  margin:4px;
  padding:6px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}

.btn-topo { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }

#progressBar { width:100%; background:#ccc; height:20px; }
#progress { width:0%; height:100%; background:green; color:#fff; text-align:center; }

#logErro {
  background:#000;
  color:#0f0;
  padding:10px;
  margin-top:10px;
  font-size:12px;
  max-height:200px;
  overflow:auto;
}

table { width:100%; border-collapse: collapse; font-size:13px; }
th,td { padding:6px; border:1px solid #ccc; }

#modalEdit {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  align-items:center;
  justify-content:center;
}

#modalBox {
  background:#111;
  padding:20px;
  border-radius:10px;
  color:#fff;
  width:350px;
}

#modalBox input {
  width:100%;
  padding:8px;
  margin-top:10px;
}

#contadorStatus {
  margin:10px 0;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>Painel InovaTV</h2>
<h3 id="statusTela">Você está em: CLIENTES</h3>

<button class="btn-topo" onclick="trocarTela('clientes')">Clientes</button>
<button class="btn-topo" onclick="trocarTela('contatos')">Contatos</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome" onkeypress="if(event.key==='Enter') buscar()">
<button onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo">
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>
<button class="btn-verde" onclick="importarSelecionados()">IMPORTAR SELECIONADOS</button>

<div id="progressBar"><div id="progress">0%</div></div>
<div id="logErro"></div>

<hr>

<div id="contadorSelecionados">Selecionados: 0</div>
<div id="contadorStatus">Ativos: 0 | Vencidos: 0</div>

<button onclick="selecionarTodos()">Selecionar todos</button>
<button onclick="desmarcarTodos()">Desmarcar</button>
<button onclick="filtrarAtivos()">Ativos</button>
<button onclick="filtrarVencidos()">Vencidos</button>
<button class="btn-vermelho" onclick="deletarSelecionados()">Excluir</button>

<table>
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<div id="modalEdit">
  <div id="modalBox">
    <div id="modalLabel"></div>
    <input id="modalInput">
    <br><br>
    <button onclick="modalCancelar()">Cancelar</button>
    <button onclick="modalSalvar()">Salvar edição</button>
    <button onclick="modalOk()">OK</button>
  </div>
</div>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'SUA_KEY_AQUI'
);

let tela='clientes';
let dados=[];
let dadosImportados=[];
let modoImportacao=false;
let modalResolve;
let dadosEditados={};

// ===== CONTADOR IMPORTAÇÃO =====
function contarSelecionadosImport(){
  contadorSelecionados.innerText="Selecionados: "+document.querySelectorAll('.check-import:checked').length;
}

// ===== IMPORTAÇÃO NOVA (NÃO QUEBRA NADA) =====
async function importarArquivo(){

  const file=inputArquivo.files[0];
  if(!file)return alert("Selecione arquivo");

  const reader=new FileReader();

  reader.onload=async(e)=>{

    const wb=XLSX.read(e.target.result,{type:'binary'});
    const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

    dadosImportados=json;
    modoImportacao=true;

    tabela.innerHTML = json.map((c,i)=>`
      <tr>
        <td><input type="checkbox" class="check-import" data-index="${i}" onchange="contarSelecionadosImport()"></td>
        <td>${c.nome||''}</td>
        <td>${c.telefone||''}</td>
        <td>${c.usuario||''}</td>
        <td>${c.servidor||''}</td>
        <td>${c.plano||''}</td>
        <td>${c.valor||''}</td>
        <td>${c.vencimento||''}</td>
        <td>${c.hora_vencimento||c.hora||''}</td>
        <td>${c.mac||''}</td>
        <td>-</td>
        <td>-</td>
      </tr>
    `).join('');

    contadorSelecionados.innerText="Selecionados: 0";

    alert("Selecione os clientes e clique em IMPORTAR SELECIONADOS");
  };

  reader.readAsBinaryString(file);
}

// ===== IMPORTAR SELECIONADOS =====
async function importarSelecionados(){

  const checks=document.querySelectorAll('.check-import:checked');

  if(checks.length===0){
    alert("Selecione pelo menos um cliente");
    return;
  }

  let erros=0;

  for(let i=0;i<checks.length;i++){

    const index=checks[i].dataset.index;
    let linha=dadosImportados[index];

    try{

      let telefone=(linha.telefone||"").replace(/\D/g,"");
      if(!telefone.startsWith("55")) telefone="55"+telefone;

      let usuario=linha.usuario||("user"+i);

      await client.from('clientes').insert({
        nome:linha.nome,
        telefone,
        usuario,
        servidor:linha.servidor,
        plano:linha.plano,
        valor:linha.valor,
        vencimento:linha.vencimento,
        hora_vencimento:linha.hora_vencimento||linha.hora,
        mac:linha.mac
      });

      await client.from('contatos').insert({
        telefone,
        usuario,
        nome:linha.nome,
        cliente:true
      });

    }catch(e){ erros++; }

    let p=Math.floor(((i+1)/checks.length)*100);
    progress.style.width=p+"%";
    progress.innerText=p+"%";
  }

  alert("Importação concluída 🚀 Erros: "+erros);

  modoImportacao=false;
  dadosImportados=[];

  carregar();
}

// ===== RESTO DO SEU SISTEMA (100% INTACTO) =====
async function carregar(){
  const { data } = await client.from(tela).select('*');
  dados = (data||[]).sort((a,b)=> (a.nome||"").localeCompare(b.nome||""));
  render(dados);
}

function render(lista){
  tabela.innerHTML=lista.map(c=>`
  <tr>
    <td><input type="checkbox" class="check"></td>
    <td>${c.nome||''}</td>
    <td>${c.telefone||''}</td>
    <td>${c.usuario||''}</td>
  </tr>
  `).join('');
}

carregar();

</script>

</body>
</html>
