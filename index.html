<!DOCTYPE html>
<html>
<head>
  <title>Painel InovaTV</title>

  <!-- SUPABASE V2 CORRETO -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    button { margin: 3px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 8px; }
  </style>
</head>
<body>

<h2>Painel InovaTV</h2>

<button onclick="mostrarClientes()">Clientes</button>
<button onclick="mostrarContatos()">Contatos</button>

<br><br>

<input id="busca" placeholder="Telefone">
<button onclick="buscar()">Buscar</button>

<br><br>

<table border="1">
  <thead id="thead"></thead>
  <tbody id="tabela"></tbody>
</table>

<script>

// ================= SUPABASE CONFIG
const { createClient } = supabase;

const client = createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

// ================= CONTROLE TELA
let tela = 'clientes';

// ================= CLIENTES
async function mostrarClientes(){
  tela = 'clientes';

  document.getElementById('thead').innerHTML = `
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Status</th>
      <th>Vencimento</th>
      <th>Ações</th>
    </tr>
  `;

  const { data, error } = await client.from('clientes').select('*');

  console.log('CLIENTES:', data, error);

  if (error){
    alert('Erro ao carregar clientes');
    return;
  }

  if (!data || data.length === 0){
    document.getElementById('tabela').innerHTML =
      '<tr><td colspan="5">Nenhum cliente</td></tr>';
    return;
  }

  let html = '';

  data.forEach(c=>{
    html += `
      <tr>
        <td>${c.nome || '-'}</td>
        <td>${c.telefone}</td>
        <td>${c.status || '-'}</td>
        <td>${c.vencimento || '-'}</td>
        <td>
          <button onclick="pagar('${c.id}')">Pago</button>
          <button onclick="humano('${c.id}', ${c.atendimento_humano})">
            ${c.atendimento_humano ? 'IA ON' : 'Humano'}
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML = html;
}

// ================= CONTATOS
async function mostrarContatos(){
  tela = 'contatos';

  document.getElementById('thead').innerHTML = `
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Ações</th>
    </tr>
  `;

  const { data, error } = await client.from('contatos').select('*');

  console.log('CONTATOS:', data, error);

  if (error){
    alert('Erro ao carregar contatos');
    return;
  }

  if (!data || data.length === 0){
    document.getElementById('tabela').innerHTML =
      '<tr><td colspan="3">Nenhum contato</td></tr>';
    return;
  }

  let html = '';

  data.forEach(c=>{
    html += `
      <tr>
        <td>${c.nome || 'Sem nome'}</td>
        <td>${c.telefone}</td>
        <td>
          <button onclick="virarCliente('${c.telefone}')">
            Virar Cliente
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById('tabela').innerHTML = html;
}

// ================= VIRAR CLIENTE
async function virarCliente(telefone){
  const { error } = await client.rpc('virar_cliente', {
    p_telefone: telefone
  });

  if (error){
    console.error(error);
    alert('Erro ao converter cliente');
    return;
  }

  alert('Cliente criado!');
  mostrarClientes();
}

// ================= PAGAMENTO
async function pagar(id){
  const { error } = await client
    .from('clientes')
    .update({ status:'ativo' })
    .eq('id', id);

  if (error){
    alert('Erro ao atualizar');
    return;
  }

  mostrarClientes();
}

// ================= HUMANO
async function humano(id, atual){
  const { error } = await client
    .from('clientes')
    .update({ atendimento_humano: !atual })
    .eq('id', id);

  if (error){
    alert('Erro ao atualizar');
    return;
  }

  mostrarClientes();
}

// ================= BUSCA
async function buscar(){
  let termo = document.getElementById('busca').value;

  const { data, error } = await client
    .from(tela)
    .select('*')
    .ilike('telefone', `%${termo}%`);

  if (error){
    alert('Erro na busca');
    return;
  }

  if (tela === 'clientes'){
    if (!data.length){
      document.getElementById('tabela').innerHTML =
        '<tr><td colspan="5">Nada encontrado</td></tr>';
      return;
    }
    let html = '';
    data.forEach(c=>{
      html += `<tr><td>${c.nome}</td><td>${c.telefone}</td><td>${c.status}</td><td>${c.vencimento||'-'}</td><td>-</td></tr>`;
    });
    document.getElementById('tabela').innerHTML = html;
  } else {
    mostrarContatos();
  }
}

// ================= INIT
mostrarClientes();

</script>

</body>
</html>
