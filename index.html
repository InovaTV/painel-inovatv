<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; padding:20px; }

button {
  margin:4px;
  padding:6px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}

.btn-topo { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }

table { width:100%; border-collapse: collapse; font-size:13px; }
th,td { padding:6px; border:1px solid #ccc; }

.linha-humano { background:#e6ffe6; }
.linha-bot { background:#ffe6e6; }

</style>
</head>

<body>

<h2>Painel InovaTV</h2>
<h3 id="statusTela">Você está em: CLIENTES</h3>

<button class="btn-topo" onclick="trocarTela('clientes')">Clientes</button>
<button class="btn-topo" onclick="trocarTela('contatos')">Contatos</button>

<button onclick="ativarSelecionados()" class="btn-verde">👤 Ativar Humano</button>
<button onclick="desativarSelecionados()" class="btn-vermelho">🤖 Ativar Bot</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button onclick="buscar()">Buscar</button>

<hr>

<div id="contadorSelecionados">Selecionados: 0</div>
<div id="contadorStatus">Ativos: 0 | Vencidos: 0</div>

<button onclick="selecionarTodos()">Selecionar todos</button>
<button onclick="desmarcarTodos()">Desmarcar</button>
<button onclick="filtrarAtivos()">Ativos</button>
<button onclick="filtrarVencidos()">Vencidos</button>

<table>
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<script>

// ===== CONFIG =====
const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela = 'clientes';
let dados = [];

// ===== TROCAR TELA =====
function trocarTela(t){
  tela = t;
  statusTela.innerText = "Você está em: " + t.toUpperCase();
  carregar();
}

// ===== CARREGAR DADOS =====
async function carregar(){
  const { data } = await client.from(tela).select('*');

  dados = data || [];

  montarCabecalho();
  render(dados);
}

// ===== CABEÇALHO =====
function montarCabecalho(){
  if(tela === 'clientes'){
    thead.innerHTML = `
      <tr>
        <th></th><th>Nome</th><th>Telefone</th><th>Usuário</th>
        <th>Vencimento</th><th>Status</th><th>Ações</th>
      </tr>
    `;
  } else {
    thead.innerHTML = `
      <tr>
        <th></th><th>Nome</th><th>Telefone</th><th>Usuário</th>
        <th>Status</th><th>Ações</th>
      </tr>
    `;
  }
}

// ===== CALCULAR STATUS =====
function calcularStatus(c){
  if(!c.vencimento) return "ativo";

  let hoje = new Date();
  hoje.setHours(0,0,0,0);

  let data = c.vencimento.split("-");
  let venc = new Date(data[0], data[1]-1, data[2]);

  return venc < hoje ? "inativo" : "ativo";
}

// ===== RENDER =====
function render(lista){

  tabela.innerHTML = lista.map(c => {

    let status = calcularStatus(c);

    return `
    <tr class="${c.atendimento_humano ? 'linha-humano' : 'linha-bot'}">

      <td>
        <input type="checkbox" class="check"
          data-telefone="${c.telefone}">
      </td>

      <td>${c.nome || ''}</td>
      <td>${c.telefone || ''}</td>
      <td>${c.usuario || ''}</td>

      ${tela === 'clientes' ? `<td>${c.vencimento || ''}</td>` : ''}

      <td>${status}</td>

      <td>
        <button onclick="ativarHumano('${c.telefone}')">👤</button>
        <button onclick="desativarHumano('${c.telefone}')">🤖</button>
      </td>

    </tr>
    `;
  }).join('');

  atualizarContadores(lista);
}

// ===== CONTADORES =====
function atualizarContadores(lista){

  let ativos = 0;
  let vencidos = 0;

  lista.forEach(c=>{
    let s = calcularStatus(c);
    if(s === "ativo") ativos++;
    if(s === "inativo") vencidos++;
  });

  contadorStatus.innerText = `Ativos: ${ativos} | Vencidos: ${vencidos}`;
  contarSelecionados();
}

// ===== SELEÇÃO =====
function contarSelecionados(){
  contadorSelecionados.innerText =
    "Selecionados: " + document.querySelectorAll('.check:checked').length;
}

function selecionarTodos(){
  document.querySelectorAll('.check').forEach(c=>c.checked=true);
  contarSelecionados();
}

function desmarcarTodos(){
  document.querySelectorAll('.check').forEach(c=>c.checked=false);
  contarSelecionados();
}

// ===== ATIVAR / DESATIVAR INDIVIDUAL =====
async function ativarHumano(telefone){
  await toggleHumano(telefone, true);
}

async function desativarHumano(telefone){
  await toggleHumano(telefone, false);
}

// ===== ATIVAR / DESATIVAR MULTIPLOS =====
async function ativarSelecionados(){
  const checks = document.querySelectorAll(".check:checked");

  if(!checks.length) return alert("Selecione pelo menos um");

  for(const c of checks){
    await toggleHumano(c.dataset.telefone, true);
  }

  carregar();
}

async function desativarSelecionados(){
  const checks = document.querySelectorAll(".check:checked");

  if(!checks.length) return alert("Selecione pelo menos um");

  for(const c of checks){
    await toggleHumano(c.dataset.telefone, false);
  }

  carregar();
}

// ===== FUNÇÃO CENTRAL (SUPABASE) =====
async function toggleHumano(telefone, status){
  await fetch("https://tiupgtbzikwmseecxbvo.supabase.co/functions/v1/humano-toggle",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ telefone, status })
  });
}

// ===== FILTROS =====
function filtrarAtivos(){
  render(dados.filter(c=>calcularStatus(c)==="ativo"));
}

function filtrarVencidos(){
  render(dados.filter(c=>calcularStatus(c)==="inativo"));
}

// ===== BUSCA =====
function buscar(){
  let termo = busca.value.toLowerCase();

  render(dados.filter(c =>
    (c.nome||"").toLowerCase().includes(termo) ||
    (c.telefone||"").includes(termo)
  ));
}

// ===== START =====
carregar();

</script>

</body>
</html>
