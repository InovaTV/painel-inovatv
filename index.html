<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }

button {
  margin:4px;
  padding:6px 12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-weight:bold;
}

.btn-topo { background:#2196F3; color:#fff; }
.btn-verde { background:#4CAF50; color:#fff; }
.btn-vermelho { background:#f44336; color:#fff; }
.btn-cinza { background:#ddd; }

#progressBar { width:100%; background:#ccc; height:20px; }
#progress { width:0%; height:100%; background:green; color:#fff; text-align:center; }

table { width:100%; border-collapse: collapse; }
th,td { padding:8px; border:1px solid #ccc; }

.hidden { display:none; }

#financeiro {
  background:#f5f5f5;
  padding:15px;
}
</style>
</head>

<body>

<h2>Painel InovaTV</h2>

<h3 id="statusTela">Você está em: CLIENTES</h3>

<!-- TOPO -->
<div id="topo">
<button class="btn-topo" onclick="mostrarClientes()">Clientes</button>
<button class="btn-topo" onclick="mostrarContatos()">Contatos</button>
<button class="btn-topo" onclick="abrirFinanceiro()">Financeiro</button>
</div>

<br>

<input id="busca" placeholder="Telefone ou Nome">
<button onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo" accept=".xlsx" />
<button class="btn-verde" onclick="importarArquivo()">IMPORTAR EXCEL</button>

<div id="progressBar">
  <div id="progress">0%</div>
</div>

<hr>

<!-- DASH -->
<div id="dashboard">
💰 Faturamento: R$ <span id="faturamento">0</span> |
✅ Ativos: <span id="ativos">0</span> |
❌ Inativos: <span id="inativos">0</span>
</div>

<hr>

<!-- AÇÕES -->
<div id="acoes">
<h3>Ações</h3>

<div id="contador">Selecionados: 0</div>

<button onclick="selecionarTodos()">Selecionar todos</button>
<button onclick="desmarcarTodos()">Desmarcar</button>

<button onclick="selecionarAtivos()">Ativos</button>
<button onclick="selecionarVencidos()">Vencidos</button>

<button class="btn-vermelho" onclick="deletarSelecionados()">Excluir</button>
</div>

<br>

<!-- TABELA -->
<table id="tabelaContainer">
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<!-- ================= FINANCEIRO ================= -->
<div id="financeiro" class="hidden">

<h2>Financeiro</h2>

<button class="btn-topo" onclick="voltar()">⬅ Voltar</button>

<hr>

<div>
💰 Total: R$ <span id="fTotal">0</span>
</div>

<br>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Valor</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tabelaFinanceiro"></tbody>
</table>

</div>

<script>

const client = supabase.createClient(
  'https://tiupgtbzikwmseecxbvo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpdXBndGJ6aWt3bXNlZWN4YnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjM2NTAsImV4cCI6MjA4OTUzOTY1MH0._NV_GF2233w4vjHA1e3NiKQVXVXFg4j3oSagO2jh28c'
);

let tela = 'clientes';
let dadosAtuais = [];

// ================= ENTER NA BUSCA
busca.addEventListener("keypress", function(e){
  if(e.key === "Enter") buscar();
});

// ================= CONTADOR
function atualizarContador(){
  contador.innerText =
    "Selecionados: " + document.querySelectorAll(".check:checked").length;
}

// ================= PROGRESSO
function atualizarProgresso(atual,total){
  let p = Math.floor((atual/total)*100);
  progress.style.width = p+"%";
  progress.innerText = p+"%";
}

// ================= DASH
function atualizarDashboard(lista){
  let total=0, ativos=0, inativos=0;

  lista.forEach(c=>{
    total += Number(c.valor || 0);
    if(c.status==="ativo") ativos++;
    else inativos++;
  });

  faturamento.innerText = total;
  document.getElementById("ativos").innerText = ativos;
  document.getElementById("inativos").innerText = inativos;
}

// ================= RENDER
function renderTabela(lista){

  dadosAtuais = lista;

  let html='';

  lista.forEach(c=>{
    html+=`
    <tr>
      <td><input type="checkbox" class="check" data-id="${c.id}" data-status="${c.status||''}" onchange="atualizarContador()"></td>
      <td>${c.nome}</td>
      <td>${c.telefone}</td>
      <td>
        <button class="btn-vermelho" onclick="deletarItem('${c.id}')">Excluir</button>
      </td>
    </tr>`;
  });

  tabela.innerHTML = html;
  atualizarContador();
}

// ================= CLIENTES
async function mostrarClientes(){
  tela='clientes';
  statusTela.innerText = "Você está em: CLIENTES";

  document.getElementById("financeiro").classList.add("hidden");

  const { data } = await client.from('clientes').select('*');

  thead.innerHTML = `
  <tr><th></th><th>Nome</th><th>Telefone</th><th>Ações</th></tr>`;

  renderTabela(data);
  atualizarDashboard(data);
}

// ================= CONTATOS
async function mostrarContatos(){
  tela='contatos';
  statusTela.innerText = "Você está em: CONTATOS";

  document.getElementById("financeiro").classList.add("hidden");

  const { data } = await client.from('contatos').select('*');

  thead.innerHTML = `
  <tr><th></th><th>Nome</th><th>Telefone</th><th>Ações</th></tr>`;

  renderTabela(data);
}

// ================= BUSCA
function buscar(){

  let termo = busca.value.toLowerCase();

  let filtrado = dadosAtuais.filter(c =>
    (c.nome || '').toLowerCase().includes(termo) ||
    (c.telefone || '').includes(termo)
  );

  renderTabela(filtrado);
}

// ================= SELEÇÃO
function selecionarTodos(){
  document.querySelectorAll(".check").forEach(c=>c.checked=true);
  atualizarContador();
}

function desmarcarTodos(){
  document.querySelectorAll(".check").forEach(c=>c.checked=false);
  atualizarContador();
}

function selecionarAtivos(){
  document.querySelectorAll(".check").forEach(c=>{
    c.checked = c.dataset.status==="ativo";
  });
  atualizarContador();
}

function selecionarVencidos(){
  document.querySelectorAll(".check").forEach(c=>{
    c.checked = c.dataset.status==="inativo";
  });
  atualizarContador();
}

// ================= DELETE
async function deletarItem(id){

  if(!confirm(`Excluir este ${tela}?`)) return;

  await client.from(tela).delete().eq('id', id);

  alert("Excluído!");
  if(tela==='clientes') mostrarClientes();
  else mostrarContatos();
}

async function deletarSelecionados(){

  let checks = document.querySelectorAll(".check:checked");

  if(checks.length===0) return alert("Selecione pelo menos 1");

  if(!confirm(`Excluir ${checks.length} ${tela}?`)) return;

  let i=0;

  for(let c of checks){
    await client.from(tela).delete().eq('id', c.dataset.id);
    i++;
    atualizarProgresso(i, checks.length);
  }

  alert("Excluídos!");

  if(tela==='clientes') mostrarClientes();
  else mostrarContatos();
}

// ================= IMPORTAR
async function importarArquivo(){

  const file = inputArquivo.files[0];
  if(!file) return alert("Selecione arquivo");

  if(!confirm("Importar Excel?")) return;

  const data = await file.arrayBuffer();
  const wb = XLSX.read(data);
  const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  for(let i=0;i<json.length;i++){

    await fetch("/api/importar-clientes",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ clientes:[json[i]] })
    });

    atualizarProgresso(i+1,json.length);
  }

  alert("Importado!");
  mostrarClientes();
}

// ================= FINANCEIRO (TELA REAL)
async function abrirFinanceiro(){

  document.getElementById("financeiro").classList.remove("hidden");

  const { data } = await client.from('clientes').select('*');

  let total=0;
  let html='';

  data.forEach(c=>{
    total += Number(c.valor || 0);

    html+=`
    <tr>
      <td>${c.nome}</td>
      <td>R$ ${c.valor||0}</td>
      <td>${c.status}</td>
    </tr>`;
  });

  document.getElementById("fTotal").innerText = total;
  tabelaFinanceiro.innerHTML = html;
}

// ================= VOLTAR
function voltar(){
  document.getElementById("financeiro").classList.add("hidden");
}

// INIT
mostrarClientes();

</script>

</body>
</html>
