<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel InovaTV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; padding:20px; }

.btn-verde { background:green; color:#fff; }
.btn-vermelho { background:red; color:#fff; }

.linha-humano { background:#e6ffe6; }
.linha-bot { background:#ffe6e6; }

table { width:100%; border-collapse: collapse; }
th,td { border:1px solid #ccc; padding:6px; }

.progress { width:100%; background:#ddd; height:20px; }
.progress-bar { height:100%; width:0%; background:green; color:#fff; text-align:center; }

#log { background:#000; color:#0f0; padding:10px; height:100px; overflow:auto; font-size:12px; }
</style>
</head>

<body>

<h2>Painel InovaTV</h2>
<h3 id="statusTela">Você está em: CLIENTES</h3>

<button onclick="trocarTela('clientes')">Clientes</button>
<button onclick="trocarTela('contatos')">Contatos</button>

<button onclick="ativarSelecionados()" class="btn-verde">👤 Ativar Humano</button>
<button onclick="desativarSelecionados()" class="btn-vermelho">🤖 Ativar Bot</button>

<br><br>

<input id="busca" placeholder="Telefone ou Nome">
<button onclick="buscar()">Buscar</button>

<hr>

<input type="file" id="inputArquivo">
<button onclick="importarArquivo()" class="btn-verde">IMPORTAR EXCEL</button>

<div class="progress">
  <div id="progressBar" class="progress-bar">0%</div>
</div>

<div id="contadorSelecionados">Selecionados: 0</div>
<div id="contadorStatus">Ativos: 0 | Vencidos: 0</div>

<button onclick="selecionarTodos()">Selecionar todos</button>
<button onclick="desmarcarTodos()">Desmarcar</button>
<button onclick="filtrarAtivos()">Ativos</button>
<button onclick="filtrarVencidos()">Vencidos</button>
<button onclick="excluirSelecionados()" class="btn-vermelho">Excluir</button>

<table>
<thead id="thead"></thead>
<tbody id="tabela"></tbody>
</table>

<div id="log"></div>

<script>

// ===== CONFIG =====
const CONFIG = {
  SUPABASE_URL: "https://tiupgtbzikwmseecxbvo.supabase.co",
  SUPABASE_KEY: "COLE_SUA_ANON_KEY_AQUI",
  EDGE_HUMANO: "https://tiupgtbzikwmseecxbvo.supabase.co/functions/v1/humano-toggle"
};

const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

let tela = "clientes";
let dados = [];

// ===== LOG =====
function log(msg){
  document.getElementById("log").innerHTML += msg+"<br>";
}

// ===== TROCAR TELA =====
function trocarTela(t){
  tela = t;
  statusTela.innerText = "Você está em: " + t.toUpperCase();
  carregar();
}

// ===== CARREGAR =====
async function carregar(){
  const { data, error } = await supabase.from(tela).select("*");

  if(error){
    log("ERRO: " + error.message);
    return;
  }

  dados = data || [];
  montarCabecalho();
  render(dados);
}

// ===== CABEÇALHO =====
function montarCabecalho(){

  if(tela === "clientes"){
    thead.innerHTML = `
    <tr>
      <th></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Usuário</th>
      <th>Servidor</th>
      <th>Plano</th>
      <th>Valor</th>
      <th>Vencimento</th>
      <th>Hora</th>
      <th>MAC</th>
      <th>Status</th>
      <th>Ações</th>
    </tr>`;
  } else {
    thead.innerHTML = `
    <tr>
      <th></th>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Usuário</th>
      <th>Status</th>
      <th>Ações</th>
    </tr>`;
  }
}

// ===== STATUS =====
function calcularStatus(c){
  if(!c.vencimento) return "ativo";

  let hoje = new Date();
  hoje.setHours(0,0,0,0);

  let d = c.vencimento.split("-");
  let v = new Date(d[0], d[1]-1, d[2]);

  return v < hoje ? "inativo" : "ativo";
}

// ===== RENDER =====
function render(lista){

  tabela.innerHTML = lista.map(c=>{

    let status = calcularStatus(c);

    return `
<tr class="${c.atendimento_humano ? 'linha-humano' : 'linha-bot'}">

<td>
<input type="checkbox" class="check"
data-id="${c.id}"
data-telefone="${c.telefone}"
onchange="contarSelecionados()">
</td>

<td>${c.nome || ""}</td>
<td>${c.telefone || ""}</td>
<td>${c.usuario || ""}</td>

${tela === "clientes" ? `
<td>${c.servidor || ""}</td>
<td>${c.plano || ""}</td>
<td>${c.valor || ""}</td>
<td>${c.vencimento || ""}</td>
<td>${c.hora_vencimento || ""}</td>
<td>${c.mac || ""}</td>
` : ""}

<td>${status}</td>

<td>
<button onclick="ativarHumano('${c.telefone}')">👤</button>
<button onclick="desativarHumano('${c.telefone}')">🤖</button>
</td>

</tr>
`;

  }).join("");

  atualizarContadores(lista);
}

// ===== CONTADORES =====
function atualizarContadores(lista){
  let a=0,v=0;

  lista.forEach(c=>{
    let s = calcularStatus(c);
    if(s==="ativo") a++;
    if(s==="inativo") v++;
  });

  contadorStatus.innerText = `Ativos: ${a} | Vencidos: ${v}`;
  contarSelecionados();
}

function contarSelecionados(){
  contadorSelecionados.innerText =
    "Selecionados: " + document.querySelectorAll(".check:checked").length;
}

// ===== SELEÇÃO =====
function selecionarTodos(){
  document.querySelectorAll(".check").forEach(c=>c.checked=true);
  contarSelecionados();
}

function desmarcarTodos(){
  document.querySelectorAll(".check").forEach(c=>c.checked=false);
  contarSelecionados();
}

// ===== TOGGLE =====
async function toggleHumano(telefone, status){
  await fetch(CONFIG.EDGE_HUMANO,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ telefone, status })
  });
}

// ===== INDIVIDUAL =====
async function ativarHumano(t){ await toggleHumano(t,true); carregar(); }
async function desativarHumano(t){ await toggleHumano(t,false); carregar(); }

// ===== MULTIPLO =====
async function ativarSelecionados(){
  const checks = document.querySelectorAll(".check:checked");
  if(!checks.length) return alert("Selecione pelo menos um");

  for(const c of checks){
    await toggleHumano(c.dataset.telefone,true);
  }

  carregar();
}

async function desativarSelecionados(){
  const checks = document.querySelectorAll(".check:checked");
  if(!checks.length) return alert("Selecione pelo menos um");

  for(const c of checks){
    await toggleHumano(c.dataset.telefone,false);
  }

  carregar();
}

// ===== FILTROS =====
function filtrarAtivos(){
  render(dados.filter(c=>calcularStatus(c)==="ativo"));
}

function filtrarVencidos(){
  render(dados.filter(c=>calcularStatus(c)==="inativo"));
}

// ===== BUSCA =====
function buscar(){
  let t = busca.value.toLowerCase();
  render(dados.filter(c =>
    (c.nome||"").toLowerCase().includes(t) ||
    (c.telefone||"").includes(t)
  ));
}

// ===== EXCLUIR =====
async function excluirSelecionados(){
  const checks = document.querySelectorAll(".check:checked");

  if(!checks.length) return alert("Selecione pelo menos um");

  for(const c of checks){
    await supabase.from(tela).delete().eq("id", c.dataset.id);
  }

  carregar();
}

// ===== START =====
carregar();

</script>

</body>
</html>
